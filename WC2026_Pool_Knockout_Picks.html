<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Pool · Knockout Stage</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<script src="bracket.js"></script>
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Inter', sans-serif; background: var(--neutral-lightest); color: var(--neutral-darkest); min-height: 100vh; }

  header { background: var(--swiftly-blue); padding: 28px 0 24px; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .header-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.5rem; color: #ffffff; }
  .header-subtitle { font-size: 0.875rem; color: var(--blue-light); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 64px; }

  /* ── Name card ───────────────────────────────────────────── */
  .name-card {
    background: #ffffff;
    border-radius: var(--radius);
    border: 2px solid var(--swiftly-blue);
    padding: 16px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px rgba(0,158,223,0.12);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .name-card label {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  .name-card input {
    flex: 1;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: 1.5px solid var(--neutral-light);
    border-radius: 7px;
    outline: none;
    color: var(--neutral-darkest);
    transition: border-color 0.2s;
    background: var(--neutral-lightest);
  }

  .name-card input:focus { background: #ffffff; }

  .name-card input::placeholder { color: var(--neutral-medium); }

  .shortcuts-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .shortcuts-label { font-size: 0.68rem; font-weight: 700; color: var(--neutral-medium); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; margin-right: 4px; }
  .shortcut-btn {
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
    color: var(--neutral-dark); background: #ffffff; border: 1.5px solid var(--neutral-light);
    border-radius: 5px; padding: 4px 12px; cursor: pointer; transition: all 0.14s; white-space: nowrap;
  }
  .shortcut-btn:hover { border-color: var(--swiftly-blue); color: var(--swiftly-blue); background: var(--blue-lightest); }

  /* ── Sticky progress bar ─────────────────────────────────── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    padding: 10px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }
  .sticky-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .progress-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }
  .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--swiftly-blue);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }
  .progress-count {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  /* ── Bracket (copied from leaderboard Variant 1) ── */
  .bk-wrap { overflow-x: auto; padding: 14px 4px 18px; }
  .bk-bracket { display: flex; width: 100%; align-items: flex-start; position: relative; }
  .bk-col { flex: 1; min-width: 120px; padding: 0 10px; }
  .bk-col-hdr { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; text-align: center; padding-bottom: 6px; border-bottom: 2px solid; margin-bottom: 10px; }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }
  .bk-matches { display: flex; flex-direction: column; gap: 14px; }
  .bk-half    { display: flex; flex-direction: column; gap: 14px; }
  .bk-quarter { display: flex; flex-direction: column; gap: 14px; }
  .bk-pair    { display: flex; flex-direction: column; gap: 14px; }
  .bk-float   { position: relative; }
  .bk-float .bk-card { position: absolute; left: 0; right: 0; }
  .bk-card { background: #ffffff; border: 0.5px solid var(--neutral-light); border-radius: 8px; overflow: hidden; }
  .bk-mnum { font-size: 0.70rem; color: var(--neutral-dark); text-align: left; padding: 2px 8px; background: var(--neutral-lightest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-team { display: flex; align-items: center; gap: 6px; padding: 8px 10px; font-size: 0.82rem; }
  .bk-team + .bk-team { border-top: 0.5px solid var(--neutral-light); }
  .bk-fl { font-size: 0.85rem; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
  .bk-tn { flex: 1; font-weight: 600; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-team.tbd .bk-fl { opacity: 0.25; }
  .bk-team.tbd .bk-tn { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-3rd-lbl { position: absolute; left: 0; right: 0; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--neutral-medium); text-align: center; font-weight: 500; }
  .bk-3rd-card { opacity: 0.65; }
  .bk-rank, .team-rank { font-weight: 400; color: var(--neutral-dark); font-size: 0.68rem; }
  .bk-sc { font-size: 0.78rem; font-weight: 700; color: var(--neutral-medium); min-width: 12px; text-align: right; flex-shrink: 0; }
  .bk-team.w { background: var(--swiftly-blue); }
  .bk-team.w .bk-fl { color: #ffffff; }
  .bk-team.w .bk-tn { color: #ffffff; font-weight: 700; }
  .bk-team.w .team-rank { color: rgba(255,255,255,0.75); }
  .bk-team.w .bk-sc { color: rgba(255,255,255,0.75); }
  .bk-team.l .bk-fl { opacity: 0.35; }
  .bk-team.l .bk-tn { color: var(--neutral-medium); font-weight: 400; }
  .bk-team.l .bk-sc { color: var(--neutral-medium); }

  /* ── Clickable team rows (Variant 2) ── */
  .bk-team[data-match] { cursor: pointer; }
  .bk-team[data-match]:hover { background: var(--blue-lightest); }
  .bk-team[data-match].w:hover { background: var(--swiftly-blue); filter: brightness(0.92); }
  .bk-team[data-match].l:hover { background: var(--blue-lightest); opacity: 1; }
  .bk-team[data-match].l:hover .bk-fl { opacity: 1; }
  .bk-team[data-match].l:hover .bk-tn { color: var(--neutral-darkest); font-weight: 600; }

  /* ── Submit section ─────────────────────────────────────── */
  .submit-section {
    margin-top: 36px;
    text-align: center;
  }

  .submit-btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    background: var(--swiftly-blue);
    color: #ffffff;
    border: none;
    padding: 15px 48px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(0,158,223,0.3);
    letter-spacing: 0.2px;
  }

  .submit-btn:hover {
    background: #0089c3;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,158,223,0.38);
  }

  .submit-note {
    margin-top: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: var(--neutral-dark);
  }

  .confirm-row {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
  }

  .confirm-row.visible { display: flex; }

  .confirm-note {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    color: var(--neutral-dark);
  }

  .confirm-btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    background: var(--swiftly-blue);
    color: #ffffff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s;
  }

  .confirm-btn:hover { background: #0089c3; }

  .validation-msg {
    background: #fff8e6;
    border: 1px solid var(--swiftly-orange);
    border-radius: 7px;
    padding: 11px 16px;
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: #7a4a00;
    display: none;
    text-align: left;
  }

  /* ── Podium (Variant 2 & 3) ── */
  .bk-float .bk-podium { position: absolute; left: 0; right: 0; }
  .bk-podium { border-radius: 8px; overflow: hidden; border: 0.5px solid var(--neutral-light); background: #ffffff; }
  .bk-podium-hdr { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; text-align: center; padding: 5px 8px; background: var(--neutral-lightest); border-bottom: 1px solid var(--neutral-light); color: var(--neutral-dark); }
  .bk-podium-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; font-size: 0.78rem; border-bottom: 0.5px solid var(--neutral-light); }
  .bk-podium-row:last-child { border-bottom: none; }
  .bk-podium-medal { font-size: 1rem; flex-shrink: 0; line-height: 1; }
  .bk-podium-team { flex: 1; font-weight: 600; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-podium-team.tbd { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-podium-row.gold   { background: #fffbeb; }
  .bk-podium-row.silver { background: var(--neutral-lightest); }
  .bk-podium-row.bronze { background: #fff6f0; }

  /* ── Mobile responsive (≤ 640 px — phones) ── */
  /* ── Mobile bracket tabs (Variant 2) ── */
  .bk-mobile-tabs { display: none; background: #ffffff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--neutral-light); }
  .bk-tab-bar { display: flex; border-bottom: 1.5px solid var(--neutral-light); background: var(--neutral-lightest); }
  .bk-tab { flex: 1; padding: 9px 2px; font-size: 0.72rem; font-weight: 700; border: none; background: none; cursor: pointer; color: var(--neutral-dark); border-bottom: 2px solid transparent; margin-bottom: -1.5px; letter-spacing: 0.2px; }
  .bk-tab.active { color: #185FA5; border-bottom-color: #185FA5; }
  .bk-tab-panel { display: none; }
  .bk-tab-panel.active { display: flex; flex-direction: column; gap: 7px; padding: 8px 10px; background: var(--neutral-lightest); }
  .bk-mob-match { padding: 8px 10px; border: 0.5px solid var(--neutral-light); border-radius: 10px; background: #ffffff; }
  .bk-mob-pair-pill { display: flex; justify-content: center; padding: 2px 0; }
  .bk-mob-pair-pill span { font-size: 10px; font-weight: 500; color: #185FA5; background: var(--blue-lightest); border: 1px solid var(--blue-light); border-radius: 20px; padding: 3px 12px; }
  .bk-mob-pair-group { border: 1px solid var(--blue-light); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  .bk-mob-meta { font-size: 0.70rem; color: var(--neutral-dark); margin-bottom: 5px; }
  .bk-mob-teams { display: flex; flex-direction: column; gap: 4px; }
  .bk-mob-pick-team {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.90rem;
    color: var(--neutral-darkest);
    font-weight: 400;
    padding: 7px 9px;
    border-radius: 6px;
    border: 1.5px solid var(--blue-light);
    background: #ffffff;
    cursor: pointer;
    transition: all 0.14s;
  }
  .bk-mob-pick-team.tbd { color: var(--neutral-medium); font-style: italic; font-weight: 400; cursor: default; border-color: var(--neutral-light); }
  .bk-mob-pick-team:not(.tbd):not(.w):not(.l):hover { border-color: var(--swiftly-blue); color: var(--swiftly-blue); background: var(--blue-lightest); }
  .bk-mob-pick-team.w { border-color: var(--swiftly-blue); background: var(--swiftly-blue); color: #ffffff; font-weight: 500; }
  .bk-mob-pick-team.w .team-rank { color: rgba(255,255,255,0.75); }
  .bk-mob-pick-team.l { border-color: transparent; background: transparent; color: var(--neutral-medium); font-weight: 400; }
  .bk-mob-team-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  @media (max-width: 640px) {
    header { padding: 16px 0 14px; }
    .header-title { font-size: clamp(0.82rem, 3.6vw, 1.2rem); white-space: nowrap; }
    .shortcuts-bar { flex-wrap: wrap; }
    .shortcut-btn  { padding: 6px 10px; min-height: 36px; }
    /* Hide desktop bracket, show tab view */
    .bk-outer { display: none; }
    .bk-mobile-tabs { display: block; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 Pool · Knockout Stage</div>
    <div class="header-subtitle">Pick a result for all 32 knockout matches</div>
  </div>
</header>

<!-- ── Sticky progress bar ────────────────────────────── -->
<div class="sticky-bar">
  <div class="sticky-bar-inner">
    <span class="progress-label">Progress</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="progressCount">0 / 32 matches picked</span>
  </div>
</div>

<div class="container">

  <div class="name-card">
    <input type="text" id="entrantName" placeholder="Enter your full name…" autocomplete="name">
  </div>

  <div class="shortcuts-bar">
    <span class="shortcuts-label">Shortcuts</span>
    <button class="shortcut-btn">🎲&nbsp;&nbsp;Pick randomly</button>
    <button class="shortcut-btn">💪&nbsp;&nbsp;Pick higher-ranked team to win</button>
    <button class="shortcut-btn">✕&nbsp;&nbsp;Reset all picks</button>
  </div>

  <div id="bracketContainer"></div>

  <div class="submit-section">
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Happy with your picks?</button>
    <div class="validation-msg" id="validationMsg"></div>
    <div class="confirm-row" id="confirmRow">
      <span class="confirm-note">Your picks will be downloaded as a CSV file.</span>
      <button class="confirm-btn" onclick="confirmSubmit()">Download CSV</button>
    </div>
  </div>

</div>

<script>
// FLAGS, RANKINGS, KO_SCHEDULE, R16, QF, SF, isTbd, matchCard,
// buildBracketHtml, buildPodiumHtml, positionAndConnectBracket → bracket.js

const BRACKET_URL = 'https://raw.githubusercontent.com/riteshwarade/wc26/main/data/knockout_bracket.json';

let r32Teams = {}; // { matchNum: [home, away] } — from knockout_bracket.json
let picks    = {}; // { matchNum: winnerName }   — user's current picks

// ── feedsInto[m] = the match that the winner of m feeds into ──
// Built at runtime from R16/QF/SF topology in bracket.js.
const feedsInto = {};
function buildFeedsInto() {
  for (const [next, feeders] of Object.entries({...R16, ...QF, ...SF}))
    for (const f of feeders) feedsInto[f] = +next;
  feedsInto[101] = 104; // SF1 winner → Final
  feedsInto[102] = 104; // SF2 winner → Final
  // Note: SF losers → M103 (3rd place) is handled separately in clearInvalidDownstream
}

// ── Process matches in round order so each shortcut cascades correctly ──
const MATCH_ORDER = [
  73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88, // R32
  89,90,91,92,93,94,95,96,                          // R16
  97,98,99,100,                                      // QF
  101,102,                                           // SF
  103,104,                                           // 3rd place & Final
];

// ── Resolve teams for any match based on current picks ──
function getTeams(m) {
  if (r32Teams[m]) return r32Teams[m];
  if (R16[m]) return [picks[R16[m][0]] || `W${R16[m][0]}`, picks[R16[m][1]] || `W${R16[m][1]}`];
  if (QF[m])  return [picks[QF[m][0]]  || `W${QF[m][0]}`,  picks[QF[m][1]]  || `W${QF[m][1]}`];
  if (SF[m])  return [picks[SF[m][0]]  || `W${SF[m][0]}`,  picks[SF[m][1]]  || `W${SF[m][1]}`];
  if (m === 104) return [picks[101] || 'W101', picks[102] || 'W102'];
  if (m === 103) {
    // Teams are the losers of each SF match
    const [h1, a1] = getTeams(101);
    const [h2, a2] = getTeams(102);
    const loser101 = picks[101] ? (picks[101] === h1 ? a1 : h1) : 'L101';
    const loser102 = picks[102] ? (picks[102] === h2 ? a2 : h2) : 'L102';
    return [loser101, loser102];
  }
  return ['TBD', 'TBD'];
}

// ── Clear any picks that became invalid after picks[m] changed ──
function clearInvalidDownstream(m) {
  // Winner path: feedsInto[m] is the next match this winner populates
  const nextM = feedsInto[m];
  if (nextM !== undefined) {
    const [h, a] = getTeams(nextM);
    if (picks[nextM] && picks[nextM] !== h && picks[nextM] !== a) {
      delete picks[nextM];
      clearInvalidDownstream(nextM);
    }
  }
  // Loser path: SF losers feed M103 (3rd place match)
  if (m === 101 || m === 102) {
    const [h3, a3] = getTeams(103);
    if (picks[103] && picks[103] !== h3 && picks[103] !== a3) {
      delete picks[103];
    }
  }
}

// ── Build one card's HTML (shared by full render and surgical update) ──
function mkCard(m) {
  const [h, a] = getTeams(m);
  const picked  = picks[m];
  const homeCls = picked ? (picked === h ? 'w' : 'l') : '';
  const awayCls = picked ? (picked === a ? 'w' : 'l') : '';
  // Both teams must be known before either row is clickable
  const bothKnown = !isTbd(h) && !isTbd(a);
  const homeAttrs = bothKnown ? `data-match="${m}" data-team="${h.replace(/"/g,'&quot;')}"` : '';
  const awayAttrs = bothKnown ? `data-match="${m}" data-team="${a.replace(/"/g,'&quot;')}"` : '';
  return matchCard(m, h, a, '', '', '', homeCls, awayCls, homeAttrs, awayAttrs);
}

// ── Surgical card update — no re-render, no repositioning, no flash ──
// Replaces only the card HTML for each match in place, preserving style.top
// on absolutely-positioned cards (R16+). Connectors don't change because
// card heights are fixed (always 2 team rows).
function updateCards() {
  const container = document.getElementById('bracketContainer');
  for (const m of MATCH_ORDER) {
    const cardEl = container.querySelector(`.bk-card[data-match="${m}"]`);
    if (!cardEl) continue;
    const savedTop = cardEl.style.top; // preserve absolute position of R16+ cards
    cardEl.outerHTML = mkCard(m);
    if (savedTop) {
      // Re-query since outerHTML replaced the element
      const newEl = container.querySelector(`.bk-card[data-match="${m}"]`);
      if (newEl) newEl.style.top = savedTop;
    }
  }

  // Update podium in-place
  const [h104, a104] = getTeams(104);
  const champion   = picks[104] || null;
  const runnerUp   = champion ? (champion === h104 ? a104 : h104) : null;
  const podiumEl   = document.getElementById('bk-podium-results');
  if (podiumEl) podiumEl.outerHTML = buildPodiumHtml(champion, runnerUp, picks[103] || null);

  // Update mobile pick cards (surgical — preserves active tab)
  for (const m of MATCH_ORDER) {
    const mobEl = document.getElementById(`mob-card-${m}`);
    if (mobEl) mobEl.outerHTML = mobPickCard(m);
  }

  // Update progress bar
  const done = Object.keys(picks).length;
  document.getElementById('progressFill').style.width = `${(done / 32) * 100}%`;
  document.getElementById('progressCount').textContent = `${done} / 32 matches picked`;
}

// ── Pick a winner for match m, cascade downstream ──
function pickTeam(m, team) {
  picks[m] = team;
  clearInvalidDownstream(m);
  updateCards(); // surgical — no re-render
}

// ── Full render (initial load only) ──
function renderBracket() {
  const el = document.getElementById('bracketContainer');

  // Derive podium from current picks
  const [h104, a104] = getTeams(104);
  const champion   = picks[104] || null;
  const runnerUp   = champion ? (champion === h104 ? a104 : h104) : null;
  const thirdPlace = picks[103] || null;

  el.innerHTML = buildBracketHtml(mkCard, { podiumHtml: buildPodiumHtml(champion, runnerUp, thirdPlace) }) + buildMobTabHtml();
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));

  // Update progress bar
  const done = Object.keys(picks).length;
  document.getElementById('progressFill').style.width = `${(done / 32) * 100}%`;
  document.getElementById('progressCount').textContent = `${done} / 32 matches picked`;
}

// ── Shortcuts ──
function pickRandom() {
  picks = {};
  for (const m of MATCH_ORDER) {
    const [h, a] = getTeams(m);
    if (!isTbd(h) && !isTbd(a)) picks[m] = Math.random() < 0.5 ? h : a;
  }
  updateCards();
}

function pickFavourites() {
  picks = {};
  for (const m of MATCH_ORDER) {
    const [h, a] = getTeams(m);
    if (!isTbd(h) && !isTbd(a))
      picks[m] = (RANKINGS[h] || 999) <= (RANKINGS[a] || 999) ? h : a;
  }
  updateCards();
}

function resetPicks() {
  picks = {};
  updateCards();
}

// ── Submit / CSV download ──────────────────────────────────────────────────
function handleSubmit() {
  const name   = document.getElementById('entrantName').value.trim();
  const valMsg = document.getElementById('validationMsg');
  valMsg.style.background   = '#fff8e6';
  valMsg.style.borderColor  = 'var(--swiftly-orange)';
  valMsg.style.color        = '#7a4a00';
  valMsg.style.display      = 'none';
  document.getElementById('confirmRow').classList.remove('visible');

  if (!name) {
    valMsg.textContent = 'Please enter your name before submitting.';
    valMsg.style.display = 'block';
    document.getElementById('entrantName').focus();
    return;
  }

  const done = Object.keys(picks).length;
  if (done < 32) {
    const remaining = 32 - done;
    valMsg.textContent = `You still have ${remaining} match${remaining === 1 ? '' : 'es'} without a pick. Please complete all 32 matches before submitting.`;
    valMsg.style.display = 'block';
    return;
  }

  document.getElementById('confirmRow').classList.add('visible');
  document.getElementById('submitBtn').style.display = 'none';
}

function confirmSubmit() {
  const name = document.getElementById('entrantName').value.trim();
  downloadCSV(name);
  document.getElementById('confirmRow').classList.remove('visible');
  const valMsg = document.getElementById('validationMsg');
  valMsg.style.background  = '#ebf9ff';
  valMsg.style.borderColor = 'var(--swiftly-blue)';
  valMsg.style.color       = 'var(--neutral-darkest)';
  valMsg.textContent = '✓ Done! Your picks have been downloaded as a CSV file. Please send to Ritesh.';
  valMsg.style.display = 'block';
  document.getElementById('submitBtn').style.display = '';
}

function downloadCSV(name) {
  const escape = v => (String(v).includes(',') ? `"${v}"` : v);
  const rows = [['match', 'winner']];
  for (const m of MATCH_ORDER) {
    rows.push([m, escape(picks[m] || '')]);
  }
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `wc26_knockout_${name.replace(/\s+/g, '-').toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Mobile tab view (Variant 2) ──────────────────────────────────────────────
function switchBracketTab(roundId) {
  document.querySelectorAll('.bk-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.round === roundId));
  document.querySelectorAll('.bk-tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'bk-panel-' + roundId));
}

const MOB_ROUNDS = [
  { id: 'r32', label: 'R32',   matches: [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87] },
  { id: 'r16', label: 'R16',   matches: [89,90,93,94,91,92,95,96] },
  { id: 'qf',  label: 'QF',    matches: [97,98,99,100] },
  { id: 'sf',  label: 'SF',    matches: [101,102] },
  { id: '3rd', label: '3rd',   matches: [103] },
  { id: 'fin', label: 'Final', matches: [104] },
];

function mobPickCard(m) {
  const [h, a]    = getTeams(m);
  const picked    = picks[m];
  const hTbd      = isTbd(h), aTbd = isTbd(a);
  const bothKnown = !hTbd && !aTbd;
  const hCls      = picked ? (picked === h ? ' w' : ' l') : '';
  const aCls      = picked ? (picked === a ? ' w' : ' l') : '';
  const date      = KO_SCHEDULE[m] ? ` · ${koDisplay(m)}` : '';
  const hAttrs    = bothKnown ? ` data-match="${m}" data-team="${h.replace(/"/g,'&quot;')}"` : '';
  const aAttrs    = bothKnown ? ` data-match="${m}" data-team="${a.replace(/"/g,'&quot;')}"` : '';
  const hHtml     = hTbd ? h : teamHtml(h);
  const aHtml     = aTbd ? a : teamHtml(a);
  return `<div class="bk-mob-match" id="mob-card-${m}">
    <div class="bk-mob-meta">${roundLabel(m)} · M${m}${date}</div>
    <div class="bk-mob-teams">
      <div class="bk-mob-pick-team${hTbd ? ' tbd' : hCls}"${hAttrs}><span class="bk-mob-team-name">${hHtml}</span></div>
      <div class="bk-mob-pick-team${aTbd ? ' tbd' : aCls}"${aAttrs}><span class="bk-mob-team-name">${aHtml}</span></div>
    </div>
  </div>`;
}

const PAIR_NEXT = {
  r32: [['R16','M89'],['R16','M90'],['R16','M93'],['R16','M94'],['R16','M91'],['R16','M92'],['R16','M95'],['R16','M96']],
  r16: [['QF','M97'],['QF','M98'],['QF','M99'],['QF','M100']],
  qf:  [['SF','M101'],['SF','M102']],
  sf:  [['Final','M104']],
};

function buildMobTabHtml() {
  // Auto-open first round with any unpicked matches
  let activeRound = MOB_ROUNDS[MOB_ROUNDS.length - 1].id;
  for (const r of MOB_ROUNDS) {
    if (r.matches.some(m => !picks[m])) { activeRound = r.id; break; }
  }
  const tabBar = MOB_ROUNDS.map(r =>
    `<button class="bk-tab${r.id === activeRound ? ' active' : ''}" onclick="switchBracketTab('${r.id}')" data-round="${r.id}">${r.label}</button>`
  ).join('');
  const panels = MOB_ROUNDS.map(r => {
    const pairs = PAIR_NEXT[r.id] || [];
    let html = '';
    for (let i = 0; i < r.matches.length; i += 2) {
      const m1 = r.matches[i];
      const m2 = r.matches[i + 1];
      const pair = pairs[i / 2];
      if (m2 !== undefined && pair) {
        const [rl, mn] = pair;
        html += `<div class="bk-mob-pair-group">`;
        html += mobPickCard(m1);
        html += `<div class="bk-mob-pair-pill"><span>winners meet in ${rl} · ${mn}</span></div>`;
        html += mobPickCard(m2);
        html += `</div>`;
      } else {
        html += mobPickCard(m1);
        if (m2 !== undefined) html += mobPickCard(m2);
      }
    }
    return `<div class="bk-tab-panel${r.id === activeRound ? ' active' : ''}" id="bk-panel-${r.id}">${html}</div>`;
  }).join('');
  return `<div class="bk-mobile-tabs"><div class="bk-tab-bar">${tabBar}</div>${panels}</div>`;
}

// ── Load bracket JSON, then render ──
async function init() {
  const el = document.getElementById('bracketContainer');

  let bracketData = null;
  try {
    const resp = await fetch(`${BRACKET_URL}?t=${Date.now()}`);
    if (resp.ok) bracketData = await resp.json();
  } catch (e) { /* offline or file not yet generated */ }

  if (!bracketData) {
    el.innerHTML = '<div style="padding:40px;text-align:center;color:var(--neutral-dark);font-size:0.875rem;">Bracket not yet available — check back after all group matches are complete (around Jun 27).</div>';
    return;
  }

  // Populate r32Teams: { 73: ['Spain','Morocco'], 74: [...], ... }
  const r32Data = bracketData.round_of_32 || {};
  for (let m = 73; m <= 88; m++) {
    const slot = r32Data[String(m)];
    if (slot && slot.home && slot.away) r32Teams[m] = [slot.home, slot.away];
  }

  buildFeedsInto();
  renderBracket();
}

init();
