<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 pool – knockout picks</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  header { background: var(--swiftly-blue); padding: 28px 0 24px; }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .header-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.5rem; color: #ffffff; }
  .header-subtitle { font-size: 0.875rem; color: var(--blue-light); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 64px; }

  .name-card {
    background: #ffffff; border-radius: var(--radius);
    border: 2px solid var(--swiftly-blue); padding: 16px 20px; margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(0,158,223,0.12); display: flex; align-items: center; gap: 14px;
  }
  .name-card label { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.78rem; color: var(--swiftly-blue); white-space: nowrap; }
  .name-card input {
    flex: 1; padding: 10px 14px; font-family: 'Inter', sans-serif;
    font-size: 1.1rem; font-weight: 700; border: 1.5px solid var(--neutral-light);
    border-radius: 7px; outline: none; color: var(--neutral-darkest);
    background: var(--neutral-lightest);
  }
  .name-card input:focus { background: #ffffff; }
  .name-card input::placeholder { color: var(--neutral-medium); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 pool – knockout picks</div>
    <div class="header-subtitle">World Cup 2026 pool · pick all 32 knockout matches</div>
  </div>
</header>

<div class="container">

  <div class="name-card">
    <label for="entrantName">Your name</label>
    <input type="text" id="entrantName" placeholder="Enter your full name…" autocomplete="name">
  </div>

</div>

</body>
</html>
