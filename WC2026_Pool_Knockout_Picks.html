<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 pool – knockout picks</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { font-family: 'Inter', sans-serif; background: var(--neutral-lightest); color: var(--neutral-darkest); min-height: 100vh; }

  header { background: var(--swiftly-blue); padding: 28px 0 24px; }
  .header-inner { max-width: 1200px; margin: 0 auto; padding: 0 16px; display: flex; flex-direction: column; gap: 6px; }
  .header-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.5rem; color: #ffffff; }
  .header-subtitle { font-size: 0.875rem; color: var(--blue-light); }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 64px; }

  .name-card {
    background: #ffffff; border-radius: var(--radius); border: 2px solid var(--swiftly-blue);
    padding: 16px 20px; margin-bottom: 20px; box-shadow: 0 2px 10px rgba(0,158,223,0.12);
    display: flex; align-items: center; gap: 14px;
  }
  .name-card label { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.78rem; color: var(--swiftly-blue); white-space: nowrap; }
  .name-card input {
    flex: 1; padding: 10px 14px; font-family: 'Inter', sans-serif;
    font-size: 1.1rem; font-weight: 700; border: 1.5px solid var(--neutral-light);
    border-radius: 7px; outline: none; color: var(--neutral-darkest); background: var(--neutral-lightest);
  }
  .name-card input:focus { background: #ffffff; }
  .name-card input::placeholder { color: var(--neutral-medium); }

  .shortcuts-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .shortcuts-label { font-size: 0.68rem; font-weight: 700; color: var(--neutral-medium); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; margin-right: 4px; }
  .shortcut-btn {
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
    color: var(--neutral-dark); background: #ffffff; border: 1.5px solid var(--neutral-light);
    border-radius: 5px; padding: 4px 12px; cursor: pointer; transition: all 0.14s; white-space: nowrap;
  }
  .shortcut-btn:hover { border-color: var(--swiftly-blue); color: var(--swiftly-blue); background: var(--blue-lightest); }

  /* ── Bracket (copied from leaderboard Variant 1) ── */
  .bk-wrap { overflow-x: auto; padding: 14px 4px 18px; }
  .bk-bracket { display: flex; width: 100%; align-items: flex-start; position: relative; }
  .bk-col { flex: 1; min-width: 72px; padding: 0 8px; }
  .bk-col.r32 { flex: 1.4; }
  .bk-col-hdr { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; text-align: center; padding-bottom: 6px; border-bottom: 2px solid; margin-bottom: 10px; }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }
  .bk-matches { display: flex; flex-direction: column; gap: 52px; }
  .bk-half    { display: flex; flex-direction: column; gap: 28px; }
  .bk-quarter { display: flex; flex-direction: column; gap: 14px; }
  .bk-pair    { display: flex; flex-direction: column; gap: 6px; }
  .bk-float   { position: relative; }
  .bk-float .bk-card { position: absolute; left: 0; right: 0; }
  .bk-card { background: #ffffff; border: 0.5px solid var(--neutral-light); border-radius: 8px; overflow: hidden; }
  .bk-mnum { font-size: 0.78rem; color: var(--neutral-darkest); text-align: left; padding: 2px 8px; background: var(--neutral-lightest); }
  .bk-team { display: flex; align-items: center; gap: 6px; padding: 5px 8px; font-size: 0.78rem; }
  .bk-team + .bk-team { border-top: 0.5px solid var(--neutral-light); }
  .bk-fl { font-size: 0.85rem; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
  .bk-tn { flex: 1; font-weight: 600; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-team.tbd .bk-fl { opacity: 0.25; }
  .bk-team.tbd .bk-tn { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-3rd-lbl { position: absolute; left: 0; right: 0; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.6px; color: var(--neutral-medium); text-align: center; font-weight: 500; }
  .bk-3rd-card { position: absolute; left: 0; right: 0; opacity: 0.65; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 pool – knockout picks</div>
    <div class="header-subtitle">World Cup 2026 pool · pick all 32 knockout matches</div>
  </div>
</header>

<div class="container">

  <div class="name-card">
    <label for="entrantName">Your name</label>
    <input type="text" id="entrantName" placeholder="Enter your full name…" autocomplete="name">
  </div>

  <div class="shortcuts-bar">
    <span class="shortcuts-label">Shortcuts</span>
    <button class="shortcut-btn">🎲&nbsp;&nbsp;Pick randomly</button>
    <button class="shortcut-btn">💪&nbsp;&nbsp;Pick higher-ranked team to win</button>
    <button class="shortcut-btn">✕&nbsp;&nbsp;Reset all picks</button>
  </div>

  <div id="bracketContainer"></div>

</div>

<script>
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
};

const KO_SCHEDULE = {
  73:'Jun 28',74:'Jun 29',75:'Jun 29',76:'Jun 29',
  77:'Jun 30',78:'Jun 30',79:'Jun 30',80:'Jul 1',
  81:'Jul 1', 82:'Jul 1', 83:'Jul 2', 84:'Jul 2',
  85:'Jul 2', 86:'Jul 3', 87:'Jul 3', 88:'Jul 3',
  89:'Jul 4', 90:'Jul 4', 91:'Jul 5', 92:'Jul 5',
  93:'Jul 6', 94:'Jul 6', 95:'Jul 7', 96:'Jul 7',
  97:'Jul 9', 98:'Jul 10',99:'Jul 11',100:'Jul 11',
  101:'Jul 14',102:'Jul 15',103:'Jul 18',104:'Jul 19',
};

// Simulated R32 bracket (from knockout_bracket.json)
const R32 = {
  73:{home:'Mexico',away:'Bosnia and Herzegovina'},
  74:{home:'Germany',away:'Turkey'},
  75:{home:'Japan',away:'Morocco'},
  76:{home:'Brazil',away:'Tunisia'},
  77:{home:'Iraq',away:'Netherlands'},
  78:{home:'Curaçao',away:'France'},
  79:{home:'South Africa',away:'Ivory Coast'},
  80:{home:'England',away:'Norway'},
  81:{home:'Australia',away:'Canada'},
  82:{home:'Egypt',away:'Cape Verde'},
  83:{home:'Portugal',away:'Panama'},
  84:{home:'Spain',away:'Argentina'},
  85:{home:'Switzerland',away:'New Zealand'},
  86:{home:'Austria',away:'Uruguay'},
  87:{home:'Uzbekistan',away:'Croatia'},
  88:{home:'Paraguay',away:'Iran'},
};

// All match teams (R32 known, rest TBD for now)
const MATCH_TEAMS = {};
Object.entries(R32).forEach(([m,t]) => { MATCH_TEAMS[+m] = t; });
[89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104].forEach(m => {
  MATCH_TEAMS[m] = {home:'TBD',away:'TBD'};
});

function teamRow(team) {
  const isTbd = !team || team === 'TBD';
  const fl = isTbd ? '—' : (FLAGS[team] || '🏳');
  return `<div class="bk-team${isTbd?' tbd':''}">
    <span class="bk-fl">${fl}</span><span class="bk-tn">${isTbd ? 'TBD' : team}</span>
  </div>`;
}

function card(m) {
  const t = MATCH_TEAMS[m];
  const date = KO_SCHEDULE[m] ? ` · ${KO_SCHEDULE[m]}` : '';
  return `<div class="bk-card" data-match="${m}">
    <div class="bk-mnum">M${m}${date}</div>
    ${teamRow(t.home)}${teamRow(t.away)}
  </div>`;
}

function renderBracket() {
  function pair(ms)  { return `<div class="bk-pair">${ms.map(card).join('')}</div>`; }
  function qtr(ps)   { return `<div class="bk-quarter">${ps.map(pair).join('')}</div>`; }
  function half(qs)  { return `<div class="bk-half">${qs.map(qtr).join('')}</div>`; }
  function floatCol(cls, hdr, matches) {
    return `<div class="bk-col ${cls}">
      <div class="bk-col-hdr">${hdr}</div>
      <div class="bk-float" id="float-${cls}">${matches.map(card).join('')}</div>
    </div>`;
  }

  document.getElementById('bracketContainer').innerHTML = `
  <div class="bk-wrap"><div class="bk-bracket">

    <div class="bk-col r32">
      <div class="bk-col-hdr">Round of 32</div>
      <div class="bk-matches" id="bk-r32-matches">
        ${half([[[74,77],[73,75]],[[83,84],[81,82]]])}
        ${half([[[76,78],[79,80]],[[86,88],[85,87]]])}
      </div>
    </div>

    ${floatCol('r16','Round of 16',[89,90,93,94,91,92,95,96])}
    ${floatCol('qf','Quarterfinals',[97,98,99,100])}
    ${floatCol('sf','Semifinals',[101,102])}

    <div class="bk-col fin">
      <div class="bk-col-hdr">🏆 Final</div>
      <div class="bk-float" id="float-fin">
        ${card(104)}
        <div class="bk-3rd-lbl" id="lbl-3rd"></div>
        <div class="bk-3rd-card" id="card-3rd-wrap">${card(103)}</div>
      </div>
    </div>

  </div></div>`;

  requestAnimationFrame(() => requestAnimationFrame(positionAndConnect));
}

function positionAndConnect() {
  const bracket = document.querySelector('.bk-bracket');
  if (!bracket) return;

  const r32m = document.getElementById('bk-r32-matches');
  if (!r32m) return;
  const r32H = r32m.getBoundingClientRect().height;
  bracket.querySelectorAll('.bk-float').forEach(d => { d.style.height = r32H + 'px'; });

  const br = bracket.getBoundingClientRect();

  function teamMidY(el, refTop) {
    const rows = el.querySelectorAll('.bk-team');
    if (rows.length >= 2) {
      const a = rows[0].getBoundingClientRect();
      const b = rows[1].getBoundingClientRect();
      return (a.bottom + b.top) / 2 - refTop;
    }
    const r = el.getBoundingClientRect();
    return (r.top + r.bottom) / 2 - refTop;
  }

  function yc(m) {
    const el = bracket.querySelector(`[data-match="${m}"]`);
    return el ? teamMidY(el, br.top) : null;
  }

  function setY(m, targetY) {
    const el = bracket.querySelector(`[data-match="${m}"]`);
    if (!el) return;
    const container = el.parentElement;
    const ct = container.getBoundingClientRect().top - br.top;
    const midOffset = teamMidY(el, el.getBoundingClientRect().top);
    el.style.top = `${targetY - ct - midOffset}px`;
  }

  const LEVELS = [
    [[74,77,89],[73,75,90],[83,84,93],[81,82,94],[76,78,91],[79,80,92],[86,88,95],[85,87,96]],
    [[89,90,97],[93,94,98],[91,92,99],[95,96,100]],
    [[97,98,101],[99,100,102]],
    [[101,102,104]],
  ];
  LEVELS.forEach(level => {
    level.forEach(([m1,m2,mn]) => {
      const y1=yc(m1), y2=yc(m2);
      if (y1!==null && y2!==null) setY(mn,(y1+y2)/2);
    });
  });

  // 3rd place: position below Final
  const e104 = bracket.querySelector('[data-match="104"]');
  const wrap3rd = document.getElementById('card-3rd-wrap');
  const lbl3rd = document.getElementById('lbl-3rd');
  if (e104 && wrap3rd) {
    const ct = wrap3rd.parentElement.getBoundingClientRect().top - br.top;
    const bot = e104.getBoundingClientRect().bottom - br.top;
    if (lbl3rd) lbl3rd.style.top = `${bot - ct + 10}px`;
    wrap3rd.style.top = `${bot - ct + 26}px`;
  }

  // Draw SVG connectors
  const old = bracket.querySelector('.bk-svg');
  if (old) old.remove();
  const svg = document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.className = 'bk-svg';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
  bracket.appendChild(svg);

  const color = '#B5D4F4';
  function drawConn(m1, m2, mn) {
    const e1 = bracket.querySelector(`[data-match="${m1}"]`);
    const e2 = bracket.querySelector(`[data-match="${m2}"]`);
    const en = mn ? bracket.querySelector(`[data-match="${mn}"]`) : null;
    if (!e1 || !e2) return;
    const y1=teamMidY(e1,br.top), y2=teamMidY(e2,br.top), ym=(y1+y2)/2;
    const x1 = e1.getBoundingClientRect().right - br.left;
    let xc = x1+10, xn = xc;
    if (en) { xn = en.getBoundingClientRect().left - br.left; xc=(x1+xn)/2; }
    const d = `M${x1},${y1} H${xc} V${y2} M${x1},${y2} H${xc}` + (en?` M${xc},${ym} H${xn}`:'');
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',d); p.setAttribute('stroke',color);
    p.setAttribute('stroke-width','1.5'); p.setAttribute('fill','none');
    p.setAttribute('stroke-linecap','round');
    svg.appendChild(p);
  }

  [[74,77,89],[73,75,90],[83,84,93],[81,82,94],
   [76,78,91],[79,80,92],[86,88,95],[85,87,96]].forEach(c=>drawConn(...c));
  [[89,90,97],[93,94,98],[91,92,99],[95,96,100]].forEach(c=>drawConn(...c));
  drawConn(97,98,101); drawConn(99,100,102);

  // SF → Final stubs
  [[101,104,false],[102,104,true]].forEach(([sf,fin,mirror])=>{
    const esf = bracket.querySelector(`[data-match="${sf}"]`);
    const efin = bracket.querySelector(`[data-match="${fin}"]`);
    if (!esf||!efin) return;
    const y = teamMidY(esf, br.top);
    const x1 = mirror ? esf.getBoundingClientRect().left-br.left : esf.getBoundingClientRect().right-br.left;
    const xn = mirror ? efin.getBoundingClientRect().right-br.left : efin.getBoundingClientRect().left-br.left;
    const p = document.createElementNS('http://www.w3.org/2000/svg','path');
    p.setAttribute('d',`M${x1},${y} H${xn}`); p.setAttribute('stroke',color);
    p.setAttribute('stroke-width','1.5'); p.setAttribute('fill','none');
    p.setAttribute('stroke-linecap','round');
    svg.appendChild(p);
  });
}

renderBracket();
</script>
</body>
</html>
