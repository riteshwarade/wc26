<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 pool – knockout picks</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  /* ── Header ── */
  header { background: var(--swiftly-blue); padding: 28px 0 24px; }
  .header-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 16px;
    display: flex; flex-direction: column; gap: 6px;
  }
  .header-title { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1.5rem; color: #ffffff; }
  .header-subtitle { font-size: 0.875rem; color: var(--blue-light); }

  /* ── Sticky bar ── */
  .sticky-bar {
    position: sticky; top: 0; z-index: 100;
    background: #ffffff; box-shadow: 0 2px 8px rgba(0,0,0,0.07); padding: 10px 0;
  }
  .sticky-bar-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 16px;
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .progress-label { font-size: 0.68rem; font-weight: 700; color: var(--neutral-dark); text-transform: uppercase; letter-spacing: 0.6px; white-space: nowrap; }
  .progress-bar-wrap { flex: 1; min-width: 80px; height: 6px; background: var(--neutral-light); border-radius: 3px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--swiftly-blue); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
  .progress-count { font-size: 0.78rem; font-weight: 700; color: var(--swiftly-blue); white-space: nowrap; }

  /* ── Container ── */
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 16px 64px; }

  /* ── Name card ── */
  .name-card {
    background: #ffffff; border-radius: var(--radius);
    border: 2px solid var(--swiftly-blue); padding: 16px 20px; margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(0,158,223,0.12); display: flex; align-items: center; gap: 14px;
  }
  .name-card label { font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.78rem; color: var(--swiftly-blue); white-space: nowrap; }
  .name-card input {
    flex: 1; padding: 10px 14px; font-family: 'Inter', sans-serif;
    font-size: 1.1rem; font-weight: 700; border: 1.5px solid var(--neutral-light);
    border-radius: 7px; outline: none; color: var(--neutral-darkest);
    transition: border-color 0.2s; background: var(--neutral-lightest);
  }
  .name-card input:focus { background: #ffffff; }
  .name-card input::placeholder { color: var(--neutral-medium); }

  /* ── Shortcuts bar ── */
  .shortcuts-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .shortcuts-label { font-size: 0.68rem; font-weight: 700; color: var(--neutral-medium); text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; margin-right: 4px; }
  .shortcut-btn {
    font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 700;
    color: var(--neutral-dark); background: #ffffff; border: 1.5px solid var(--neutral-light);
    border-radius: 5px; padding: 4px 12px; cursor: pointer; transition: all 0.14s; white-space: nowrap;
  }
  .shortcut-btn:hover { border-color: var(--swiftly-blue); color: var(--swiftly-blue); background: var(--blue-lightest); }

  /* ── Bracket ── */
  .bracket-wrap { overflow-x: auto; padding: 4px 0 8px; }
  .bracket {
    display: flex; gap: 0; min-width: max-content;
    align-items: flex-start; position: relative;
  }
  .bk-col { flex: 1; min-width: 148px; padding: 0 8px; }
  .bk-col.r32 { flex: 1.4; }
  .bk-col-hdr {
    font-size: 0.68rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.8px; text-align: center; padding-bottom: 6px;
    border-bottom: 2px solid; margin-bottom: 10px;
  }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }

  /* R32 hierarchy */
  .bk-matches  { display: flex; flex-direction: column; gap: 52px; }
  .bk-half     { display: flex; flex-direction: column; gap: 28px; }
  .bk-quarter  { display: flex; flex-direction: column; gap: 14px; }
  .bk-pair     { display: flex; flex-direction: column; gap: 6px; }

  /* Float columns (R16, QF, SF, Final) */
  .bk-float    { position: relative; }
  .bk-float .kp-card { position: absolute; left: 0; right: 0; }

  /* Cards */
  .kp-card {
    background: #ffffff; border: 0.5px solid var(--neutral-light);
    border-radius: 8px; overflow: hidden;
  }
  .kp-mnum {
    font-size: 0.78rem; color: var(--neutral-darkest); text-align: left;
    padding: 3px 8px; background: var(--neutral-lightest); border-bottom: 0.5px solid var(--neutral-light);
  }

  /* Team rows — buttons for interactivity */
  .kp-team {
    display: flex; align-items: center; gap: 6px; padding: 6px 8px;
    font-size: 0.78rem; font-weight: 600; color: var(--neutral-darkest);
    width: 100%; text-align: left; background: none; border: none;
    cursor: pointer; transition: background 0.1s; font-family: 'Inter', sans-serif;
  }
  .kp-team + .kp-team { border-top: 0.5px solid var(--neutral-light); }
  .kp-team:hover:not(:disabled) { background: var(--blue-lightest); }
  .kp-team:disabled { cursor: default; }

  .kp-fl { font-size: 0.85rem; width: 16px; text-align: center; flex-shrink: 0; }
  .kp-tn { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* States */
  .kp-team.tbd { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .kp-team.tbd .kp-fl { opacity: 0.25; }
  .kp-team.picked { background: var(--blue-lightest); }
  .kp-team.picked .kp-tn { color: #042C53; font-weight: 700; }
  .kp-team.eliminated { background: #fdf0f0; }
  .kp-team.eliminated .kp-tn { color: var(--neutral-medium); font-weight: 400; }
  .kp-team.eliminated .kp-fl { opacity: 0.35; }

  /* 3rd place separator */
  .bk-3rd-lbl {
    position: absolute; left: 0; right: 0; font-size: 0.68rem;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--neutral-medium);
    text-align: center; font-weight: 500;
  }
  .kp-3rd-card { position: absolute; left: 0; right: 0; opacity: 0.75; }

  /* ── Submit ── */
  .submit-section { margin-top: 36px; text-align: center; }
  .submit-btn {
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.78rem;
    background: var(--swiftly-blue); color: #ffffff; border: none;
    padding: 15px 48px; border-radius: 8px; cursor: pointer;
    transition: all 0.18s; box-shadow: 0 4px 14px rgba(0,158,223,0.3);
  }
  .submit-btn:hover { background: #0089c3; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(0,158,223,0.38); }
  .validation-msg {
    background: #fff8e6; border: 1px solid var(--swiftly-orange); border-radius: 7px;
    padding: 11px 16px; margin-top: 14px; font-size: 0.78rem; color: #7a4a00;
    display: none; text-align: left; max-width: 480px; margin-left: auto; margin-right: auto;
  }
  .confirm-row { display: none; align-items: center; justify-content: center; gap: 12px; margin-top: 14px; }
  .confirm-row.visible { display: flex; }
  .confirm-note { font-size: 0.68rem; color: var(--neutral-dark); }
  .confirm-btn {
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.78rem;
    background: var(--swiftly-blue); color: #ffffff; border: none;
    padding: 10px 28px; border-radius: 8px; cursor: pointer; transition: background 0.18s;
  }
  .confirm-btn:hover { background: #0089c3; }

  /* Loading/error state */
  .state-msg { text-align: center; padding: 48px 16px; font-size: 0.78rem; color: var(--neutral-dark); font-style: italic; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 pool – knockout picks</div>
    <div class="header-subtitle" id="headerSubtitle">World Cup 2026 pool · pick all 32 knockout matches</div>
  </div>
</header>

<div class="sticky-bar">
  <div class="sticky-bar-inner">
    <span class="progress-label">Knockout picks</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="progressCount">0 / 32 picks made</span>
  </div>
</div>

<div class="container">

  <div class="name-card">
    <label for="entrantName">Your name</label>
    <input type="text" id="entrantName" placeholder="Enter your full name…" autocomplete="name">
  </div>

  <div class="shortcuts-bar">
    <span class="shortcuts-label">Shortcuts</span>
    <button class="shortcut-btn" onclick="pickAllFavourites()">💪&nbsp;&nbsp;Pick all higher-ranked teams</button>
    <button class="shortcut-btn" onclick="resetAllPicks()">✕&nbsp;&nbsp;Reset all picks</button>
  </div>

  <div id="bracketContainer">
    <div class="state-msg">Loading bracket…</div>
  </div>

  <div class="submit-section">
    <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Happy with your picks?</button>
    <div class="validation-msg" id="validationMsg"></div>
    <div class="confirm-row" id="confirmRow">
      <span class="confirm-note">This will download your picks CSV.</span>
      <button class="confirm-btn" onclick="confirmSubmit()">Download picks</button>
    </div>
  </div>

</div>

<script>

const USE_LOCAL_DATA = true; // set false for live data from GitHub

const GITHUB_BRACKET_URL = 'https://raw.githubusercontent.com/riteshwarade/wc26/main/data/knockout_bracket.json';

// ── Local bracket for testing ─────────────────────────────
const LOCAL_BRACKET = {"generated_at":"2026-05-18T17:08:49.302268Z","confirmed":true,"combination_key":"BDEFGHIL","combination_found":true,"groups":{"A":{"first":"South Africa","second":"Mexico","third":"Czech Republic","fourth":"South Korea"},"B":{"first":"Switzerland","second":"Bosnia and Herzegovina","third":"Canada","fourth":"Qatar"},"C":{"first":"Brazil","second":"Morocco","third":"Haiti","fourth":"Scotland"},"D":{"first":"Australia","second":"Paraguay","third":"Turkey","fourth":"United States"},"E":{"first":"Germany","second":"Curaçao","third":"Ivory Coast","fourth":"Ecuador"},"F":{"first":"Japan","second":"Tunisia","third":"Netherlands","fourth":"Sweden"},"G":{"first":"Egypt","second":"Iran","third":"New Zealand","fourth":"Belgium"},"H":{"first":"Spain","second":"Uruguay","third":"Cape Verde","fourth":"Saudi Arabia"},"I":{"first":"Iraq","second":"France","third":"Norway","fourth":"Senegal"},"J":{"first":"Austria","second":"Argentina","third":"Algeria","fourth":"Jordan"},"K":{"first":"Uzbekistan","second":"Portugal","third":"Colombia","fourth":"DR Congo"},"L":{"first":"England","second":"Panama","third":"Croatia","fourth":"Ghana"}},"qualified_thirds":[{"group":"D","team":"Turkey"},{"group":"F","team":"Netherlands"},{"group":"B","team":"Canada"},{"group":"H","team":"Cape Verde"},{"group":"I","team":"Norway"},{"group":"E","team":"Ivory Coast"},{"group":"L","team":"Croatia"},{"group":"G","team":"New Zealand"}],"round_of_32":{"73":{"home":"Mexico","away":"Bosnia and Herzegovina"},"74":{"home":"Germany","away":"Turkey"},"75":{"home":"Japan","away":"Morocco"},"76":{"home":"Brazil","away":"Tunisia"},"77":{"home":"Iraq","away":"Netherlands"},"78":{"home":"Curaçao","away":"France"},"79":{"home":"South Africa","away":"Ivory Coast"},"80":{"home":"England","away":"Norway"},"81":{"home":"Australia","away":"Canada"},"82":{"home":"Egypt","away":"Cape Verde"},"83":{"home":"Portugal","away":"Panama"},"84":{"home":"Spain","away":"Argentina"},"85":{"home":"Switzerland","away":"New Zealand"},"86":{"home":"Austria","away":"Uruguay"},"87":{"home":"Uzbekistan","away":"Croatia"},"88":{"home":"Paraguay","away":"Iran"}},"round_of_16":{"89":{"home":"W74","away":"W77"},"90":{"home":"W73","away":"W75"},"91":{"home":"W76","away":"W78"},"92":{"home":"W79","away":"W80"},"93":{"home":"W83","away":"W84"},"94":{"home":"W81","away":"W82"},"95":{"home":"W86","away":"W88"},"96":{"home":"W85","away":"W87"}},"quarterfinals":{"97":{"home":"W89","away":"W90"},"98":{"home":"W93","away":"W94"},"99":{"home":"W91","away":"W92"},"100":{"home":"W95","away":"W96"}},"semifinals":{"101":{"home":"W97","away":"W98"},"102":{"home":"W99","away":"W100"}},"third_place":{"103":{"home":"L101","away":"L102"}},"final":{"104":{"home":"W101","away":"W102"}}};

// ── Flag emojis ───────────────────────────────────────────
const FLAGS = {
  'Mexico':'🇲🇽','South Africa':'🇿🇦','South Korea':'🇰🇷','Czech Republic':'🇨🇿',
  'Canada':'🇨🇦','Bosnia and Herzegovina':'🇧🇦','Qatar':'🇶🇦','Switzerland':'🇨🇭',
  'Brazil':'🇧🇷','Morocco':'🇲🇦','Haiti':'🇭🇹','Scotland':'🏴󠁧󠁢󠁳󠁣󠁴󠁿',
  'United States':'🇺🇸','Paraguay':'🇵🇾','Australia':'🇦🇺','Turkey':'🇹🇷',
  'Germany':'🇩🇪','Curaçao':'🇨🇼','Ivory Coast':'🇨🇮','Ecuador':'🇪🇨',
  'Netherlands':'🇳🇱','Japan':'🇯🇵','Sweden':'🇸🇪','Tunisia':'🇹🇳',
  'Belgium':'🇧🇪','Egypt':'🇪🇬','Iran':'🇮🇷','New Zealand':'🇳🇿',
  'Spain':'🇪🇸','Cape Verde':'🇨🇻','Saudi Arabia':'🇸🇦','Uruguay':'🇺🇾',
  'France':'🇫🇷','Senegal':'🇸🇳','Iraq':'🇮🇶','Norway':'🇳🇴',
  'Argentina':'🇦🇷','Algeria':'🇩🇿','Austria':'🇦🇹','Jordan':'🇯🇴',
  'Portugal':'🇵🇹','DR Congo':'🇨🇩','Uzbekistan':'🇺🇿','Colombia':'🇨🇴',
  'England':'🏴󠁧󠁢󠁥󠁮󠁧󠁿','Croatia':'🇭🇷','Ghana':'🇬🇭','Panama':'🇵🇦',
};

// ── FIFA Rankings (for favourite shortcut) ────────────────
const RANKINGS = {
  'Mexico':15,'South Africa':60,'South Korea':25,'Czech Republic':41,
  'Canada':30,'Bosnia and Herzegovina':65,'Qatar':55,'Switzerland':19,
  'Brazil':6,'Morocco':8,'Haiti':83,'Scotland':43,
  'United States':16,'Paraguay':40,'Australia':27,'Turkey':22,
  'Germany':10,'Curaçao':82,'Ivory Coast':34,'Ecuador':23,
  'Netherlands':7,'Japan':18,'Sweden':38,'Tunisia':44,
  'Belgium':9,'Egypt':29,'Iran':21,'New Zealand':85,
  'Spain':2,'Cape Verde':69,'Saudi Arabia':61,'Uruguay':17,
  'France':1,'Senegal':14,'Iraq':57,'Norway':31,
  'Argentina':3,'Algeria':28,'Austria':24,'Jordan':63,
  'Portugal':5,'DR Congo':46,'Uzbekistan':50,'Colombia':13,
  'England':4,'Croatia':11,'Ghana':74,'Panama':33,
};

// ── KO schedule ───────────────────────────────────────────
const KO_SCHEDULE = {
  73:'Jun 28',74:'Jun 29',75:'Jun 29',76:'Jun 29',
  77:'Jun 30',78:'Jun 30',79:'Jun 30',80:'Jul 1',
  81:'Jul 1', 82:'Jul 1', 83:'Jul 2', 84:'Jul 2',
  85:'Jul 2', 86:'Jul 3', 87:'Jul 3', 88:'Jul 3',
  89:'Jul 4', 90:'Jul 4', 91:'Jul 5', 92:'Jul 5',
  93:'Jul 6', 94:'Jul 6', 95:'Jul 7', 96:'Jul 7',
  97:'Jul 9', 98:'Jul 10',99:'Jul 11',100:'Jul 11',
  101:'Jul 14',102:'Jul 15',103:'Jul 18',104:'Jul 19',
};

// ── Round structure ───────────────────────────────────────
// winner of match X populates slot in match Y
const WINNER_FEEDS = {
  74:{match:89,slot:'home'}, 77:{match:89,slot:'away'},
  73:{match:90,slot:'home'}, 75:{match:90,slot:'away'},
  76:{match:91,slot:'home'}, 78:{match:91,slot:'away'},
  79:{match:92,slot:'home'}, 80:{match:92,slot:'away'},
  83:{match:93,slot:'home'}, 84:{match:93,slot:'away'},
  81:{match:94,slot:'home'}, 82:{match:94,slot:'away'},
  86:{match:95,slot:'home'}, 88:{match:95,slot:'away'},
  85:{match:96,slot:'home'}, 87:{match:96,slot:'away'},
  89:{match:97,slot:'home'}, 90:{match:97,slot:'away'},
  93:{match:98,slot:'home'}, 94:{match:98,slot:'away'},
  91:{match:99,slot:'home'}, 92:{match:99,slot:'away'},
  95:{match:100,slot:'home'},96:{match:100,slot:'away'},
  97:{match:101,slot:'home'},98:{match:101,slot:'away'},
  99:{match:102,slot:'home'},100:{match:102,slot:'away'},
  // SF: winner → Final, loser → 3rd place (handled in makePick)
};

// ── State ─────────────────────────────────────────────────
let PICKS = {};        // matchNum → winner team name
let MATCH_TEAMS = {};  // matchNum → {home, away}
let pickedCount = 0;

// ── Init ──────────────────────────────────────────────────
async function init() {
  document.getElementById('headerSubtitle').textContent =
    'World Cup 2026 pool · pick all 32 knockout matches';

  let bracket;
  if (USE_LOCAL_DATA) {
    bracket = LOCAL_BRACKET;
  } else {
    try {
      const res = await fetch(GITHUB_BRACKET_URL);
      bracket = await res.json();
    } catch(e) {
      document.getElementById('bracketContainer').innerHTML =
        '<div class="state-msg">Could not load bracket. Make sure the group stage is complete.</div>';
      return;
    }
  }

  // Build MATCH_TEAMS from bracket JSON
  Object.entries(bracket.round_of_32).forEach(([m, t]) => { MATCH_TEAMS[+m] = {home: t.home, away: t.away}; });
  [89,90,91,92,93,94,95,96].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  [97,98,99,100].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  [101,102].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  MATCH_TEAMS[103] = {home:'TBD',away:'TBD'};
  MATCH_TEAMS[104] = {home:'TBD',away:'TBD'};

  renderBracket();
  document.getElementById('entrantName').addEventListener('input', () => {
    document.getElementById('submitBtn').style.opacity = '';
  });
}

// ── Render bracket ────────────────────────────────────────
function renderBracket() {
  const bracket = document.getElementById('bracketContainer');

  function card(m) {
    const t = MATCH_TEAMS[m];
    const date = KO_SCHEDULE[m] ? ` · ${KO_SCHEDULE[m]}` : '';
    return `<div class="kp-card" id="card-${m}">
      <div class="kp-mnum">M${m}${date}</div>
      ${teamBtn(m, t.home, 'home')}
      ${teamBtn(m, t.away, 'away')}
    </div>`;
  }

  function pair(ms) { return `<div class="bk-pair">${ms.map(card).join('')}</div>`; }
  function quarter(ps) { return `<div class="bk-quarter">${ps.map(pair).join('')}</div>`; }
  function half(qs) { return `<div class="bk-half">${qs.map(quarter).join('')}</div>`; }

  function floatCol(cls, hdr, matches) {
    return `<div class="bk-col ${cls}">
      <div class="bk-col-hdr">${hdr}</div>
      <div class="bk-float" data-cls="${cls}" id="float-${cls}">${matches.map(card).join('')}</div>
    </div>`;
  }

  bracket.innerHTML = `<div class="bracket-wrap"><div class="bracket">

    <div class="bk-col r32">
      <div class="bk-col-hdr">Round of 32</div>
      <div class="bk-matches" id="r32-matches">
        ${half([[[74,77],[73,75]], [[83,84],[81,82]]])}
        ${half([[[76,78],[79,80]], [[86,88],[85,87]]])}
      </div>
    </div>

    ${floatCol('r16','Round of 16',[89,90,93,94,91,92,95,96])}
    ${floatCol('qf','Quarterfinals',[97,98,99,100])}
    ${floatCol('sf','Semifinals',[101,102])}

    <div class="bk-col fin">
      <div class="bk-col-hdr">🏆 Final</div>
      <div class="bk-float" id="float-fin">
        ${card(104)}
        <div class="bk-3rd-lbl" id="lbl-3rd">3rd place · M103</div>
        <div class="kp-3rd-card" id="card-3rd-wrap">${card(103)}</div>
      </div>
    </div>

  </div></div>`;

  positionFloatCards();
}

function teamBtn(m, team, slot) {
  const isTbd = !team || team === 'TBD' || /^[WL]\d+$/.test(team);
  const picked = PICKS[m] === team && !isTbd;
  const eliminated = PICKS[m] && PICKS[m] !== team && !isTbd;
  const fl = isTbd ? '—' : (FLAGS[team] || '🏳');
  const cls = isTbd ? 'tbd' : picked ? 'picked' : eliminated ? 'eliminated' : '';
  const disabled = isTbd ? 'disabled' : '';
  const displayName = isTbd ? (team || 'TBD') : team;
  return `<button class="kp-team ${cls}" ${disabled}
    onclick="makePick(${m},'${(team||'').replace(/'/g,"\\'")}','${slot}')"
    data-match="${m}" data-team="${(team||'').replace(/"/g,'&quot;')}" data-slot="${slot}">
    <span class="kp-fl">${fl}</span><span class="kp-tn">${displayName}</span>
  </button>`;
}

// ── Position float cards (same approach as leaderboard) ───
function positionFloatCards() {
  const bracket = document.querySelector('.bracket');
  if (!bracket) return;

  const r32m = document.getElementById('r32-matches');
  if (!r32m) return;
  const r32H = r32m.getBoundingClientRect().height;

  bracket.querySelectorAll('.bk-float').forEach(d => { d.style.height = r32H + 'px'; });

  const br = bracket.getBoundingClientRect();

  function teamMidY(el) {
    const rows = el.querySelectorAll('.kp-team');
    if (rows.length >= 2) {
      const a = rows[0].getBoundingClientRect();
      const b = rows[1].getBoundingClientRect();
      return (a.bottom + b.top) / 2 - br.top;
    }
    const r = el.getBoundingClientRect();
    return (r.top + r.bottom) / 2 - br.top;
  }

  function yc(m) {
    const el = document.getElementById(`card-${m}`);
    return el ? teamMidY(el) : null;
  }

  function setY(m, targetY) {
    const el = document.getElementById(`card-${m}`);
    if (!el) return;
    const container = el.parentElement;
    const ct = container.getBoundingClientRect().top - br.top;
    const midOffset = teamMidY(el);
    el.style.top = `${targetY - ct - midOffset}px`;
  }

  const LEVELS = [
    [[74,77,89],[73,75,90],[83,84,93],[81,82,94],[76,78,91],[79,80,92],[86,88,95],[85,87,96]],
    [[89,90,97],[93,94,98],[91,92,99],[95,96,100]],
    [[97,98,101],[99,100,102]],
    [[101,102,104]],
  ];

  LEVELS.forEach(level => {
    level.forEach(([m1, m2, mn]) => {
      const y1 = yc(m1), y2 = yc(m2);
      if (y1 !== null && y2 !== null) setY(mn, (y1+y2)/2);
    });
  });

  // Position 3rd place aligned with QF midpoint
  const m103wrap = document.getElementById('card-3rd-wrap');
  const lbl3rd = document.getElementById('lbl-3rd');
  const y104el = document.getElementById('card-104');
  if (m103wrap && y104el) {
    const ct = m103wrap.parentElement.getBoundingClientRect().top - br.top;
    const bot104 = y104el.getBoundingClientRect().bottom - br.top;
    if (lbl3rd) lbl3rd.style.top = `${bot104 - ct + 10}px`;
    m103wrap.style.top = `${bot104 - ct + 26}px`;
    m103wrap.style.position = 'absolute';
    m103wrap.style.left = '0';
    m103wrap.style.right = '0';
  }
}

// ── Pick logic ────────────────────────────────────────────
function makePick(matchNum, team, slot) {
  if (!team || team === 'TBD' || /^[WL]\d+$/.test(team)) return;

  const prevPick = PICKS[matchNum];
  if (prevPick === team) return; // already picked

  // If changing pick, clear everything downstream that depended on the old pick
  if (prevPick) {
    clearDownstream(matchNum, prevPick);
    PICKS[matchNum] = team;
  } else {
    PICKS[matchNum] = team;
    pickedCount++;
    updateProgress();
  }

  // Cascade winner to next match
  if (WINNER_FEEDS[matchNum]) {
    const {match, slot: feedSlot} = WINNER_FEEDS[matchNum];
    MATCH_TEAMS[match][feedSlot] = team;
  }

  // SF special: winner → Final, loser → 3rd place
  if (matchNum === 101 || matchNum === 102) {
    const t = MATCH_TEAMS[matchNum];
    const loser = t.home === team ? t.away : t.home;
    const winSlot = matchNum === 101 ? 'home' : 'away';
    const loseSlot = matchNum === 101 ? 'home' : 'away';
    MATCH_TEAMS[104][winSlot] = team;
    if (loser && loser !== 'TBD') MATCH_TEAMS[103][loseSlot] = loser;
  }

  refreshCards();
  requestAnimationFrame(() => requestAnimationFrame(positionFloatCards));
}

function clearDownstream(matchNum, oldTeam) {
  if (!oldTeam || /^[WL]\d+$/.test(oldTeam)) return;

  if (WINNER_FEEDS[matchNum]) {
    const {match, slot} = WINNER_FEEDS[matchNum];
    if (MATCH_TEAMS[match][slot] === oldTeam) {
      MATCH_TEAMS[match][slot] = 'TBD';
      if (PICKS[match] === oldTeam) {
        delete PICKS[match];
        pickedCount--;
        updateProgress();
        clearDownstream(match, oldTeam);
      } else if (PICKS[match]) {
        // pick exists but not the cleared team — it stays valid
      }
    }
  }

  // SF special
  if (matchNum === 101 || matchNum === 102) {
    const winSlot = matchNum === 101 ? 'home' : 'away';
    const loseSlot = matchNum === 101 ? 'home' : 'away';
    if (MATCH_TEAMS[104][winSlot] === oldTeam) {
      MATCH_TEAMS[104][winSlot] = 'TBD';
      if (PICKS[104] === oldTeam) { delete PICKS[104]; pickedCount--; updateProgress(); }
    }
    // clear 3rd place
    if (MATCH_TEAMS[103][loseSlot] !== 'TBD') {
      MATCH_TEAMS[103][loseSlot] = 'TBD';
      if (PICKS[103]) { delete PICKS[103]; pickedCount--; updateProgress(); }
    }
  }
}

function refreshCards() {
  // Re-render all card contents in place
  Object.keys(MATCH_TEAMS).forEach(m => {
    const el = document.getElementById(`card-${m}`);
    if (!el) return;
    const matchNum = +m;
    const t = MATCH_TEAMS[matchNum];
    const date = KO_SCHEDULE[matchNum] ? ` · ${KO_SCHEDULE[matchNum]}` : '';
    el.innerHTML = `<div class="kp-mnum">M${matchNum}${date}</div>
      ${teamBtn(matchNum, t.home, 'home')}
      ${teamBtn(matchNum, t.away, 'away')}`;
  });
}

// ── Shortcuts ─────────────────────────────────────────────
function pickAllFavourites() {
  // Pick in bracket order: R32 first, then R16, QF, SF, Final, 3rd
  const order = [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87,
                 89,90,93,94,91,92,95,96,97,98,99,100,101,102,104,103];
  order.forEach(m => {
    const t = MATCH_TEAMS[m];
    if (!t) return;
    const isTbd = v => !v || v === 'TBD' || /^[WL]\d+$/.test(v);
    if (isTbd(t.home) && isTbd(t.away)) return;
    if (isTbd(t.home)) { makePick(m, t.away, 'away'); return; }
    if (isTbd(t.away)) { makePick(m, t.home, 'home'); return; }
    const rHome = RANKINGS[t.home] ?? 999;
    const rAway = RANKINGS[t.away] ?? 999;
    const fav = rHome <= rAway ? t.home : t.away;
    const favSlot = rHome <= rAway ? 'home' : 'away';
    makePick(m, fav, favSlot);
  });
}

function resetAllPicks() {
  PICKS = {};
  pickedCount = 0;
  // Reset R16+ teams to TBD
  [89,90,91,92,93,94,95,96].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  [97,98,99,100].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  [101,102].forEach(m => { MATCH_TEAMS[m] = {home:'TBD',away:'TBD'}; });
  MATCH_TEAMS[103] = {home:'TBD',away:'TBD'};
  MATCH_TEAMS[104] = {home:'TBD',away:'TBD'};
  refreshCards();
  updateProgress();
  requestAnimationFrame(() => requestAnimationFrame(positionFloatCards));
}

// ── Progress ──────────────────────────────────────────────
function updateProgress() {
  document.getElementById('progressCount').textContent = `${pickedCount} / 32 picks made`;
  document.getElementById('progressFill').style.width = `${(pickedCount / 32) * 100}%`;
}

// ── Submit ────────────────────────────────────────────────
function handleSubmit() {
  const name = document.getElementById('entrantName').value.trim();
  const valMsg = document.getElementById('validationMsg');
  valMsg.style.display = 'none';

  if (!name) {
    valMsg.textContent = 'Please enter your name before submitting.';
    valMsg.style.display = 'block';
    document.getElementById('entrantName').focus();
    return;
  }

  if (pickedCount < 32) {
    valMsg.textContent = `You still have ${32 - pickedCount} match${32 - pickedCount === 1 ? '' : 'es'} without a pick. Please fill out the full bracket before submitting.`;
    valMsg.style.display = 'block';
    // Scroll to first unpicked card
    const allMatches = [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87,
                        89,90,93,94,91,92,95,96,97,98,99,100,101,102,104,103];
    for (const m of allMatches) {
      if (!PICKS[m]) {
        const el = document.getElementById(`card-${m}`);
        if (el) { el.scrollIntoView({behavior:'smooth', block:'center'}); }
        break;
      }
    }
    return;
  }

  document.getElementById('confirmRow').classList.add('visible');
  document.getElementById('submitBtn').style.display = 'none';
}

function confirmSubmit() {
  const name = document.getElementById('entrantName').value.trim();
  downloadCSV(name);
}

function downloadCSV(name) {
  const rows = [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88,
                89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];
  const lines = rows.map(m => `${m},${PICKS[m] || ''}`).join('\n');
  const blob = new Blob([lines], {type:'text/csv'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `wc26knockout_${name.replace(/\s+/g,'-').toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── Start ─────────────────────────────────────────────────
init();
</script>
