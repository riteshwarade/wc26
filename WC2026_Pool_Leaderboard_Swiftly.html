<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Pool · Leaderboard – Swiftly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --swiftly-red:     #ee0e51;
    --correct-green:   #5ce65c;
    --wrong-red:       #ff6b6b;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--swiftly-blue);
    padding: 28px 0 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .header-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: #ffffff;
  }

  .header-subtitle {
    font-size: 0.875rem;
    color: var(--blue-light);
  }

  /* ── Sticky bar ── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    padding: 10px 0;
  }

  .sticky-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .progress-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--swiftly-blue);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-count {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  .updated-at {
    font-size: 0.68rem;
    color: var(--neutral-medium);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Container ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
  }

  .section-body {
    overflow: clip; /* clip (not hidden) so position:sticky works inside */
    margin-bottom: 32px;
  }

  /* ── Card ── */
  .card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
    margin-bottom: 32px;
  }

  /* ── Standings table ── */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .standings-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .standings-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .standings-table th.th-squares { text-align: center; }

  .standings-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
    transition: background 0.12s;
  }

  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }
  .standings-table tbody tr:hover { background: var(--blue-lightest); }

  .standings-table td {
    padding: 8px 12px;
    vertical-align: middle;
  }

  .td-rank {
    font-weight: 700;
    color: var(--neutral-medium);
    font-size: 0.78rem;
    width: 36px;
    text-align: center;
  }

  .td-rank.top3 { color: var(--swiftly-blue); }

  .td-name {
    font-weight: 700;
    color: var(--neutral-darkest);
    min-width: 120px;
  }

  .td-points {
    font-weight: 700;
    color: var(--swiftly-blue);
    font-size: 0.78rem;
    width: 56px;
    text-align: center;
  }

  .td-squares { width: 100%; }

  /* ── Mini squares ── */
  .squares-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 2px 0;
  }

  .sq {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .sq.sq-sm {
    width: 9px;
    height: 9px;
    border-radius: 1px;
  }
  .squares-wrap.nowrap {
    flex-wrap: nowrap;
    gap: 1.5px;
  }

  .sq-correct   { background: var(--swiftly-blue); }
  .sq-wrong     { background: var(--swiftly-red); }
  .sq-cascaded  { background: var(--swiftly-red); }
  .sq-pending   { background: transparent; border: 1px solid var(--neutral-light); }
  .sq-empty     { background: transparent; }
  .sq           { cursor: pointer; }

  /* ── Tooltip ── */
  #sq-tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--neutral-darkest);
    color: #ffffff;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 0.78rem;
    pointer-events: none;
    display: none;
    max-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    line-height: 1.5;
  }

  #sq-tooltip .tt-match  { font-weight: 700; margin-bottom: 4px; color: var(--blue-light); }
  #sq-tooltip .tt-pick   { margin-bottom: 2px; }
  #sq-tooltip .tt-result { margin-bottom: 4px; color: var(--neutral-medium); }
  #sq-tooltip .tt-status { font-weight: 700; }
  #sq-tooltip .tt-status.correct   { color: var(--swiftly-blue); }
  #sq-tooltip .tt-status.wrong     { color: var(--swiftly-red); }
  #sq-tooltip .tt-status.cascaded  { color: var(--swiftly-red); }
  #sq-tooltip .tt-status.pending   { color: var(--neutral-medium); }

  /* ── Results table ── */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .results-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .results-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .results-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .results-table td {
    padding: 5px 12px;
    vertical-align: middle;
  }

  /* Compact columns: shrink to content */
  .td-match-num, .td-grp, .td-score, .td-date, .td-time, .td-result {
    width: 1%;
    white-space: nowrap;
  }

  .td-match-num { color: var(--neutral-medium); font-weight: 700; text-align: center; }
  .td-grp       { color: var(--swiftly-blue); font-weight: 700; }
  .td-score     { font-weight: 700; color: var(--neutral-darkest); }
  .td-teams     { font-weight: 700; color: var(--neutral-darkest); min-width: 160px; }

  .outcome-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1.5px solid var(--swiftly-blue);
    background: var(--swiftly-blue);
    color: #ffffff;
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .outcome-pill.draw {
    border-color: var(--neutral-dark);
    background: var(--neutral-dark);
    color: #ffffff;
  }

  /* ── Side-by-side layout ── */
  .side-by-side-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .side-left {
    width: 380px;
    flex-shrink: 0;
  }

  .side-right {
    flex: 1;
    min-width: 0;
  }

  /* ── Group tables ── */
  .group-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .group-table-card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
  }

  .group-table-header {
    background: var(--swiftly-blue);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 7px 12px;
  }

  .group-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .group-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table th {
    padding: 5px 8px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
  }

  .group-table th.th-team { text-align: left; }
  .group-table td.td-team { min-width: 130px; }
  .group-table td:not(.td-team), .group-table th:not(.th-team) { white-space: nowrap; width: 1%; padding-left: 4px; padding-right: 4px; }

  .group-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table tbody tr:last-child { border-bottom: none; }
  .group-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .group-table td {
    padding: 5px 8px;
    text-align: center;
    color: var(--neutral-darkest);
  }

  .group-table td.td-team {
    text-align: left;
    font-weight: 700;
  }

  .group-table td.td-pts {
    font-weight: 700;
    color: var(--swiftly-blue);
  }

  .group-table tr.qualified      td { background: var(--blue-lightest); }
  .group-table tr.third-qual     td { background: #e6f9ef; }
  .group-table tr.third-pending  td { background: #fff8e6; }
  .group-table tr.eliminated     td { background: #fdf0f0; color: var(--neutral-medium); }
  .group-table tr.eliminated td.td-team { color: var(--neutral-dark); }

  /* ── Knockout bracket ── */
  .bk-wrap {
    overflow-x: auto;
    padding: 14px 4px 18px;
  }
  .bk-bracket {
    display: flex;
    gap: 0;
    width: 100%;
    align-items: flex-start;
    position: relative;
  }
  .bk-col {
    flex: 1;
    min-width: 120px;
    padding: 0 10px;
  }
  .bk-col-hdr {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid;
    margin-bottom: 10px;
  }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }
  /* R32 anchor column: nested flex with hierarchy gaps */
  /* R32 hierarchy — uniform 16px gap at every level */
  .bk-matches, .bk-half, .bk-quarter, .bk-pair { display: flex; flex-direction: column; gap: 16px; }
  /* R16/QF/SF/Final: cards absolutely positioned by JS to align with R32 anchors */
  .bk-float    { position: relative; }  /* wraps absolutely-positioned cards */
  .bk-float .bk-card { position: absolute; left: 0; right: 0; }
  .bk-card {
    background: #ffffff;
    border: 0.5px solid var(--neutral-light);
    border-radius: 8px;
    overflow: hidden;
  }
  .bk-mnum {
    font-size: 0.78rem;
    color: var(--neutral-darkest);
    text-align: left;
    padding: 2px 8px;
    background: var(--neutral-lightest);
    letter-spacing: 0.2px;
  }
  .bk-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    font-size: 0.78rem;
  }
  .bk-team + .bk-team { border-top: 0.5px solid var(--neutral-light); }
  .bk-fl { font-size: 0.85rem; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
  .bk-tn { flex: 1; font-weight: 600; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-rank, .team-rank { font-weight: 400; color: var(--neutral-dark); font-size: 0.68rem; }
  .bk-sc { font-size: 0.78rem; font-weight: 700; color: var(--neutral-medium); min-width: 12px; text-align: right; flex-shrink: 0; }
  .bk-team.tbd .bk-fl { opacity: 0.25; }
  .bk-team.tbd .bk-tn { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-team.w { background: var(--blue-lightest); }
  .bk-team.w .bk-tn { color: #042C53; font-weight: 700; }
  .bk-team.w .bk-sc { color: #185FA5; }
  .bk-team.l .bk-fl { opacity: 0.35; }
  .bk-team.l .bk-tn { color: var(--neutral-medium); font-weight: 400; }
  .bk-team.l .bk-sc { color: var(--neutral-medium); }
  .bracket-pending {
    font-size: 0.78rem;
    color: var(--neutral-dark);
    text-align: center;
    padding: 32px 16px;
    font-style: italic;
  }

  /* ── Podium / final results (Variants 2 & 3; shown in Variant 1 for now) ── */
  .bk-float .bk-podium { position: absolute; left: 0; right: 0; }
  .bk-podium {
    border-radius: 8px;
    overflow: hidden;
    border: 0.5px solid var(--neutral-light);
    background: #ffffff;
  }
  .bk-podium-hdr {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    padding: 5px 8px;
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
    color: var(--neutral-dark);
  }
  .bk-podium-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    font-size: 0.78rem;
    border-bottom: 0.5px solid var(--neutral-light);
  }
  .bk-podium-row:last-child { border-bottom: none; }
  .bk-podium-medal { font-size: 1rem; flex-shrink: 0; line-height: 1; }
.bk-podium-team {
    flex: 1;
    font-weight: 600;
    color: var(--neutral-darkest);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bk-podium-team.tbd { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-podium-row.gold   { background: #fffbeb; }
  .bk-podium-row.silver { background: var(--neutral-lightest); }
  .bk-podium-row.bronze { background: #fff6f0; }

  /* ── Loading / error states ── */
  .state-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--neutral-dark);
    font-size: 0.875rem;
  }

  .state-msg .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }


  /* ── KO teaser ── */
  .ko-teaser {
    text-align: center;
    padding: 28px 20px;
    margin-bottom: 32px;
  }
  .ko-teaser-icon { font-size: 2rem; margin-bottom: 8px; }
  .ko-teaser-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--neutral-darkest);
    margin-bottom: 6px;
  }
  .ko-teaser-msg { font-size: 0.78rem; color: var(--neutral-dark); }

  /* ── Combined standings columns ── */
  .td-grp-pts, .td-ko-pts, .td-total-pts, .td-max-pts { width: 64px; min-width: 64px; text-align: center; }
  .td-grp-pts   { color: var(--neutral-dark); font-weight: 400; }
  .td-ko-pts    { color: var(--neutral-dark); font-weight: 400; }
  .td-total-pts { font-weight: 700; color: var(--neutral-darkest); }
  .td-max-pts   { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .sq-divider {
    display: inline-block;
    width: 1.5px;
    height: 14px;
    background: var(--neutral-medium);
    margin: 0 5px;
    vertical-align: middle;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .sq-divider-sm {
    display: inline-block;
    width: 1.5px;
    height: 10px;
    background: var(--neutral-medium);
    margin: 0 4px;
    vertical-align: middle;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .champ-pick  { font-size: 0.82rem; color: var(--neutral-dark); margin-left: 6px; white-space: nowrap; align-self: center; }
  .champ-correct   { color: var(--swiftly-blue); font-weight: 600; }
  .champ-wrong     { color: var(--swiftly-red); text-decoration: line-through; }
  .champ-cascaded  { color: var(--swiftly-red); text-decoration: line-through; font-style: italic; }
</style>
<script src="bracket.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 Pool · Leaderboard</div>
    <div class="header-subtitle" id="headerSubtitle">Swiftly pool · group stage</div>
  </div>
</header>

<div class="sticky-bar">
  <div class="sticky-inner">
    <span class="progress-label" id="stageLabel">Group stage</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="matchesPlayed">Loading…</span>
    <span class="updated-at" id="updatedAt"></span>
    <span class="dev-override" id="devOverride" style="display:none">
      <label for="devGamesInput" style="font-size:0.68rem;color:var(--neutral-dark);margin-right:4px">🧪 KO games played:</label>
      <input id="devGamesInput" type="number" min="0" max="32" step="1"
        style="width:52px;font-size:0.78rem;padding:1px 4px;border:1px solid var(--neutral-light);border-radius:4px;text-align:center">
    </span>
  </div>
</div>

<div id="sq-tooltip"></div>

<div class="container">

  <!-- KO standings: teaser (group mode) or primary (KO mode) -->
  <div id="koStandingsSection"></div>

  <!-- KO bracket: only visible in KO mode -->
  <div id="koBracketSection" style="display:none">
    <p class="section-label">Knockout bracket</p>
    <div class="section-body">
      <div id="koBracketCard"><div class="state-msg"><span class="emoji">⏳</span>Loading…</div></div>
    </div>
  </div>

  <!-- Divider between KO and group sections (shown in KO mode only) -->
  <div id="koSectionDivider" style="display:none;border-top:2px solid var(--neutral-light);margin:8px 0 20px"></div>

  <!-- Group section: flat in group mode, no toggle in KO mode -->
  <div id="groupSection">
    <div id="groupAccordionHeader" style="display:none">
      <!-- rendered by JS in KO mode -->
    </div>
    <div id="groupSectionBody">
      <p class="section-label" id="groupStandingsLabel">Standings</p>
      <div class="section-body" id="standings-body">
        <div class="card" id="standingsCard"><div class="state-msg"><span class="emoji">⏳</span>Loading picks and results…</div></div>
      </div>
      <div class="side-by-side-layout">
        <div class="side-left">
          <p class="section-label">Group tables</p>
          <div class="section-body" id="groups-body">
            <div id="groupTablesCard"><div class="state-msg"><span class="emoji">⏳</span>Loading…</div></div>
          </div>
        </div>
        <div class="side-right">
          <p class="section-label">Match results</p>
          <div class="section-body" id="results-body">
            <div class="card" id="resultsCard"><div class="state-msg"><span class="emoji">⏳</span>Loading…</div></div>
          </div>
        </div>
      </div>
      <p class="section-label" id="bracketSectionLabel">Provisional bracket</p>
      <div class="section-body" id="bracket-body">
        <div id="bracketCard"><div class="state-msg"><span class="emoji">⏳</span>Loading…</div></div>
      </div>
      <!-- KO teaser rendered here in group mode -->
      <div id="koTeaserSection"></div>
    </div>
  </div>

</div>

<script>
// ── Pool config ───────────────────────────────────────────
const POOL_ID   = 'swiftly';
const POOL_NAME = 'Swiftly';
// ──────────────────────────────────────────────────────────

// ── Dev mode ──────────────────────────────────────────────
// Set to true to use embedded simulation data (no network needed).
// Set to false to fetch live data from GitHub.
const USE_LOCAL_DATA = true;
// ──────────────────────────────────────────────────────────

const PICKS_URL   = `https://raw.githubusercontent.com/riteshwarade/wc26/main/data/group_${POOL_ID}_picks.json`;

// ── Parse results CSV ─────────────────────────────────────
function parseResults(csvText) {
  const results = {};
  csvText.trim().split('\n').slice(1).forEach(line => {
    const [match, home, away, outcome] = line.split(',');
    const num = parseInt(match);
    if (num && outcome) {
      results[num] = { home: parseInt(home), away: parseInt(away), outcome: outcome.trim() };
    }
  });
  return results;
}

// ── KO match points ──────────────────────────────────────
const KO_POINTS = {
  73:4,74:4,75:4,76:4,77:4,78:4,79:4,80:4,
  81:4,82:4,83:4,84:4,85:4,86:4,87:4,88:4,
  89:8,90:8,91:8,92:8,93:8,94:8,95:8,96:8,
  97:12,98:12,99:12,100:12,
  101:16,102:16,103:12,104:24,
};

// ── Parse KO results CSV ──────────────────────────────────
// CSV format: match,winner (with header row)
// Returns { matchNum: winnerName } as strings
function parseKoResults(csvText) {
  const results = {};
  if (!csvText || !csvText.trim()) return results;
  csvText.trim().split('\n').slice(1).forEach(line => {
    const parts = line.split(',');
    const num = parseInt(parts[0]);
    const winner = parts[1] ? parts[1].trim() : null;
    if (num && winner) {
      results[num] = winner;
    }
  });
  return results;
}

// ── Compute combined standings ────────────────────────────
function computeCombinedStandings(groupStandings, koPicksData, koResults, bracketData) {
  const KO_MATCH_NUMS = [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88,
                         89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];

  // ── Cascade helpers ───────────────────────────────────────
  // Round number of a KO match (used to track when a team was eliminated).
  function matchRound(m) {
    if (m >= 73 && m <= 88)  return 1;  // R32
    if (m >= 89 && m <= 96)  return 2;  // R16
    if (m >= 97 && m <= 100) return 3;  // QF
    if (m === 101 || m === 102) return 4; // SF
    return 5; // M103 (3rd) and M104 (Final)
  }

  // A pick for match m is "cascaded" if the picked team's eliminatedInRound
  // is strictly less than this threshold.
  // M103 (3rd place): SF losers (elim round 4) are valid → threshold is 4 (must be < 4 to cascade).
  // M104 (Final): SF winners are valid → any earlier elimination cascades (threshold 5).
  function cascadeThreshold(m) {
    if (m >= 73 && m <= 88)  return 0;  // R32: first round, never cascaded
    if (m >= 89 && m <= 96)  return 2;  // R16: cascaded if out in round 1
    if (m >= 97 && m <= 100) return 3;  // QF: cascaded if out in rounds 1–2
    if (m === 101 || m === 102) return 4; // SF: cascaded if out in rounds 1–3
    if (m === 103) return 4; // 3rd: SF losers (round 4) are valid; cascaded if out in rounds 1–3
    if (m === 104) return 5; // Final: cascaded if out before winning SF
    return 0;
  }

  // ── Build eliminated map: team → round they were knocked out ──
  // Iterates in match order so team names resolve via getKoTeams() correctly.
  const eliminatedInRound = {};
  for (const m of KO_MATCH_NUMS) {
    const winner = koResults[m];
    if (!winner || !bracketData) continue;
    try {
      const [t1, t2] = getKoTeams(m, bracketData, koResults);
      const loser = (t1 === winner) ? t2 : (t2 === winner) ? t1 : null;
      if (loser && !isTbd(loser) && !(loser in eliminatedInRound)) {
        eliminatedInRound[loser] = matchRound(m);
      }
    } catch (e) { /* bracket not yet fully resolved */ }
  }

  // ── Evaluate picks for one participant ────────────────────
  function evalKoPicks(koPicks) {
    let koPts = 0, totalCorrect = 0, correctChampion = false;
    const koPickResults = {};

    for (const m of KO_MATCH_NUMS) {
      const pick      = koPicks[String(m)];
      const winner    = koResults[m];
      const threshold = cascadeThreshold(m);
      const isCascaded = pick && threshold > 0 &&
                         eliminatedInRound[pick] !== undefined &&
                         eliminatedInRound[pick] < threshold;

      if (!pick) {
        koPickResults[m] = { status: 'empty', pick: null, winner: winner || null };
      } else if (winner) {
        if (isCascaded) {
          // Team was knocked out before reaching this match — no points
          koPickResults[m] = { status: 'cascaded', pick, winner };
        } else {
          const isCorrect = pick === winner;
          if (isCorrect) {
            koPts += KO_POINTS[m] || 0;
            totalCorrect++;
            if (m === 104) correctChampion = true;
          }
          koPickResults[m] = { status: isCorrect ? 'correct' : 'wrong', pick, winner };
        }
      } else {
        // Match not yet played
        koPickResults[m] = { status: isCascaded ? 'cascaded' : 'pending', pick, winner: null };
      }
    }

    // Max possible KO pts = earned so far + points for every still-pending pick
    let koPossiblePts = koPts;
    for (const m of KO_MATCH_NUMS) {
      if (koPickResults[m].status === 'pending') {
        koPossiblePts += KO_POINTS[m] || 0;
      }
    }

    return { koPts, koPossiblePts, totalCorrect, correctChampion, koPickResults };
  }

  // ── Build combined list ───────────────────────────────────
  const combined = groupStandings.map(p => {
    const { koPts, koPossiblePts, totalCorrect: koCorrect, correctChampion, koPickResults } =
      evalKoPicks(koPicksData[p.name] || {});
    const grpCorrect = Object.values(p.pickResults || {}).filter(pr => pr.status === 'correct').length;
    return {
      ...p,
      groupPts: p.points,
      koPts,
      totalPts: p.points + koPts,
      maxPts: p.points + koPossiblePts,
      correctChampion,
      totalCorrect: grpCorrect + koCorrect,
      koPickResults,
    };
  });

  // Add any KO-only participants not in group standings
  Object.keys(koPicksData).forEach(name => {
    if (!combined.find(p => p.name === name)) {
      const { koPts, koPossiblePts, totalCorrect, correctChampion, koPickResults } =
        evalKoPicks(koPicksData[name]);
      combined.push({ name, points: 0, groupPts: 0, pickResults: {}, koPts,
        totalPts: koPts, maxPts: koPossiblePts, correctChampion, totalCorrect, koPickResults });
    }
  });

  // Sort: totalPts desc → correctChampion desc → totalCorrect desc → name asc
  combined.sort((a, b) =>
    (b.totalPts - a.totalPts) ||
    ((b.correctChampion ? 1 : 0) - (a.correctChampion ? 1 : 0)) ||
    (b.totalCorrect - a.totalCorrect) ||
    a.name.localeCompare(b.name)
  );

  return combined;
}

// ── Get KO team names for a match ─────────────────────────
function getKoTeams(m, bracketData, koResults) {
  // R32: from bracketData
  if (m >= 73 && m <= 88) {
    if (bracketData && bracketData.round_of_32 && bracketData.round_of_32[String(m)]) {
      const slot = bracketData.round_of_32[String(m)];
      return [slot.home, slot.away];
    }
    return ['TBD', 'TBD'];
  }
  // R16
  if (R16[m]) {
    const [f1, f2] = R16[m];
    return [koResults[f1] || `W${f1}`, koResults[f2] || `W${f2}`];
  }
  // QF
  if (QF[m]) {
    const [f1, f2] = QF[m];
    return [koResults[f1] || `W${f1}`, koResults[f2] || `W${f2}`];
  }
  // SF
  if (SF[m]) {
    const [f1, f2] = SF[m];
    return [koResults[f1] || `W${f1}`, koResults[f2] || `W${f2}`];
  }
  // 3rd place: losers of M101 and M102
  if (m === 103) {
    // To find losers we need to know the teams in 101 and 102
    const [sf1h, sf1a] = getKoTeams(101, bracketData, koResults);
    const [sf2h, sf2a] = getKoTeams(102, bracketData, koResults);
    const loser1 = koResults[101] ? (koResults[101] === sf1h ? sf1a : sf1h) : `L101`;
    const loser2 = koResults[102] ? (koResults[102] === sf2h ? sf2a : sf2h) : `L102`;
    return [loser1, loser2];
  }
  // Final: winners of M101 and M102
  if (m === 104) {
    return [koResults[101] || `W101`, koResults[102] || `W102`];
  }
  return ['TBD', 'TBD'];
}

  let rank = 1, prevPts = null, rows = '';
  combinedStandings.forEach((p, i) => {
    if (p.totalPts !== prevPts) { rank = i + 1; prevPts = p.totalPts; }

    const grpSquares = MATCHES.map(([num, , , , t1, t2]) => {
      const pr = p.pickResults[num] || { status: 'empty', pick: null, result: null };

        : 'Not played yet';
      return `<span class="sq sq-${pr.status}"
        data-match="${num}" data-teams="${t1} v ${t2}"
        data-pick="${myPick}" data-result="${res}" data-status="${pr.status}"></span>`;
    }).join('');

    // KO squares (32 matches) with round dividers after R32/R16/QF/SF
    const KO_ROUND_BREAKS = new Set([88, 96, 100, 102, 103]);
    const koSquareParts = [];
    for (const m of KO_MATCH_ORDER) {
      const pr = p.koPickResults[m] || { status: 'empty', pick: null, winner: null };
      const [t1, t2] = bracketData ? getKoTeams(m, bracketData, koResults) : ['TBD','TBD'];
      const teamsStr = `${t1} v ${t2}`;
      const pickStr = pr.pick || '—';
      const resultStr = pr.winner || 'Not played yet';
      koSquareParts.push(`<span class="sq sq-${pr.status}"
        data-match="M${m}" data-teams="${teamsStr}"
        data-pick="${pickStr}" data-result="${resultStr}" data-status="${pr.status}"></span>`);
      if (KO_ROUND_BREAKS.has(m)) koSquareParts.push('<span class="sq-divider"></span>');
    }
    const koSquares = koSquareParts.join('');

    const champPr = p.koPickResults[104] || { status: 'empty', pick: null };
    const champName = champPr.pick || '—';
    const champClass = champPr.status === 'correct'  ? 'champ-correct'
                     : champPr.status === 'wrong'    ? 'champ-wrong'
                     : champPr.status === 'cascaded' ? 'champ-cascaded'
                     : '';
    const champLabel = `<span class="champ-pick ${champClass}">${champName}</span>`;

    rows += `<tr>
      <td class="td-rank${topClass}">${rank}</td>
      <td class="td-name">${p.name}</td>
      <td class="td-grp-pts">${p.groupPts}</td>

      <td class="td-max-pts">${p.maxPts}</td>
      <td class="td-squares"><div class="squares-wrap">${koSquares}${champLabel}</div></td>
    </tr>`;
  });

  document.getElementById('koStandingsSection').innerHTML = `
    <p class="section-label">Knockout Standings</p>
    <div class="section-body">
      <div class="card">
        <table class="standings-table">

              <th>Knockout pts</th>
              <th>Total</th>
              <th>Max pts</th>
              <th class="th-squares">Picks <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--neutral-medium);font-size:0.68rem">(blue = correct · red = wrong · red italic = cascaded void · empty = pending)</span></th>
            </tr>

// ── Render KO bracket (KO mode) ───────────────────────────
function renderKoBracket(bracketData, koResults) {
  const el = document.getElementById('koBracketCard');
  if (!el) return;

  if (!bracketData) {
    el.innerHTML = '<div class="bracket-pending">Bracket data not available yet.</div>';
    return;
  }

  function mkCard(m) {
    const [h, a] = getKoTeams(m, bracketData, koResults);
    const winner = koResults[m];
    let homeCls = '', awayCls = '';
    if (winner) {
      homeCls = winner === h ? 'w' : 'l';
      awayCls = winner === a ? 'w' : 'l';
    }
    return matchCard(m, h, a, '', undefined, undefined, homeCls, awayCls);
  }

  // Determine podium teams
  const champion  = koResults[104] || null;
  const finalist1 = koResults[101] ? getKoTeams(101, bracketData, koResults)[0] : null;
  const finalist2 = koResults[101] ? getKoTeams(101, bracketData, koResults)[1] : null;
  let runnerUp = null;
  if (champion && koResults[104]) {
    const [f1, f2] = getKoTeams(104, bracketData, koResults);
    runnerUp = champion === f1 ? f2 : f1;
  }
  const thirdPlace = koResults[103] || null;
  const podiumHtml = buildPodiumHtml(champion, runnerUp, thirdPlace);

  el.innerHTML = buildBracketHtml(mkCard, { podiumHtml });
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));
}

// ── Compute scores ────────────────────────────────────────
function pickLabel(outcome, t1, t2) {
  if (outcome === 'W1')   return `${t1} win`;
  if (outcome === 'W2')   return `${t2} win`;
  if (outcome === 'Draw') return 'Draw';
  return '—';
}

function computeStandings(picksData, results) {
  return Object.entries(picksData).map(([name, picks]) => {
    let points = 0;
    const pickResults = {};
    MATCHES.forEach(([num, , , , t1, t2]) => {
      const result  = results[num];
      const pick    = picks[String(num)];
      if (result && pick) {
        const correct = pick === result.outcome;
        if (correct) points += 2;
        pickResults[num] = { status: correct ? 'correct' : 'wrong', pick, result };
      } else if (pick) {
        pickResults[num] = { status: 'pending', pick, result: null };
      } else {
        pickResults[num] = { status: 'empty', pick: null, result: null };
      }
    });
    return { name, points, pickResults };
  }).sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
}

// ── Group tables ─────────────────────────────────────────
// ── Group table card template (reusable across leaderboard + picks) ──
// teams: ordered array of team names
// stats: { teamName: {P,W,D,L,GF,GA,Pts} }
// opts.rowClassFn(team, index): returns CSS class string for each row
// opts.showGD: include GF/GA/GD columns (default false)
function renderGroupTableCard(grp, teams, stats, opts={}) {
  const { rowClassFn = () => '', showGD = false } = opts;
  const rows = teams.map((t, i) => {
    const s = stats[t] || {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};
    const rc = rowClassFn(t, i);
    const gdCell = showGD ? `<td>${s.GF}</td><td>${s.GA}</td><td>${(s.GF-s.GA)>=0?'+':''}${s.GF-s.GA}</td>` : '';
    return `<tr${rc ? ` class="${rc}"` : ''}><td class="td-team">${teamHtml(t)}</td><td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>${gdCell}<td class="td-pts">${s.Pts}</td></tr>`;
  }).join('');
  const gdHeaders = showGD ? `<th title="Goals for">GF</th><th title="Goals against">GA</th><th title="Goal difference">GD</th>` : '';
  return `<div class="group-table-card"><div class="group-table-header">Group ${grp}</div><div class="group-table"><table><thead><tr><th class="th-team">Team</th><th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>${gdHeaders}<th title="Points">Pts</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function renderGroupTables(results) {
  // Build team stats from MATCHES + results
  const groups = {};
  const stats  = {};

  MATCHES.forEach(([num, grp, , , t1, t2]) => {
    if (!groups[grp]) groups[grp] = [];
    if (!groups[grp].includes(t1)) groups[grp].push(t1);
    if (!groups[grp].includes(t2)) groups[grp].push(t2);

    [t1, t2].forEach(t => {
      if (!stats[t]) stats[t] = { P:0, W:0, D:0, L:0, GF:0, GA:0, Pts:0 };
    });

    const r = results[num];
    if (!r) return;

    stats[t1].P++; stats[t2].P++;
    stats[t1].GF += r.home; stats[t1].GA += r.away;
    stats[t2].GF += r.away; stats[t2].GA += r.home;

    if (r.outcome === 'W1') {
      stats[t1].W++; stats[t1].Pts += 3;
      stats[t2].L++;
    } else if (r.outcome === 'W2') {
      stats[t2].W++; stats[t2].Pts += 3;
      stats[t1].L++;
    } else {
      stats[t1].D++; stats[t1].Pts++;
      stats[t2].D++; stats[t2].Pts++;
    }
  });

  const completedGroups = Object.keys(groups)
    .filter(g => groups[g].some(t => stats[t] && stats[t].P > 0))
    .sort();

  if (!completedGroups.length) {
    document.getElementById('groupTablesCard').innerHTML =
      '<div class="state-msg"><span class="emoji">⚽</span>Group tables will appear once matches start on Jun 11.</div>';
    return;
  }

  // H2H stats between two teams using actual results
  function h2hStats(teamA, teamB, grpMatches) {
    let Pts = 0, GF = 0, GA = 0;
    grpMatches.forEach(([num, , , , t1, t2]) => {
      const r = results[num];
      if (!r) return;
      if (t1===teamA && t2===teamB) {
        GF += r.home; GA += r.away;
        if (r.outcome==='W1') Pts += 3;
        else if (r.outcome==='Draw') Pts += 1;
      } else if (t1===teamB && t2===teamA) {
        GF += r.away; GA += r.home;
        if (r.outcome==='W2') Pts += 3;
        else if (r.outcome==='Draw') Pts += 1;
      }
    });
    return { Pts, GF, GA };
  }

  // FIFA rankings for tiebreaker g (now global — see RANKINGS below)

  // ── Pass 1: compute sorted standings for all completed groups ──
  function sortedStandings(grp) {
    const order = GROUP_ORDER[grp] || groups[grp];
    const grpMatches = MATCHES.filter(([, g]) => g === grp);
    return [...order].sort((a, b) => {
      const sa = stats[a] || {Pts:0,GF:0,GA:0};
      const sb = stats[b] || {Pts:0,GF:0,GA:0};
      if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
      const ha = h2hStats(a, b, grpMatches), hb = h2hStats(b, a, grpMatches);
      if (hb.Pts !== ha.Pts) return hb.Pts - ha.Pts;
      if ((hb.GF-hb.GA) !== (ha.GF-ha.GA)) return (hb.GF-hb.GA) - (ha.GF-ha.GA);
      if (hb.GF !== ha.GF) return hb.GF - ha.GF;
      if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
      if (sb.GF !== sa.GF) return sb.GF - sa.GF;
      const ra = RANKINGS[a] ?? 999, rb = RANKINGS[b] ?? 999;
      if (ra !== rb) return ra - rb;
      return (GROUP_ORDER[grp]||groups[grp]).indexOf(a) - (GROUP_ORDER[grp]||groups[grp]).indexOf(b);
    });
  }

  // Is a group fully played? (all 6 matches have results)
  const isGroupDone    = grp => MATCHES.filter(([, g]) => g === grp).every(([n]) => results[n]);
  const isGroupStarted = grp => MATCHES.filter(([, g]) => g === grp).some(([n])  => results[n]);

  // Collect 3rd-place teams from all completed groups
  const thirdPlaceTeams = completedGroups.map(grp => {
    const s = sortedStandings(grp);
    return s[2] ? { team: s[2], grp, stats: stats[s[2]] || {Pts:0,GF:0,GA:0} } : null;
  }).filter(Boolean);

  // Sort 3rd-place teams (cross-group: overall stats only)
  const sortedThirds = [...thirdPlaceTeams].sort((a, b) => {
    const sa = a.stats, sb = b.stats;
    if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
    if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
    if (sb.GF !== sa.GF) return sb.GF - sa.GF;
    return (RANKINGS[a.team]??999) - (RANKINGS[b.team]??999);
  });

  const allGroupsDone    = completedGroups.length === 12 && completedGroups.every(isGroupDone);
  const allGroupsStarted = completedGroups.length === 12 && completedGroups.every(isGroupStarted);
  const qualifiedThirds = new Set(sortedThirds.slice(0, 8).map(t => t.team));

  // ── Pass 2: render each group ──────────────────────────────
  const cards = completedGroups.map(grp => {
    const teams = sortedStandings(grp);
    const grpStarted = isGroupStarted(grp);

    const rowClassFn = (t, i) => {
      if (i < 2) return 'qualified';
      if (i === 2) {
        if (allGroupsStarted) return qualifiedThirds.has(t) ? 'third-qual' : 'eliminated';
        return 'third-pending';
      }
      return grpStarted ? 'eliminated' : '';
    };

    return renderGroupTableCard(grp, teams, stats, { rowClassFn, showGD: true });
  }).join('');

  const legend = `<div style="display:flex;gap:16px;flex-wrap:wrap;padding:8px 0 4px;font-size:0.72rem;color:var(--neutral-dark)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:var(--blue-lightest);border:1px solid var(--swiftly-blue);display:inline-block"></span>Qualified (top 2)</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#e6f9ef;border:1px solid #22863a;display:inline-block"></span>3rd — qualified</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fff8e6;border:1px solid #ff9e16;display:inline-block"></span>3rd — pending</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fdf0f0;border:1px solid #e24b4a;display:inline-block"></span>Eliminated</span>
  </div>`;

  document.getElementById('groupTablesCard').innerHTML =
    `<div class="group-tables-grid">${cards}</div>${legend}`;
}

// R32_SLOTS, THIRD_MATCH_COL, R16/QF/SF bracket topology come from bracket.js

function computeBracket(grpStandings, qualifiedThirds, results) {
  // Build position lookup
  const pos = {};
  Object.entries(grpStandings).forEach(([grp, teams]) => {
    if (teams[0]) pos[`1${grp}`] = teams[0][0];
    if (teams[1]) pos[`2${grp}`] = teams[1][0];
    if (teams[2]) pos[`3${grp}`] = teams[2][0];
  });

  // 3rd place combination lookup
  const qualGroups = qualifiedThirds.slice(0,8).map(([g]) => g).sort().join('');
  const combo = THIRD_COMBOS[qualGroups];
  const thirdSlot = {}; // match → team
  if (combo) {
    [79,85,81,74,82,77,87,80].forEach((m,i) => {
      const grp = combo[i];
      thirdSlot[m] = pos[`3${grp}`] || `3${grp}`;
    });
  } else {
    [79,85,81,74,82,77,87,80].forEach(m => { thirdSlot[m] = 'TBD'; });
  }

  // Resolve team for a slot string
  function slotTeam(slot) {
    if (slot.startsWith('3M')) {
      const m = parseInt(slot.slice(2));
      return thirdSlot[m] || 'TBD';
    }
    return pos[slot] || slot;
  }

  // Build R32 matchups
  const r32teams = {};
  Object.entries(R32_SLOTS).forEach(([m, [h, a]]) => {
    r32teams[+m] = [slotTeam(h), slotTeam(a)];
  });

  return { pos, thirdSlot, r32teams, combo: !!combo, qualGroups };
}

// Compute group standings from results (self-contained — no external deps)
function computeGroupStandings(results) {
  const GRP_MATCHES = [
    [1,'A','Mexico','South Africa'],[2,'A','South Korea','Czech Republic'],
    [3,'B','Canada','Bosnia and Herzegovina'],[4,'D','United States','Paraguay'],
    [5,'C','Haiti','Scotland'],[6,'D','Australia','Turkey'],
    [7,'C','Brazil','Morocco'],[8,'B','Qatar','Switzerland'],
    [9,'E','Ivory Coast','Ecuador'],[10,'E','Germany','Curaçao'],
    [11,'F','Netherlands','Japan'],[12,'F','Sweden','Tunisia'],
    [13,'H','Saudi Arabia','Uruguay'],[14,'H','Spain','Cape Verde'],
    [15,'G','Iran','New Zealand'],[16,'G','Belgium','Egypt'],
    [17,'I','France','Senegal'],[18,'I','Iraq','Norway'],
    [19,'J','Argentina','Algeria'],[20,'J','Austria','Jordan'],
    [21,'L','Ghana','Panama'],[22,'L','England','Croatia'],
    [23,'K','Portugal','DR Congo'],[24,'K','Uzbekistan','Colombia'],
    [25,'A','Czech Republic','South Africa'],[26,'B','Switzerland','Bosnia and Herzegovina'],
    [27,'B','Canada','Qatar'],[28,'A','Mexico','South Korea'],
    [29,'C','Brazil','Haiti'],[30,'C','Scotland','Morocco'],
    [31,'D','Turkey','Paraguay'],[32,'D','United States','Australia'],
    [33,'E','Germany','Ivory Coast'],[34,'E','Ecuador','Curaçao'],
    [35,'F','Netherlands','Sweden'],[36,'F','Tunisia','Japan'],
    [37,'H','Uruguay','Cape Verde'],[38,'H','Spain','Saudi Arabia'],
    [39,'G','Belgium','Iran'],[40,'G','New Zealand','Egypt'],
    [41,'I','Norway','Senegal'],[42,'I','France','Iraq'],
    [43,'J','Argentina','Austria'],[44,'J','Jordan','Algeria'],
    [45,'L','England','Ghana'],[46,'L','Panama','Croatia'],
    [47,'K','Portugal','Uzbekistan'],[48,'K','Colombia','DR Congo'],
    [49,'C','Scotland','Brazil'],[50,'C','Morocco','Haiti'],
    [51,'B','Switzerland','Canada'],[52,'B','Bosnia and Herzegovina','Qatar'],
    [53,'A','Czech Republic','Mexico'],[54,'A','South Africa','South Korea'],
    [55,'E','Curaçao','Ivory Coast'],[56,'E','Ecuador','Germany'],
    [57,'F','Japan','Sweden'],[58,'F','Tunisia','Netherlands'],
    [59,'D','Turkey','United States'],[60,'D','Paraguay','Australia'],
    [61,'I','Norway','France'],[62,'I','Senegal','Iraq'],
    [63,'G','Egypt','Iran'],[64,'G','New Zealand','Belgium'],
    [65,'H','Cape Verde','Saudi Arabia'],[66,'H','Uruguay','Spain'],
    [67,'L','Panama','England'],[68,'L','Croatia','Ghana'],
    [69,'J','Algeria','Austria'],[70,'J','Jordan','Argentina'],
    [71,'K','Colombia','Portugal'],[72,'K','DR Congo','Uzbekistan'],
  ];
  const grpOrder = {
    A:['Mexico','South Africa','South Korea','Czech Republic'],
    B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
    C:['Brazil','Morocco','Haiti','Scotland'],
    D:['United States','Paraguay','Australia','Turkey'],
    E:['Germany','Curaçao','Ivory Coast','Ecuador'],
    F:['Netherlands','Japan','Sweden','Tunisia'],
    G:['Belgium','Egypt','Iran','New Zealand'],
    H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],
    I:['France','Senegal','Iraq','Norway'],
    J:['Argentina','Algeria','Austria','Jordan'],
    K:['Portugal','DR Congo','Uzbekistan','Colombia'],
    L:['England','Croatia','Ghana','Panama'],
  };
  const stats = {}, grpMatches = {};
  GRP_MATCHES.forEach(([num,grp,t1,t2]) => {
    [t1,t2].forEach(t => { if (!stats[t]) stats[t] = {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}; });
    if (!grpMatches[grp]) grpMatches[grp] = [];
    grpMatches[grp].push([num,grp,t1,t2]);
    const r = results[num]; if (!r) return;
    stats[t1].P++; stats[t2].P++;
    stats[t1].GF += r.home; stats[t1].GA += r.away;
    stats[t2].GF += r.away; stats[t2].GA += r.home;
    if (r.outcome==='W1') { stats[t1].W++; stats[t1].Pts+=3; stats[t2].L++; }
    else if (r.outcome==='W2') { stats[t2].W++; stats[t2].Pts+=3; stats[t1].L++; }
    else { stats[t1].D++; stats[t1].Pts++; stats[t2].D++; stats[t2].Pts++; }
  });
  const grpStandings = {};
  Object.keys(grpOrder).forEach(grp => {
    const gm = grpMatches[grp] || [];
    grpStandings[grp] = [...grpOrder[grp]].sort((a,b) => {
      const sa=stats[a]||{Pts:0,GF:0,GA:0}, sb=stats[b]||{Pts:0,GF:0,GA:0};
      if (sb.Pts!==sa.Pts) return sb.Pts-sa.Pts;
      if ((sb.GF-sb.GA)!==(sa.GF-sa.GA)) return (sb.GF-sb.GA)-(sa.GF-sa.GA);
      if (sb.GF!==sa.GF) return sb.GF-sa.GF;
      return (RANKINGS[a]??999)-(RANKINGS[b]??999);
    }).map(t => [t, stats[t]||{P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}]);
  });
  // Best 8 thirds
  const thirds = Object.entries(grpStandings)
    .filter(([,ts]) => ts.length>=3 && ts[2][1].P>0)
    .map(([grp,ts]) => [grp, ts[2][0], ts[2][1]])
    .sort((a,b) => (b[2].Pts-a[2].Pts)||((b[2].GF-b[2].GA)-(a[2].GF-a[2].GA))||(b[2].GF-a[2].GF)||((RANKINGS[a[1]]??999)-(RANKINGS[b[1]]??999)));
  return { grpStandings, thirds };
}

// ── Bracket rendering (Variant 1 — read-only, group-results-derived) ──────────
// buildBracketHtml, positionAndConnectBracket, drawBracketConnectors → bracket.js
function renderBracket(results, allGroupsStarted, bracketConfirmed) {
  const el = document.getElementById('bracketCard');

  if (!allGroupsStarted) {
    el.innerHTML = '<div class="bracket-pending">Bracket appears once all groups have kicked off.</div>';
    return;
  }

  // confirmed=true only when parse_results.py has cross-checked R32 against Wikipedia
  const isConfirmed = bracketConfirmed === true;
  const statusBadge = isConfirmed
    ? '<span style="margin-left:8px;font-size:0.6rem;background:#22863a;color:#fff;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Confirmed ✓</span>'
    : '<span style="margin-left:8px;font-size:0.6rem;background:#ff9e16;color:#131e27;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Provisional</span>';
  const bracketLabel = document.querySelector('[onclick*="bracket"]');
  if (bracketLabel && !bracketLabel.querySelector('.bracket-badge')) {
    const span = document.createElement('span');
    span.className = 'bracket-badge';
    span.innerHTML = statusBadge;
    bracketLabel.appendChild(span);
  }

  const { grpStandings, thirds } = computeGroupStandings(results);
  const { r32teams } = computeBracket(grpStandings, thirds, results);

  // Resolve teams for a match slot — returns [home, away]
  function slotTeams(m) {
    if (r32teams[m]) return r32teams[m];
    if (R16[m])  return [`W${R16[m][0]}`, `W${R16[m][1]}`];
    if (QF[m])   return [`W${QF[m][0]}`,  `W${QF[m][1]}`];
    if (SF[m])   return [`W${SF[m][0]}`,  `W${SF[m][1]}`];
    if (m===103) return ['L101','L102'];
    if (m===104) return ['W101','W102'];
    return ['TBD','TBD'];
  }

  // mkCard: builds a read-only match card using shared matchCard() from bracket.js
  function mkCard(m) {
    const [h, a] = slotTeams(m);
    return matchCard(m, h, a, '');
  }

  // Podium: shown here temporarily for preview — will be Variant 2/3 only once built.
  // champion/runnerUp/thirdPlace come from knockout results (not yet available in Variant 1).
  // All three pass null until knockout results are wired up.
  const podiumHtml = buildPodiumHtml(null, null, null); // TODO: pass actual KO results (Variant 3)

  el.innerHTML = buildBracketHtml(mkCard, { podiumHtml });
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));
}

// ── Tooltip ───────────────────────────────────────────────
const tooltip = document.getElementById('sq-tooltip');

document.addEventListener('mouseover', e => {
  const sq = e.target.closest('.sq');
  if (!sq) { tooltip.style.display = 'none'; return; }

  const match  = sq.dataset.match;
  const teams  = sq.dataset.teams;
  const pick   = sq.dataset.pick;
  const result = sq.dataset.result;
  const status = sq.dataset.status;

  const statusText = status === 'correct'  ? '✓ Correct'
                   : status === 'wrong'    ? '✗ Wrong'
                   : status === 'cascaded' ? '⚡ Void — team eliminated earlier'
                   : status === 'pending'  ? '⏳ Pending'
                   : '—';

  tooltip.innerHTML = `
    <div class="tt-match">Match ${match} · ${teams}</div>
    <div class="tt-pick">Your pick: <strong>${pick}</strong></div>
    <div class="tt-result">Result: ${result}</div>
    <div class="tt-status ${status}">${statusText}</div>
  `;
  tooltip.style.display = 'block';
});

document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'none') return;
  const x = e.clientX + 14, y = e.clientY + 14;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth  ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? y - th - 28 : y) + 'px';
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.sq')) tooltip.style.display = 'none';
});

// ── Main ──────────────────────────────────────────────────
async function init(skipBracket = false) {
  try {
    let picksData, resultsCSV, koPicksData = {}, koResultsCSV = '';
    let bracketData = null;

    if (USE_LOCAL_DATA) {
      // Show dev override input
      document.getElementById('devOverride').style.display = '';

      // Read override value (0–32); empty = all 32 played
      const devInput = document.getElementById('devGamesInput');
      const koN = devInput.value !== '' ? Math.max(0, Math.min(32, parseInt(devInput.value, 10))) : 32;

      // Group results always fully played
      resultsCSV = LOCAL_RESULTS_CSV;

      // Slice KO results to first koN matches
      const allKoLines  = LOCAL_KO_RESULTS_CSV.trim().split('\n');
      const koHeader    = allKoLines[0];
      const koDataLines = allKoLines.slice(1).slice(0, koN);
      koResultsCSV = [koHeader, ...koDataLines].join('\n');

      picksData   = LOCAL_PICKS;
      koPicksData = LOCAL_KO_PICKS;
      bracketData = LOCAL_BRACKET_DATA;
    } else {
      const ts = Date.now();
      const [picksResp, resultsResp, bracketResp, koPicksResp, koResultsResp] = await Promise.all([
        fetch(`${PICKS_URL}?t=${ts}`),
        fetch(`${RESULTS_URL}?t=${ts}`),
        fetch(`${BRACKET_URL}?t=${ts}`).catch(() => null),
        fetch(`${KO_PICKS_URL}?t=${ts}`).catch(() => null),
        fetch(`${KO_RESULTS_URL}?t=${ts}`).catch(() => null),
      ]);
      if (!picksResp.ok) throw new Error('Could not load picks');
      if (!resultsResp.ok) throw new Error('Could not load results');
      picksData  = await picksResp.json();
      resultsCSV = await resultsResp.text();
      if (bracketResp?.ok) bracketData = await bracketResp.json();
      if (koPicksResp?.ok) koPicksData = await koPicksResp.json();
      if (koResultsResp?.ok) koResultsCSV = await koResultsResp.text();
    }

    const results   = parseResults(resultsCSV);
    const koResults = parseKoResults(koResultsCSV);
    const standings = computeStandings(picksData, results);
    const played    = Object.keys(results).length;
    const koPlayed  = Object.keys(koResults).length;

    // Sticky bar
    if (knockoutMode) {
      document.getElementById('stageLabel').textContent = 'Knockout stage';
      document.getElementById('matchesPlayed').textContent = `${koPlayed} / 32 knockout matches played`;
      document.getElementById('progressFill').style.width = `${(koPlayed / 32) * 100}%`;
    } else {
      document.getElementById('matchesPlayed').textContent = `${played} / 72 matches played`;
      document.getElementById('progressFill').style.width = `${(played / 72) * 100}%`;
    }
    document.getElementById('updatedAt').textContent =
      `Updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

    const GRP_SAMPLE = {A:1,B:3,C:5,D:4,E:9,F:11,G:15,H:13,I:17,J:19,K:23,L:21};
    const allGrpsStarted = Object.values(GRP_SAMPLE).every(m => results[m]);
    const bracketConfirmed = bracketData ? bracketData.confirmed === true : false;

    if (knockoutMode) {
      const combined = computeCombinedStandings(standings, koPicksData, koResults, bracketData);
      renderKoStandings(combined, koResults, bracketData);
      if (!skipBracket) renderKoBracket(bracketData, koResults);
      renderStandings(standings, results);  // group-only in group section
    } else {
      renderStandings(standings, results);
    }

    renderResults(results);
    renderGroupTables(results);
    renderBracket(results, allGrpsStarted, bracketConfirmed);

  } catch (err) {
    const msg = `<div class="state-msg"><span class="emoji">⚠️</span>${err.message}</div>`;
    ['standingsCard','resultsCard','groupTablesCard','bracketCard','koBracketCard'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = msg;
    });
    document.getElementById('koStandingsSection').innerHTML = msg;
    document.getElementById('matchesPlayed').textContent = 'Could not load data';
  }
}

setupLayout();

if (USE_LOCAL_DATA) {
  document.getElementById('devGamesInput').addEventListener('change', () => init(true));
}
init();
