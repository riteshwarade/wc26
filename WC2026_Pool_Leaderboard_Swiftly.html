<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC2026 Leaderboard – Swiftly</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--swiftly-blue);
    padding: 28px 0 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .header-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: #ffffff;
  }

  .header-subtitle {
    font-size: 0.875rem;
    color: var(--blue-light);
  }

  /* ── Sticky bar ── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    padding: 10px 0;
  }

  .sticky-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .matches-played {
    font-size: 0.875rem;
    font-weight: 700;
    color: var(--swiftly-blue);
  }

  .updated-at {
    font-size: 0.72rem;
    color: var(--neutral-medium);
    margin-left: auto;
  }

  /* ── Container ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    user-select: none;
  }

  .section-label:hover { color: var(--swiftly-blue); }

  .section-chevron {
    font-size: 0.65rem;
    transition: transform 0.2s ease;
    display: inline-block;
  }

  .section-collapsed .section-chevron { transform: rotate(-90deg); }

  .section-body {
    overflow: hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease;
    max-height: 9999px;
    opacity: 1;
    margin-bottom: 32px;
  }

  .section-body.collapsed {
    max-height: 0;
    opacity: 0;
    margin-bottom: 0;
  }

  /* ── Card ── */
  .card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
    margin-bottom: 32px;
  }

  /* ── Standings table ── */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .standings-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .standings-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .standings-table th.th-squares { text-align: center; }

  .standings-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
    transition: background 0.12s;
  }

  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }
  .standings-table tbody tr:hover { background: var(--blue-lightest); }

  .standings-table td {
    padding: 8px 12px;
    vertical-align: middle;
  }

  .td-rank {
    font-weight: 700;
    color: var(--neutral-medium);
    font-size: 0.78rem;
    width: 36px;
    text-align: center;
  }

  .td-rank.top3 { color: var(--swiftly-blue); }

  .td-name {
    font-weight: 700;
    color: var(--neutral-darkest);
    min-width: 120px;
  }

  .td-points {
    font-weight: 700;
    color: var(--swiftly-blue);
    font-size: 0.78rem;
    width: 56px;
    text-align: center;
  }

  .td-squares { width: 100%; }

  /* ── Mini squares ── */
  .squares-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 2px 0;
  }

  .sq {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .sq-correct { background: var(--swiftly-blue); }
  .sq-wrong   { background: var(--neutral-light); }
  .sq-pending { background: transparent; border: 1px solid var(--neutral-light); }
  .sq-empty   { background: transparent; }
  .sq         { cursor: pointer; }

  /* ── Tooltip ── */
  #sq-tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--neutral-darkest);
    color: #ffffff;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 0.78rem;
    pointer-events: none;
    display: none;
    max-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    line-height: 1.5;
  }

  #sq-tooltip .tt-match  { font-weight: 700; margin-bottom: 4px; color: var(--blue-light); }
  #sq-tooltip .tt-pick   { margin-bottom: 2px; }
  #sq-tooltip .tt-result { margin-bottom: 4px; color: var(--neutral-medium); }
  #sq-tooltip .tt-status { font-weight: 700; }
  #sq-tooltip .tt-status.correct { color: #5ce65c; }
  #sq-tooltip .tt-status.wrong   { color: #ff6b6b; }
  #sq-tooltip .tt-status.pending { color: var(--neutral-medium); }

  /* ── Results table ── */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .results-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .results-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .results-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .results-table td {
    padding: 5px 12px;
    vertical-align: middle;
  }

  /* Compact columns: shrink to content */
  .td-match-num, .td-grp, .td-score, .td-date, .td-time, .td-result {
    width: 1%;
    white-space: nowrap;
  }

  .td-match-num { color: var(--neutral-medium); font-weight: 700; text-align: center; }
  .td-grp       { color: var(--swiftly-blue); font-weight: 700; }
  .td-score     { font-weight: 700; color: var(--neutral-darkest); }
  .td-teams     { font-weight: 700; color: var(--neutral-darkest); min-width: 160px; }

  .outcome-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 3px 8px;
    border-radius: 5px;
    border: 1.5px solid var(--swiftly-blue);
    background: var(--swiftly-blue);
    color: #ffffff;
    font-size: 0.78rem;
    font-weight: 700;
    white-space: nowrap;
  }

  .outcome-pill.draw {
    border-color: var(--neutral-dark);
    background: var(--neutral-dark);
    color: #ffffff;
  }

  /* ── Side-by-side layout ── */
  .side-by-side-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .side-left {
    width: 380px;
    flex-shrink: 0;
  }

  .side-right {
    flex: 1;
    min-width: 0;
  }

  /* ── Group tables ── */
  .group-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .group-table-card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
  }

  .group-table-header {
    background: var(--swiftly-blue);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 7px 12px;
  }

  .group-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .group-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table th {
    padding: 5px 8px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
  }

  .group-table th.th-team { text-align: left; }
  .group-table td.td-team { min-width: 130px; }
  .group-table td:not(.td-team), .group-table th:not(.th-team) { white-space: nowrap; width: 1%; }

  .group-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table tbody tr:last-child { border-bottom: none; }
  .group-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .group-table td {
    padding: 5px 8px;
    text-align: center;
    color: var(--neutral-darkest);
  }

  .group-table td.td-team {
    text-align: left;
    font-weight: 700;
  }

  .group-table td.td-pts {
    font-weight: 700;
    color: var(--swiftly-blue);
  }

  .group-table tr.qualified      td { background: var(--blue-lightest); }
  .group-table tr.third-qual     td { background: #e6f9ef; }
  .group-table tr.third-pending  td { background: #fff8e6; }
  .group-table tr.eliminated     td { background: #fdf0f0; color: var(--neutral-medium); }
  .group-table tr.eliminated td.td-team { color: var(--neutral-dark); }

  /* ── Knockout bracket ── */
  .bk-wrap {
    overflow-x: auto;
    padding: 14px 4px 18px;
  }
  .bk-bracket {
    display: flex;
    gap: 0;
    min-width: max-content;
    align-items: flex-start;
    position: relative;
  }
  .bk-col {
    width: 168px;
    flex-shrink: 0;
    padding: 0 14px;
  }
  .bk-col-hdr {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid;
    margin-bottom: 10px;
  }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }
  /* R32 anchor column: nested flex with hierarchy gaps */
  .bk-matches  { display: flex; flex-direction: column; gap: 52px; }
  .bk-half     { display: flex; flex-direction: column; gap: 28px; }
  .bk-quarter  { display: flex; flex-direction: column; gap: 14px; }
  .bk-pair     { display: flex; flex-direction: column; gap: 6px; }
  /* R16/QF/SF/Final: cards absolutely positioned by JS to align with R32 anchors */
  .bk-float    { position: relative; }  /* wraps absolutely-positioned cards */
  .bk-float .bk-card { position: absolute; left: 0; right: 0; }
  .bk-3rd-lbl { position: absolute; left: 0; right: 0; font-size: 0.6rem;
    text-transform: uppercase; letter-spacing: 0.6px; color: var(--neutral-medium);
    text-align: center; font-weight: 500; }
  .bk-card {
    background: #ffffff;
    border: 0.5px solid var(--neutral-light);
    border-radius: 8px;
    overflow: hidden;
  }
  .bk-mnum {
    font-size: 0.65rem;
    color: var(--neutral-medium);
    text-align: right;
    padding: 2px 8px;
    background: var(--neutral-lightest);
    letter-spacing: 0.2px;
  }
  .bk-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 8px;
    font-size: 0.78rem;
  }
  .bk-team + .bk-team { border-top: 0.5px solid var(--neutral-light); }
  .bk-fl { font-size: 0.85rem; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
  .bk-tn { flex: 1; font-weight: 600; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-sc { font-size: 0.78rem; font-weight: 700; color: var(--neutral-medium); min-width: 12px; text-align: right; flex-shrink: 0; }
  .bk-team.tbd .bk-fl { opacity: 0.25; }
  .bk-team.tbd .bk-tn { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-team.w { background: var(--blue-lightest); }
  .bk-team.w .bk-tn { color: #042C53; font-weight: 700; }
  .bk-team.w .bk-sc { color: #185FA5; }
  .bk-team.l .bk-fl { opacity: 0.35; }
  .bk-team.l .bk-tn { color: var(--neutral-medium); font-weight: 400; }
  .bk-team.l .bk-sc { color: var(--neutral-light2); }
  .bk-pens {
    font-size: 0.58rem;
    color: var(--neutral-medium);
    padding: 1px 8px 3px;
    font-style: italic;
    text-align: right;
    background: var(--neutral-lightest);
    border-top: 0.5px solid var(--neutral-light);
  }
  .bk-3rd-sep {
    font-size: 0.58rem;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--neutral-medium);
    text-align: center;
    margin-top: 14px;
    padding-top: 10px;
    border-top: 0.5px solid var(--neutral-light);
    margin-bottom: 6px;
  }
  .bk-3rd-card { opacity: 0.65; }
  .bracket-pending {
    font-size: 0.82rem;
    color: var(--neutral-dark);
    text-align: center;
    padding: 32px 16px;
    font-style: italic;
  }

  /* ── Loading / error states ── */
  .state-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--neutral-dark);
    font-size: 0.875rem;
  }

  .state-msg .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 pool — Leaderboard</div>
    <div class="header-subtitle" id="headerSubtitle">Swiftly pool · group stage</div>
  </div>
</header>

<div class="sticky-bar">
  <div class="sticky-inner">
    <span class="matches-played" id="matchesPlayed">Loading…</span>
    <span class="updated-at" id="updatedAt"></span>
  </div>
</div>

<div id="sq-tooltip"></div>

<div class="container">

  <p class="section-label" onclick="toggleSection('standings')">
    <span class="section-chevron">▼</span> Standings
  </p>
  <div class="section-body" id="standings-body">
    <div class="card" id="standingsCard">
      <div class="state-msg"><span class="emoji">⏳</span>Loading picks and results…</div>
    </div>
  </div>

  <div class="side-by-side-layout">
    <div class="side-left">
      <p class="section-label" onclick="toggleSection('groups')">
        <span class="section-chevron">▼</span> Group tables
      </p>
      <div class="section-body" id="groups-body">
        <div id="groupTablesCard">
          <div class="state-msg"><span class="emoji">⏳</span>Loading…</div>
        </div>
      </div>
    </div>
    <div class="side-right">
      <p class="section-label" onclick="toggleSection('results')">
        <span class="section-chevron">▼</span> Match results
      </p>
      <div class="section-body" id="results-body">
        <div class="card" id="resultsCard">
          <div class="state-msg"><span class="emoji">⏳</span>Loading…</div>
        </div>
      </div>
    </div>
  </div>

  <p class="section-label" onclick="toggleSection('bracket')">
    <span class="section-chevron">▼</span> Knockout bracket
  </p>
  <div class="section-body" id="bracket-body">
    <div id="bracketCard">
      <div class="state-msg"><span class="emoji">⏳</span>Loading…</div>
    </div>
  </div>

</div>

// ── Parse results CSV ─────────────────────────────────────
function parseResults(csvText) {
  const results = {};
  csvText.trim().split('\n').slice(1).forEach(line => {
    const [match, home, away, outcome] = line.split(',');
    const num = parseInt(match);
    if (num && outcome) {
      results[num] = { home: parseInt(home), away: parseInt(away), outcome: outcome.trim() };
    }
  });
  return results;
}

// ── Compute scores ────────────────────────────────────────
function pickLabel(outcome, t1, t2) {
  if (outcome === 'W1')   return `${t1} win`;
  if (outcome === 'W2')   return `${t2} win`;
  if (outcome === 'Draw') return 'Draw';
  return '—';
}

function computeStandings(picksData, results) {
  return Object.entries(picksData).map(([name, picks]) => {
    let points = 0;
    const pickResults = {};
    MATCHES.forEach(([num, , , , t1, t2]) => {
      const result  = results[num];
      const pick    = picks[String(num)];
      if (result && pick) {
        const correct = pick === result.outcome;
        if (correct) points += 2;
        pickResults[num] = { status: correct ? 'correct' : 'wrong', pick, result };
      } else if (pick) {
        pickResults[num] = { status: 'pending', pick, result: null };
      } else {
        pickResults[num] = { status: 'empty', pick: null, result: null };
      }
    });
    return { name, points, pickResults };
  }).sort((a, b) => b.points - a.points || a.name.localeCompare(b.name));
}

function renderStandings(standings, results) {
  if (!standings.length) {
    document.getElementById('standingsCard').innerHTML =

    return;
  }

  const completedNums = new Set(Object.keys(results).map(Number));

  let rank = 1, prevPts = null, rows = '';
  standings.forEach((p, i) => {
    if (p.points !== prevPts) { rank = i + 1; prevPts = p.points; }
    const topClass = rank <= 3 ? ' top3' : '';
    const squares = MATCHES.map(([num, , , , t1, t2]) => {
      const pr = p.pickResults[num] || { status: 'empty', pick: null, result: null };
      const myPick = pr.pick ? pickLabel(pr.pick, t1, t2) : '—';
      const res = pr.result
        ? `${pr.result.home}–${pr.result.away} (${pickLabel(pr.result.outcome, t1, t2)})`
        : 'Not played yet';
      return `<span class="sq sq-${pr.status}"
        data-match="${num}" data-teams="${t1} v ${t2}"
        data-pick="${myPick}" data-result="${res}" data-status="${pr.status}"></span>`;
    }).join('');
    rows += `<tr>
      <td class="td-rank${topClass}">${rank}</td>
      <td class="td-name">${p.name}</td>
      <td class="td-points">${p.points}</td>
      <td class="td-squares"><div class="squares-wrap">${squares}</div></td>

  document.getElementById('standingsCard').innerHTML = `

// ── Group tables ─────────────────────────────────────────
function renderGroupTables(results) {
  // Build team stats from MATCHES + results
  const groups = {};
  const stats  = {};

  MATCHES.forEach(([num, grp, , , t1, t2]) => {
    if (!groups[grp]) groups[grp] = [];
    if (!groups[grp].includes(t1)) groups[grp].push(t1);
    if (!groups[grp].includes(t2)) groups[grp].push(t2);

    [t1, t2].forEach(t => {
      if (!stats[t]) stats[t] = { P:0, W:0, D:0, L:0, GF:0, GA:0, Pts:0 };
    });

    const r = results[num];
    if (!r) return;

    stats[t1].P++; stats[t2].P++;
    stats[t1].GF += r.home; stats[t1].GA += r.away;
    stats[t2].GF += r.away; stats[t2].GA += r.home;

    if (r.outcome === 'W1') {
      stats[t1].W++; stats[t1].Pts += 3;
      stats[t2].L++;
    } else if (r.outcome === 'W2') {
      stats[t2].W++; stats[t2].Pts += 3;
      stats[t1].L++;
    } else {
      stats[t1].D++; stats[t1].Pts++;
      stats[t2].D++; stats[t2].Pts++;
    }
  });

  const completedGroups = Object.keys(groups)
    .filter(g => groups[g].some(t => stats[t] && stats[t].P > 0))
    .sort();

  if (!completedGroups.length) {
    document.getElementById('groupTablesCard').innerHTML =
      '<div class="state-msg"><span class="emoji">⚽</span>Group tables will appear once matches start on Jun 11.</div>';
    return;
  }

  // H2H stats between two teams using actual results
  function h2hStats(teamA, teamB, grpMatches) {
    let Pts = 0, GF = 0, GA = 0;
    grpMatches.forEach(([num, , , , t1, t2]) => {
      const r = results[num];
      if (!r) return;
      if (t1===teamA && t2===teamB) {
        GF += r.home; GA += r.away;
        if (r.outcome==='W1') Pts += 3;
        else if (r.outcome==='Draw') Pts += 1;
      } else if (t1===teamB && t2===teamA) {
        GF += r.away; GA += r.home;
        if (r.outcome==='W2') Pts += 3;
        else if (r.outcome==='Draw') Pts += 1;
      }
    });
    return { Pts, GF, GA };
  }

  // FIFA rankings for tiebreaker g (now global — see LB_RANKINGS below)

  // ── Pass 1: compute sorted standings for all completed groups ──
  function sortedStandings(grp) {
    const order = GROUP_ORDER[grp] || groups[grp];
    const grpMatches = MATCHES.filter(([, g]) => g === grp);
    return [...order].sort((a, b) => {
      const sa = stats[a] || {Pts:0,GF:0,GA:0};
      const sb = stats[b] || {Pts:0,GF:0,GA:0};
      if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
      const ha = h2hStats(a, b, grpMatches), hb = h2hStats(b, a, grpMatches);
      if (hb.Pts !== ha.Pts) return hb.Pts - ha.Pts;
      if ((hb.GF-hb.GA) !== (ha.GF-ha.GA)) return (hb.GF-hb.GA) - (ha.GF-ha.GA);
      if (hb.GF !== ha.GF) return hb.GF - ha.GF;
      if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
      if (sb.GF !== sa.GF) return sb.GF - sa.GF;
      const ra = LB_RANKINGS[a] ?? 999, rb = LB_RANKINGS[b] ?? 999;
      if (ra !== rb) return ra - rb;
      return (GROUP_ORDER[grp]||groups[grp]).indexOf(a) - (GROUP_ORDER[grp]||groups[grp]).indexOf(b);
    });
  }

  // Is a group fully played? (all 6 matches have results)
  const isGroupDone    = grp => MATCHES.filter(([, g]) => g === grp).every(([n]) => results[n]);
  const isGroupStarted = grp => MATCHES.filter(([, g]) => g === grp).some(([n])  => results[n]);

  // Collect 3rd-place teams from all completed groups
  const thirdPlaceTeams = completedGroups.map(grp => {
    const s = sortedStandings(grp);
    return s[2] ? { team: s[2], grp, stats: stats[s[2]] || {Pts:0,GF:0,GA:0} } : null;
  }).filter(Boolean);

  // Sort 3rd-place teams (cross-group: overall stats only)
  const sortedThirds = [...thirdPlaceTeams].sort((a, b) => {
    const sa = a.stats, sb = b.stats;
    if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
    if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
    if (sb.GF !== sa.GF) return sb.GF - sa.GF;
    return (LB_RANKINGS[a.team]??999) - (LB_RANKINGS[b.team]??999);
  });

  const allGroupsDone    = completedGroups.length === 12 && completedGroups.every(isGroupDone);
  const allGroupsStarted = completedGroups.length === 12 && completedGroups.every(isGroupStarted);
  const qualifiedThirds = new Set(sortedThirds.slice(0, 8).map(t => t.team));

  // ── Pass 2: render each group ──────────────────────────────
  const cards = completedGroups.map(grp => {
    const teams = sortedStandings(grp);
    const grpStarted = isGroupStarted(grp);

    const rows = teams.map((t, i) => {
      const s = stats[t] || {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};
      const gd = s.GF - s.GA;
      let rowClass = '';
      if (i < 2) {
        rowClass = 'qualified';
      } else if (i === 2) {
        if (allGroupsStarted) rowClass = qualifiedThirds.has(t) ? 'third-qual' : 'eliminated';
        else rowClass = 'third-pending';
      } else {
        rowClass = grpStarted ? 'eliminated' : '';
      }
      const qualClass = rowClass ? ` class="${rowClass}"` : '';
      return `<tr${qualClass}>
        <td class="td-team">${t}</td>
        <td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>
        <td>${s.GF}</td><td>${s.GA}</td>
        <td>${gd >= 0 ? '+' : ''}${gd}</td>
        <td class="td-pts">${s.Pts}</td>
      </tr>`;
    }).join('');

    return `
      <div class="group-table-card">
        <div class="group-table-header">Group ${grp}</div>
        <div class="group-table">
          <table>
            <thead><tr>
              <th class="th-team">Team</th>
              <th title="Played">P</th><th title="Won">W</th>
              <th title="Drawn">D</th><th title="Lost">L</th>
              <th title="Goals for">GF</th><th title="Goals against">GA</th>
              <th title="Goal difference">GD</th><th title="Points">Pts</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }).join('');

  const legend = `<div style="display:flex;gap:16px;flex-wrap:wrap;padding:8px 0 4px;font-size:0.72rem;color:var(--neutral-dark)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:var(--blue-lightest);border:1px solid var(--swiftly-blue);display:inline-block"></span>Qualified (top 2)</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#e6f9ef;border:1px solid #22863a;display:inline-block"></span>3rd — qualified</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fff8e6;border:1px solid #ff9e16;display:inline-block"></span>3rd — pending</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fdf0f0;border:1px solid #e24b4a;display:inline-block"></span>Eliminated</span>
  </div>`;

  document.getElementById('groupTablesCard').innerHTML =
    `<div class="group-tables-grid">${cards}</div>${legend}`;
}

// ── Collapsible sections ──────────────────────────────────
function toggleSection(id) {
  const body    = document.getElementById(`${id}-body`);
  const label   = body.previousElementSibling;
  const chevron = label.querySelector('.section-chevron');
  const isOpen  = !body.classList.contains('collapsed');
  body.classList.toggle('collapsed', isOpen);
  chevron.style.transform = isOpen ? 'rotate(-90deg)' : '';
}

// Slots: 1X = winner group X, 2X = runner-up, 3rd = best third
const R32_SLOTS = {
  73: ['2A','2B'], 74: ['1E','3M74'], 75: ['1F','2C'], 76: ['1C','2F'],
  77: ['1I','3M77'], 78: ['2E','2I'], 79: ['1A','3M79'], 80: ['1L','3M80'],
  81: ['1D','3M81'], 82: ['1G','3M82'], 83: ['2K','2L'], 84: ['1H','2J'],
  85: ['1B','3M85'], 86: ['1J','2H'], 87: ['1K','3M87'], 88: ['2D','2G'],
};
// 3rd place slots: match → column index in combination [M79,M85,M81,M74,M82,M77,M87,M80]
const THIRD_MATCH_COL = {79:0, 85:1, 81:2, 74:3, 82:4, 77:5, 87:6, 80:7};

// Round of 16 and beyond
const R16 = {89:[74,77], 90:[73,75], 91:[76,78], 92:[79,80],
             93:[83,84], 94:[81,82], 95:[86,88], 96:[85,87]};
const QF  = {97:[89,90], 98:[93,94], 99:[91,92], 100:[95,96]};
const SF  = {101:[97,98], 102:[99,100]};

function computeBracket(grpStandings, qualifiedThirds, results) {
  // Build position lookup
  const pos = {};
  Object.entries(grpStandings).forEach(([grp, teams]) => {
    if (teams[0]) pos[`1${grp}`] = teams[0][0];
    if (teams[1]) pos[`2${grp}`] = teams[1][0];
    if (teams[2]) pos[`3${grp}`] = teams[2][0];
  });

  // 3rd place combination lookup
  const qualGroups = qualifiedThirds.slice(0,8).map(([g]) => g).sort().join('');
  const combo = THIRD_COMBOS[qualGroups];
  const thirdSlot = {}; // match → team
  if (combo) {
    [79,85,81,74,82,77,87,80].forEach((m,i) => {
      const grp = combo[i];
      thirdSlot[m] = pos[`3${grp}`] || `3${grp}`;
    });
  } else {
    [79,85,81,74,82,77,87,80].forEach(m => { thirdSlot[m] = 'TBD'; });
  }

  // Resolve team for a slot string
  function slotTeam(slot) {
    if (slot.startsWith('3M')) {
      const m = parseInt(slot.slice(2));
      return thirdSlot[m] || 'TBD';
    }
    return pos[slot] || slot;
  }

  // Build R32 matchups
  const r32teams = {};
  Object.entries(R32_SLOTS).forEach(([m, [h, a]]) => {
    r32teams[+m] = [slotTeam(h), slotTeam(a)];
  });

  return { pos, thirdSlot, r32teams, combo: !!combo, qualGroups };
}

  return { grpStandings, thirds };
}

function renderBracket(results, allGroupsStarted) {
  const el = document.getElementById('bracketCard');

  if (!allGroupsStarted) {
    el.innerHTML = '<div class="bracket-pending">Bracket appears once all groups have kicked off.</div>';
    return;
  }

  const isConfirmed = Object.keys(results).length >= 72;
  const statusBadge = isConfirmed
    ? '<span style="margin-left:8px;font-size:0.6rem;background:#22863a;color:#fff;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Confirmed ✓</span>'
    : '<span style="margin-left:8px;font-size:0.6rem;background:#ff9e16;color:#131e27;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Provisional</span>';
  const bracketLabel = document.querySelector('[onclick*="bracket"]');
  if (bracketLabel && !bracketLabel.querySelector('.bracket-badge')) {
    const span = document.createElement('span');
    span.className = 'bracket-badge';
    span.innerHTML = statusBadge;
    bracketLabel.appendChild(span);
  }

  const { grpStandings, thirds } = computeGroupStandings(results);
  const { r32teams } = computeBracket(grpStandings, thirds, results);

  // Resolve teams for a match slot — returns [home, away]
  function slotTeams(m) {
    if (r32teams[m]) return r32teams[m];
    if (R16[m])  return [`W${R16[m][0]}`, `W${R16[m][1]}`];
    if (QF[m])   return [`W${QF[m][0]}`,  `W${QF[m][1]}`];
    if (SF[m])   return [`W${SF[m][0]}`,  `W${SF[m][1]}`];
    if (m===103) return ['L101','L102'];
    if (m===104) return ['W101','W102'];
    return ['TBD','TBD'];
  }

  // Bracket hierarchy matches Wikipedia visual layout exactly.
  // Structure: col > matches(halves) > half(quarters) > quarter(pairs) > pair(cards)
  // Each level's gap doubles relative to the level below.
  //
  // R32 (2 halves × 2 quarters × 2 pairs × 2 cards):
  //   Top half:    (M74,M77)+(M73,M75) → M89,M90 → M97
  //                (M83,M84)+(M81,M82) → M93,M94 → M98  → M101
  //   Bottom half: (M76,M78)+(M79,M80) → M91,M92 → M99
  //                (M86,M88)+(M85,M87) → M95,M96 → M100 → M102

  // ── R32: anchor column — nested flex, determines heights for all other columns ──
  function mkCard(m) { const [h,a]=slotTeams(m); return matchCard(m,h,a,''); }
  function mkPair(ms){ return `<div class="bk-pair">${ms.map(mkCard).join('')}</div>`; }
  function mkQtr(ps) { return `<div class="bk-quarter">${ps.map(mkPair).join('')}</div>`; }
  function mkHalf(qs){ return `<div class="bk-half">${qs.map(mkQtr).join('')}</div>`; }

  const r32html = `<div class="bk-col r32">
    <div class="bk-col-hdr">Round of 32</div>
    <div class="bk-matches" id="bk-r32-matches">
      ${mkHalf([[[74,77],[73,75]], [[83,84],[81,82]]])}
      ${mkHalf([[[76,78],[79,80]], [[86,88],[85,87]]])}
    </div>
  </div>`;

  // ── R16/QF/SF/Final: flat float columns — JS positions each card ──
  function floatCol(cls, hdr, matches, extraHtml='') {
    const cards = matches.map(mkCard).join('');
    return `<div class="bk-col ${cls}">
      <div class="bk-col-hdr">${hdr}</div>
      <div class="bk-float" id="bk-float-${cls}">${cards}${extraHtml}</div>
    </div>`;
  }

  const [fh,fa] = slotTeams(104);
  const [th,ta] = slotTeams(103);
  const finalExtra = `<div class="bk-3rd-lbl" id="bk-3rd-lbl"></div>${matchCard(103,th,ta,'')}`;

  const html = `<div class="bk-wrap"><div class="bk-bracket">
    ${r32html}
    ${floatCol('r16','Round of 16',[89,90,93,94,91,92,95,96])}
    ${floatCol('qf','Quarterfinals',[97,98,99,100])}
    ${floatCol('sf','Semifinals',[101,102])}
    ${floatCol('fin','🏆 Final',[104],finalExtra)}
  </div></div>`;

  el.innerHTML = html;

  // Position float cards then draw connectors
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));
}

// ── Bracket: position float cards then draw connectors ────
function positionAndConnectBracket() {
  const bracket = document.querySelector('.bk-bracket');
  if (!bracket) return;

  // Size all float containers to match R32 matches height
  const r32m = document.getElementById('bk-r32-matches');
  if (!r32m) return;
  const r32H = r32m.getBoundingClientRect().height;
  document.querySelectorAll('.bk-float').forEach(d => { d.style.height = r32H + 'px'; });

  const br = bracket.getBoundingClientRect();

  function yc(m) {
    const el = bracket.querySelector(`[data-match="${m}"]`);
    if (!el) return null;
    const r = el.getBoundingClientRect();
    return (r.top + r.bottom) / 2 - br.top;
  }

  function setY(m, targetY) {
    const el = bracket.querySelector(`[data-match="${m}"]`);
    if (!el) return;
    const container = el.parentElement;
    const ct = container.getBoundingClientRect().top - br.top;
    const h  = el.getBoundingClientRect().height;
    el.style.top = `${targetY - ct - h / 2}px`;
  }

  // Position each non-R32 card at the midpoint of its two feeders, level by level
  const LEVELS = [
    [[74,77,89],[73,75,90],[83,84,93],[81,82,94],
     [76,78,91],[79,80,92],[86,88,95],[85,87,96]],
    [[89,90,97],[93,94,98],[91,92,99],[95,96,100]],
    [[97,98,101],[99,100,102]],
    [[101,102,104]],
  ];

  LEVELS.forEach(level => {
    level.forEach(([m1, m2, mn]) => {
      const y1 = yc(m1), y2 = yc(m2);
      if (y1 !== null && y2 !== null) setY(mn, (y1 + y2) / 2);
    });
  });

  // Position M103 (3rd place) below M104 in the Final column
  const m104el = bracket.querySelector('[data-match="104"]');
  const m103el = bracket.querySelector('[data-match="103"]');
  const lbl    = document.getElementById('bk-3rd-lbl');
  if (m104el && m103el) {
    const ct    = m103el.parentElement.getBoundingClientRect().top - br.top;
    const bot104 = m104el.getBoundingClientRect().bottom - br.top;
    if (lbl) lbl.style.top = `${bot104 - ct + 10}px`;
    m103el.style.top = `${bot104 - ct + 26}px`;
    m103el.style.opacity = '0.65';
  }

  // Draw SVG connectors between positioned cards
  drawBracketConnectors();
}

function drawBracketConnectors() {
  const bracket = document.querySelector('.bk-bracket');
  if (!bracket) return;
  const old = bracket.querySelector('.bk-svg');
  if (old) old.remove();

  const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.className = 'bk-svg';
  svg.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;';
  bracket.appendChild(svg);

  const br = bracket.getBoundingClientRect();

  const CONNS = [
    [74,77,89],[73,75,90],[83,84,93],[81,82,94],
    [76,78,91],[79,80,92],[86,88,95],[85,87,96],
    [89,90,97],[93,94,98],[91,92,99],[95,96,100],
    [97,98,101],[99,100,102],
    [101,102,104],
  ];

  const color = '#B5D4F4';

  CONNS.forEach(([m1, m2, mn]) => {
    const e1 = bracket.querySelector(`[data-match="${m1}"]`);
    const e2 = bracket.querySelector(`[data-match="${m2}"]`);
    const en = mn ? bracket.querySelector(`[data-match="${mn}"]`) : null;
    if (!e1 || !e2) return;

    const r1 = e1.getBoundingClientRect();
    const r2 = e2.getBoundingClientRect();

    const x1 = r1.right - br.left;
    const y1 = (r1.top + r1.bottom) / 2 - br.top;
    const y2 = (r2.top + r2.bottom) / 2 - br.top;
    const ym = (y1 + y2) / 2;

    let xc = x1 + 14;
    if (en) {
      const rn = en.getBoundingClientRect();
      xc = (x1 + (rn.left - br.left)) / 2;
    }

    // ] bracket shape + horizontal line to next card's left edge at midpoint y
    const d = `M${x1},${y1} H${xc} V${y2} M${x1},${y2} H${xc}` +
              (en ? ` M${xc},${ym} H${en.getBoundingClientRect().left - br.left}` : '');

    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', d);
    path.setAttribute('stroke', color);
    path.setAttribute('stroke-width', '1.5');
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  });
}

// ── Tooltip ───────────────────────────────────────────────
const tooltip = document.getElementById('sq-tooltip');

document.addEventListener('mouseover', e => {
  const sq = e.target.closest('.sq');
  if (!sq) { tooltip.style.display = 'none'; return; }

  const match  = sq.dataset.match;
  const teams  = sq.dataset.teams;
  const pick   = sq.dataset.pick;
  const result = sq.dataset.result;
  const status = sq.dataset.status;

  const statusText = status === 'correct' ? '✓ Correct'
                   : status === 'wrong'   ? '✗ Wrong'
                   : status === 'pending' ? '⏳ Pending'
                   : '—';

  tooltip.innerHTML = `
    <div class="tt-match">Match ${match} · ${teams}</div>
    <div class="tt-pick">Your pick: <strong>${pick}</strong></div>
    <div class="tt-result">Result: ${result}</div>
    <div class="tt-status ${status}">${statusText}</div>
  `;
  tooltip.style.display = 'block';
});

document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'none') return;
  const x = e.clientX + 14, y = e.clientY + 14;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth  ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? y - th - 28 : y) + 'px';
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.sq')) tooltip.style.display = 'none';
});

// ── Main ──────────────────────────────────────────────────
async function init() {
  try {
    let picksData, resultsCSV;

    if (USE_LOCAL_DATA) {
      picksData  = LOCAL_PICKS;
      resultsCSV = LOCAL_RESULTS_CSV;
    } else {
      const ts = Date.now();
      const [picksResp, resultsResp] = await Promise.all([
        fetch(`${PICKS_URL}?t=${ts}`),
        fetch(`${RESULTS_URL}?t=${ts}`),
      ]);
      if (!picksResp.ok) throw new Error('Could not load picks');
      if (!resultsResp.ok) throw new Error('Could not load results');
      picksData  = await picksResp.json();
      resultsCSV = await resultsResp.text();
    }

    const results = parseResults(resultsCSV);
    const standings  = computeStandings(picksData, results);
    const played     = Object.keys(results).length;

    document.getElementById('matchesPlayed').textContent =
      `${played} / 72 matches played`;
    document.getElementById('updatedAt').textContent =
      `Updated ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;

    // One match per group as a proxy — if all 12 have a result, all groups have started
    const GRP_SAMPLE = {A:1,B:3,C:5,D:4,E:9,F:11,G:15,H:13,I:17,J:19,K:23,L:21};
    const allGrpsStarted = Object.values(GRP_SAMPLE).every(m => results[m]);

    renderStandings(standings, results);
    renderResults(results);
    renderGroupTables(results);
    renderBracket(results, allGrpsStarted);

  } catch (err) {
    const msg = `<div class="state-msg"><span class="emoji">⚠️</span>${err.message}</div>`;
    document.getElementById('standingsCard').innerHTML  = msg;
    document.getElementById('resultsCard').innerHTML    = msg;
    document.getElementById('groupTablesCard').innerHTML = msg;
    document.getElementById('bracketCard').innerHTML    = msg;
    document.getElementById('matchesPlayed').textContent = 'Could not load data';
  }
}

init();
</script>
