<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Pool – entry form</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    /* Swiftly brand colors */
    --swiftly-blue:       #009edf;
    --swiftly-orange:     #ff9e16;
    --neutral-lightest:   #f7f7f7;
    --neutral-light:      #ebebeb;
    --neutral-medium:     #c4c4c4;
    --neutral-dark:       #525f66;
    --neutral-darkest:    #131e27;
    --blue-lightest:      #ebf9ff;
    --blue-light:         #ccecf9;
    --blue-medium-light:  #99d9f2;
    --blue-medium:        #66c7ec;
    --blue-medium-dark:   #33b4e5;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--swiftly-blue);
    padding: 28px 0 24px;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .header-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: #ffffff;
  }

  .header-subtitle {
    font-size: 0.875rem;
    color: var(--blue-light);
  }

  /* ── Sticky progress bar ─────────────────────────────────── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    border-bottom: none;
    padding: 10px 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  .sticky-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  /* ── Shortcuts bar ───────────────────────────────────────── */
  .shortcuts-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .shortcuts-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-medium);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
    margin-right: 4px;
  }

  .shortcut-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--neutral-dark);
    background: #ffffff;
    border: 1.5px solid var(--neutral-light);
    border-radius: 5px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.14s;
    white-space: nowrap;
  }

  .shortcut-btn:hover {
    border-color: var(--swiftly-blue);
    color: var(--swiftly-blue);
    background: var(--blue-lightest);
  }


  .progress-label {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--swiftly-blue);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-count {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  /* ── Container ───────────────────────────────────────────── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ── Name card ───────────────────────────────────────────── */
  .name-card {
    background: #ffffff;
    border-radius: var(--radius);
    border: 2px solid var(--swiftly-blue);
    padding: 16px 20px;
    margin-bottom: 16px;
    box-shadow: 0 2px 10px rgba(0,158,223,0.12);
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .name-card label {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  .name-card input {
    flex: 1;
    padding: 10px 14px;
    font-family: 'Inter', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    border: 1.5px solid var(--neutral-light);
    border-radius: 7px;
    outline: none;
    color: var(--neutral-darkest);
    transition: border-color 0.2s;
    background: var(--neutral-lightest);
  }

  .name-card input:focus {
    background: #ffffff;
  }

  .name-card input::placeholder { color: var(--neutral-medium); }

  /* ── Match table ─────────────────────────────────────────── */
  .matches-table {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
    margin-bottom: 8px;
  }

  /* Column layout: # | grp | date | time | picks */
  .col-layout {
    display: grid;
    grid-template-columns: 30px 28px 88px 72px auto;
    align-items: center;
    column-gap: 12px;
  }

  /* Column header row */
  .col-header {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
    padding: 6px 12px;
  }

  .col-header > span {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    padding: 0;
  }

  .col-header > span:first-child { text-align: center; }

  /* Match row */
  .match-row {
    border-bottom: 1px solid var(--neutral-light);
    padding: 5px 12px;
    transition: background 0.12s;
  }

  .match-row:last-child { border-bottom: none; }
  .match-row:nth-child(even) { background: var(--neutral-lightest); }
  .match-row:nth-child(odd)  { background: #ffffff; }
  .match-row:hover { background: var(--blue-lightest); }
  .match-row.picked { background: var(--blue-lightest); }

  .match-num {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--neutral-medium);
    text-align: center;
    padding: 0;
  }

  .match-teams {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--neutral-darkest);
    padding: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .match-teams .vs {
    font-weight: 400;
    color: var(--neutral-medium);
  }

  .match-grp, .match-date, .match-time {
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: var(--neutral-dark);
    padding: 0;
    white-space: nowrap;
  }

  .match-grp { color: var(--swiftly-blue); font-weight: 700; }

  /* ── Pick buttons ────────────────────────────────────────── */
  .pick-group {
    display: grid;
    grid-template-columns: 2fr 1fr 2fr;
    gap: 4px;
    padding: 0 8px 0 0;
    width: 100%;
  }

  .pick-group input[type="radio"] { display: none; }

  .pick-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.25em;
    padding: 4px 8px;
    border-radius: 5px;
    border: 1.5px solid var(--blue-light);
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.14s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-width: 0;
    color: var(--neutral-darkest);
    background: #ffffff;
    user-select: none;
    line-height: 1;
  }

  /* rank muted relative to team name, matching group table style */
  .pick-btn .team-rank { color: var(--neutral-dark); }

  .pick-btn:hover {
    border-color: var(--swiftly-blue);
    color: var(--swiftly-blue);
    background: var(--blue-lightest);
  }

  .pick-btn:hover .team-rank { color: var(--swiftly-blue); }

  /* All picks — blue when selected */
  input[type="radio"].win1-radio:checked + .pick-btn,
  input[type="radio"].draw-radio:checked + .pick-btn,
  input[type="radio"].win2-radio:checked + .pick-btn {
    border-color: var(--swiftly-blue);
    background: var(--swiftly-blue);
    color: #ffffff;
  }

  /* rank stays readable on blue background */
  input[type="radio"].win1-radio:checked + .pick-btn .team-rank,
  input[type="radio"].win2-radio:checked + .pick-btn .team-rank {
    color: rgba(255, 255, 255, 0.75);
  }

  /* ── Submit section ──────────────────────────────────────── */
  .submit-section {
    margin-top: 36px;
    text-align: center;
  }

  .submit-btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    background: var(--swiftly-blue);
    color: #ffffff;
    border: none;
    padding: 15px 48px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.18s;
    box-shadow: 0 4px 14px rgba(0,158,223,0.3);
    letter-spacing: 0.2px;
  }

  .submit-btn:hover {
    background: #0089c3;
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(0,158,223,0.38);
  }

  .submit-note {
    margin-top: 12px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: var(--neutral-dark);
  }

  .confirm-row {
    display: none;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-top: 14px;
  }

  .confirm-row.visible { display: flex; }

  .confirm-note {
    font-family: 'Inter', sans-serif;
    font-size: 0.68rem;
    color: var(--neutral-dark);
  }

  .confirm-btn {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    background: var(--swiftly-blue);
    color: #ffffff;
    border: none;
    padding: 10px 28px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.18s;
  }

  .confirm-btn:hover { background: #0089c3; }

  .validation-msg {
    background: #fff8e6;
    border: 1px solid var(--swiftly-orange);
    border-radius: 7px;
    padding: 11px 16px;
    margin-top: 14px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    color: #7a4a00;
    display: none;
    text-align: left;
  }

  /* ── Summary modal ───────────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(19,30,39,0.6);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: #ffffff;
    border-radius: 14px;
    max-width: 700px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  }

  .modal-header {
    background: var(--swiftly-blue);
    color: #ffffff;
    padding: 20px 24px;
    border-radius: 14px 14px 0 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-header h2 {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
  }

  .modal-close {
    background: rgba(255,255,255,0.15);
    border: none;
    color: #ffffff;
    width: 30px; height: 30px;
    border-radius: 50%;
    font-size: 0.78rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }

  .modal-close:hover { background: rgba(255,255,255,0.25); }

  .modal-body { padding: 24px 28px; }

  .summary-name {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: var(--swiftly-blue);
    margin-bottom: 16px;
    text-align: center;
  }

  .summary-stats {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }

  .stat-pill {
    padding: 7px 18px;
    border-radius: 20px;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
  }

  .stat-w1   { background: var(--blue-lightest); color: var(--swiftly-blue); }
  .stat-draw { background: #fff4e0; color: #8a5500; }
  .stat-w2   { background: var(--neutral-lightest); color: var(--neutral-darkest); border: 1px solid var(--neutral-light); }

  .summary-table {
    width: 100%;
    border-collapse: collapse;
    font-family: 'Inter', sans-serif;
    font-size: 0.78rem;
  }

  .summary-table th {
    background: var(--neutral-lightest);
    padding: 8px 10px;
    text-align: left;
    font-weight: 700;
    color: var(--neutral-dark);
    border-bottom: 2px solid var(--neutral-light);
  }

  .summary-table td {
    padding: 7px 10px;
    border-bottom: 1px solid var(--neutral-light);
    vertical-align: middle;
    color: var(--neutral-darkest);
  }

  .summary-table tr:last-child td { border-bottom: none; }

  .pick-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 0.68rem;
    font-weight: 700;
  }

  .badge-w1   { background: var(--swiftly-blue); color: #ffffff; }
  .badge-draw { background: var(--swiftly-orange); color: var(--neutral-darkest); }
  .badge-w2   { background: var(--neutral-darkest); color: #ffffff; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 22px;
  }

  .copy-btn, .csv-btn {
    background: var(--swiftly-blue);
    color: #ffffff;
    border: none;
    padding: 11px 28px;
    border-radius: 7px;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.18s;
  }

  .copy-btn:hover, .csv-btn:hover { background: #0089c3; }

  .csv-btn {
    background: var(--neutral-darkest);
  }

  .csv-btn:hover { background: #2a3f52; }

  /* ── Responsive (≤ 640 px — phones) ─────────────────────── */
  @media (max-width: 640px) {
    /* Header */
    header { padding: 16px 0 14px; }
    .header-title { font-size: clamp(0.82rem, 3.6vw, 1.2rem); white-space: nowrap; }

    /* Reorder: pick form appears before group tables on mobile */
    .pick-layout { flex-direction: column; }
    .pick-main   { order: -1; }
    .pick-sidebar { width: 100%; position: static; }

    /* Column header row is redundant in 2-row layout — hide it */
    .col-header { display: none; }

    /* Shortcuts: hide label (obvious from context), wrap buttons */
    .shortcuts-label { display: none; }
    .shortcuts-bar   { flex-wrap: wrap; }
    .shortcut-btn    { padding: 6px 10px; min-height: 36px; }

    /* Match row: 2-row grid
       Row 1 — meta: # · date · group · time (ET), all left-aligned
       Row 2 — pick buttons spanning full width
       5 columns: 4 auto items + 1fr filler so row 1 stays left-anchored */
    .match-row.col-layout {
      display: grid;
      grid-template-columns: auto auto auto auto 1fr;
      grid-template-rows: auto auto;
      column-gap: 10px;
      row-gap: 5px;
      padding: 7px 12px 9px;
    }
    .match-num  { grid-column: 1; grid-row: 1; align-self: center; }
    .match-grp  { grid-column: 2; grid-row: 1; display: block;
                  font-size: 0.72rem; align-self: center; }
    .match-date { grid-column: 3; grid-row: 1; display: block;
                  font-size: 0.72rem; color: var(--neutral-dark); font-weight: 400; align-self: center; }
    .match-time { grid-column: 4; grid-row: 1; display: block;
                  font-size: 0.72rem; color: var(--neutral-dark); font-weight: 400; align-self: center; }
    .pick-group { grid-column: 1 / -1; grid-row: 2; padding: 0; }

    /* Pick buttons: taller touch target */
    .pick-btn   { padding: 7px 6px; min-height: 38px; }

    /* Hide group tables on mobile — pick form is the focus */
    #pickGroupTables { display: none; }

    /* Modal: full-width with less padding on small screens */
    .modal { max-height: 96vh; border-radius: 10px; }
    .modal-header { padding: 14px 18px; }
    .modal-body   { padding: 14px 16px; }
    .modal-actions { flex-direction: column; align-items: stretch; }
    .copy-btn, .csv-btn { text-align: center; }
  }

  /* ── Pick page two-column layout ── */
  .pick-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .pick-sidebar {
    width: 380px;
    flex-shrink: 0;
  }

  .pick-main { flex: 1; min-width: 0; }

  /* ── Group tables (same as leaderboard) ── */
  .group-tables-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 8px; }
  .group-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .group-table-card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
  }

  .group-table-header {
    background: var(--swiftly-blue);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 7px 12px;
  }

  .group-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .group-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table th {
    padding: 5px 8px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
  }

  .group-table th.th-team { text-align: left; }
  .group-table td.td-team { min-width: 130px; }
  .group-table td:not(.td-team), .group-table th:not(.th-team) { white-space: nowrap; width: 1%; padding-left: 4px; padding-right: 4px; }

  .group-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table tbody tr:last-child { border-bottom: none; }
  .group-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .group-table td {
    padding: 5px 8px;
    text-align: center;
    color: var(--neutral-darkest);
  }

  .group-table td.td-team {
    text-align: left;
    font-weight: 700;
  }
  .team-rank { font-weight: 400; color: var(--neutral-dark); font-size: 0.68rem; }

  .group-table td.td-pts {
    font-weight: 700;
    color: var(--swiftly-blue);
  }

  .group-table tr.qualified      td { background: var(--blue-lightest); }
  .group-table tr.third-qual     td { background: #e6f9ef; }
  .group-table tr.third-pending  td { background: #fff8e6; }
  .group-table tr.eliminated     td { background: #fdf0f0; color: var(--neutral-medium); }
  .group-table tr.eliminated td.td-team { color: var(--neutral-dark); }

</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────── -->
<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 Pool · Group Stage</div>
    <div class="header-subtitle" id="headerSubtitle">Pick a result (win for either team or draw) for all 72 group stage matches</div>
  </div>
</header>

<!-- ── Sticky progress bar ────────────────────────────── -->
<div class="sticky-bar">
  <div class="sticky-bar-inner">
    <span class="progress-label">Progress</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="progressCount">0 / 72 matches picked</span>
  </div>
</div>

<!-- ── Main content ───────────────────────────────────── -->
<div class="container">

  <div class="name-card">
    <input type="text" id="entrantName" placeholder="Enter your full name…" autocomplete="name">
  </div>

  <div class="pick-layout">

    <div class="pick-sidebar">
      <div id="pickGroupTables"></div>
    </div>

    <div class="pick-main">

      <div class="shortcuts-bar">
        <span class="shortcuts-label">Shortcuts</span>
        <button class="shortcut-btn" onclick="runShortcut('random')">🎲&nbsp;&nbsp;Pick randomly</button>
        <button class="shortcut-btn" onclick="runShortcut('ranked')">💪&nbsp;&nbsp;Pick higher-ranked team to win</button>
        <button class="shortcut-btn" onclick="runShortcut('draw')">🤝&nbsp;&nbsp;Pick all draws</button>
        <button class="shortcut-btn" onclick="runShortcut('reset')">✕&nbsp;&nbsp;Reset all picks</button>
      </div>

      <form id="poolForm">
        <!-- Match rows injected by JS -->
      </form>

      <div class="submit-section">
        <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">Happy with your picks?</button>
        <div class="validation-msg" id="validationMsg"></div>
        <div class="confirm-row" id="confirmRow">
          <button class="confirm-btn" onclick="confirmSubmit()">Submit</button>
        </div>
      </div>
    </div>

  </div>

</div>

<!-- ── Summary modal ──────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Entry summary</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── Match data ────────────────────────────────────────────

// ── Local match time (UTC ISO → user's local timezone) ────
function localMatchTime(utcStr) {
  try {
    const dt = new Date(utcStr);
    return dt.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  } catch (e) { return utcStr; }
}
// TZ abbreviation for column header (e.g. 'EDT', 'PDT', 'BST')
const _tzAbbr = new Date().toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();

// ── Build form ────────────────────────────────────────────
function buildForm() {
  const form = document.getElementById('poolForm');

  // Single table with all 72 matches sorted by match number
  const table = document.createElement('div');
  table.className = 'matches-table';

  // Column header row
  const hdr = document.createElement('div');
  hdr.className = 'col-layout col-header';
  hdr.innerHTML = `
    <span>#</span>
    <span>Grp</span>
    <span class="ch-date">Date</span>
    <span class="ch-time">Time (${_tzAbbr})</span>
    <span style="text-align:center">Your pick</span>
  `;
  table.appendChild(hdr);

  MATCHES.forEach(m => {
    const [num, grp, date, time, t1, t2] = m;

    const row = document.createElement('div');
    row.className = 'match-row col-layout';
    row.id = `row-${num}`;

    row.innerHTML = `
      <div class="match-num">${num}</div>
      <div class="match-grp">${grp}</div>
      <div class="match-date">${date}</div>
      <div class="match-time">${localMatchTime(time)}</div>
      <div class="pick-group">
        <input type="radio" name="m${num}" id="m${num}_w1" value="w1" class="win1-radio" onchange="onPick(${num})">
        <label class="pick-btn" for="m${num}_w1">${teamHtmlPick(t1)}</label>

        <input type="radio" name="m${num}" id="m${num}_d" value="draw" class="draw-radio" onchange="onPick(${num})">
        <label class="pick-btn" for="m${num}_d">Draw</label>

        <input type="radio" name="m${num}" id="m${num}_w2" value="w2" class="win2-radio" onchange="onPick(${num})">
        <label class="pick-btn" for="m${num}_w2">${teamHtmlPick(t2)}</label>
      </div>
    `;

    table.appendChild(row);
  });

  form.appendChild(table);
}

// ── Progress tracking ─────────────────────────────────────
let picked = 0;

function onPick(num) {
  const row = document.getElementById(`row-${num}`);
  if (!row.classList.contains('picked')) {
    row.classList.add('picked');
    picked++;
    updateProgress();
  }
  document.getElementById('confirmRow').classList.remove('visible');
  document.querySelector('.submit-btn').style.display = '';
  renderPickGroupTables();
}

// ── Fixed group order (per Wikipedia) ────────────────────
const GROUP_ORDER = {
  A: ['Mexico','South Africa','South Korea','Czech Republic'],
  B: ['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
  C: ['Brazil','Morocco','Haiti','Scotland'],
  D: ['United States','Paraguay','Australia','Turkey'],
  E: ['Germany','Curaçao','Ivory Coast','Ecuador'],
  F: ['Netherlands','Japan','Sweden','Tunisia'],
  G: ['Belgium','Egypt','Iran','New Zealand'],
  H: ['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I: ['France','Senegal','Iraq','Norway'],
  J: ['Argentina','Algeria','Austria','Jordan'],
  K: ['Portugal','DR Congo','Uzbekistan','Colombia'],
  L: ['England','Croatia','Ghana','Panama'],
};

// ── Live group tables ─────────────────────────────────────
function renderPickGroupTables() {
  const groups = {}, stats = {};

  MATCHES.forEach(([num, grp, , , t1, t2]) => {
    if (!groups[grp]) groups[grp] = [];
    if (!groups[grp].includes(t1)) groups[grp].push(t1);
    if (!groups[grp].includes(t2)) groups[grp].push(t2);
    [t1, t2].forEach(t => {
      if (!stats[t]) stats[t] = { P:0, W:0, D:0, L:0, Pts:0 };
    });

    const val = document.querySelector(`input[name="m${num}"]:checked`)?.value;
    if (!val) return;

    stats[t1].P++; stats[t2].P++;
    if (val === 'w1') {
      stats[t1].W++; stats[t1].Pts += 3; stats[t2].L++;
    } else if (val === 'w2') {
      stats[t2].W++; stats[t2].Pts += 3; stats[t1].L++;
    } else {
      stats[t1].D++; stats[t1].Pts++;
      stats[t2].D++; stats[t2].Pts++;
    }
  });

  // H2H points from user's picks between two teams
  function h2hPts(teamA, teamB) {
    let pa = 0, pb = 0;
    MATCHES.forEach(([num, , , , t1, t2]) => {
      if (!((t1===teamA&&t2===teamB)||(t1===teamB&&t2===teamA))) return;
      const val = document.querySelector(`input[name="m${num}"]:checked`)?.value;
      if (!val) return;
      const aIsT1 = t1 === teamA;
      if (val==='draw') { pa++; pb++; }
      else if ((val==='w1'&&aIsT1)||(val==='w2'&&!aIsT1)) pa += 3;
      else pb += 3;
    });
    return { a: pa, b: pb };
  }

  const html = Object.keys(groups).sort().map(grp => {
    const order = GROUP_ORDER[grp] || groups[grp];
    const teams = [...order].sort((a, b) => {
      const sa = stats[a], sb = stats[b];
      // 1. Points
      if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
      // 2. H2H points (criterion a)
      const h2h = h2hPts(a, b);
      if (h2h.b !== h2h.a) return h2h.b - h2h.a;
      // 3. Overall wins (proxy for GD — no scores in picks)
      if (sb.W !== sa.W) return sb.W - sa.W;
      // 4. FIFA ranking (lower = better)
      const ra = RANKINGS[a] ?? 999, rb = RANKINGS[b] ?? 999;
      if (ra !== rb) return ra - rb;
      // 5. Wikipedia order
      return order.indexOf(a) - order.indexOf(b);
    });

    const grpStarted = teams.every(t => stats[t].P > 0);
    const rowClassFn = (t, i) => grpStarted
      ? (i < 2 ? 'qualified' : i === 2 ? 'third-pending' : 'eliminated')
      : '';

    return renderGroupTableCard(grp, teams, stats, { rowClassFn, showGD: false });
  }).join('');

  document.getElementById('pickGroupTables').innerHTML = `<div class="group-tables-grid">${html}</div>`;
}

function updateProgress() {
  document.getElementById('progressCount').textContent = `${picked} / 72 matches picked`;
  document.getElementById('progressFill').style.width = `${(picked / 72) * 100}%`;
}

// ── Submit / validation ───────────────────────────────────
function handleSubmit() {
  const name = document.getElementById('entrantName').value.trim();
  const valMsg = document.getElementById('validationMsg');
  valMsg.style.display = 'none';

  if (!name) {
    valMsg.textContent = 'Please enter your name before reviewing your picks.';
    valMsg.style.display = 'block';
    document.getElementById('entrantName').focus();
    return;
  }

  if (picked < 72) {
    const remaining = 72 - picked;
    valMsg.textContent = `You still have ${remaining} match${remaining === 1 ? '' : 'es'} without a pick. Please select a result for every match before submitting.`;
    valMsg.style.display = 'block';

    for (const m of MATCHES) {
      const row = document.getElementById(`row-${m[0]}`);
      if (!row.classList.contains('picked')) {
        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
        row.style.outline = `2px solid var(--swiftly-orange)`;
        setTimeout(() => row.style.outline = '', 2200);
        break;
      }
    }
    return;
  }

  document.getElementById('confirmRow').classList.add('visible');
  document.querySelector('.submit-btn').style.display = 'none';
}

// ── Summary modal ─────────────────────────────────────────
function showSummary(name) {
  let w1 = 0, draws = 0, w2 = 0;
  let rows = '';

  MATCHES.forEach(m => {
    const [num, grp, date, , t1, t2] = m;
    const val = document.querySelector(`input[name="m${num}"]:checked`)?.value;
    let pickLabel = '', badgeClass = '';

    if (val === 'w1')   { pickLabel = teamHtml(t1, false);  badgeClass = 'badge-w1';   w1++; }
    if (val === 'draw') { pickLabel = 'Draw';                badgeClass = 'badge-draw'; draws++; }
    if (val === 'w2')   { pickLabel = teamHtml(t2, false);  badgeClass = 'badge-w2';   w2++; }

    rows += `<tr>
      <td style="color:var(--neutral-medium);font-size:0.78rem">#${num}</td>
      <td>
        ${teamHtml(t1, false)} vs ${teamHtml(t2, false)}
        <br><span style="font-size:0.72rem;color:var(--neutral-dark)">Group ${grp} · ${date}</span>
      </td>
      <td><span class="pick-badge ${badgeClass}">${pickLabel}</span></td>
    </tr>`;
  });

  document.getElementById('modalBody').innerHTML = `
    <div class="summary-name">${name}</div>
    <div class="summary-stats">
      <span class="stat-pill stat-w1">Team 1 wins: ${w1}</span>
      <span class="stat-pill stat-draw">Draws: ${draws}</span>
      <span class="stat-pill stat-w2">Team 2 wins: ${w2}</span>
    </div>
    <table class="summary-table">
      <thead><tr><th>#</th><th>Match</th><th>Your pick</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="modal-actions">
      <button class="copy-btn" onclick="copyToClipboard('${name.replace(/'/g,"\\'")}')">Copy to clipboard</button>
      <button class="csv-btn" onclick="downloadCSV('${name.replace(/'/g,"\\'")}')">Download CSV</button>
    </div>
  `;

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}

function copyToClipboard(name) {
  let text = `World Cup 2026 pool entry\nName: ${name}\n\n`;
  MATCHES.forEach(m => {
    const [num, grp, date, time, t1, t2] = m;
    const val = document.querySelector(`input[name="m${num}"]:checked`)?.value;
    const pick = val === 'w1' ? t1 : val === 'draw' ? 'Draw' : t2;
    text += `Match ${num} (${date}, Group ${grp}): ${t1} vs ${t2} → ${pick}\n`;
  });

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy picks to clipboard', 2200);
  });
}

// ── Reusable team display: flag + name + rank ─────────────
// ── Group table card template (matches leaderboard) ──────
function renderGroupTableCard(grp, teams, stats, opts={}) {
  const { rowClassFn = () => '', showGD = false } = opts;
  const rows = teams.map((t, i) => {
    const s = stats[t] || {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};
    const rc = rowClassFn(t, i);
    const gdCell = showGD ? `<td>${s.GF}</td><td>${s.GA}</td><td>${(s.GF-s.GA)>=0?'+':''}${s.GF-s.GA}</td>` : '';
    return `<tr${rc ? ` class="${rc}"` : ''}><td class="td-team">${teamHtml(t)}</td><td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>${gdCell}<td class="td-pts">${s.Pts}</td></tr>`;
  }).join('');
  const gdHeaders = showGD ? `<th title="Goals for">GF</th><th title="Goals against">GA</th><th title="Goal difference">GD</th>` : '';
  return `<div class="group-table-card"><div class="group-table-header">Group ${grp}</div><div class="group-table"><table><thead><tr><th class="th-team">Team</th><th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>${gdHeaders}<th title="Points">Pts</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function teamHtml(name, showRank=true) {
  if (!name) return '';
  const flag = FLAGS[name] || '';
  const rank = showRank ? (RANKINGS[name] || null) : null;
  const rankHtml = rank ? ` <span class="team-rank">(${rank})</span>` : '';
  return `${flag ? flag + ' ' : ''}${name}${rankHtml}`;
}

// Shortened names used only inside pick buttons on narrow screens (≤ 640 px)
const SHORT_NAMES = {
  'Bosnia and Herzegovina': 'Bosnia…',
  'Czech Republic':         'Czech…',
};
function teamHtmlPick(name) {
  if (!name) return '';
  const flag  = FLAGS[name] || '';
  const rank  = RANKINGS[name] || null;
  const rankHtml = rank ? ` <span class="team-rank">(${rank})</span>` : '';
  const display  = (window.innerWidth <= 640 && SHORT_NAMES[name]) ? SHORT_NAMES[name] : name;
  return `${flag ? flag + ' ' : ''}${display}${rankHtml}`;
}

function confirmSubmit() {
  const name = document.getElementById('entrantName').value.trim();
  downloadCSV(name);
  document.getElementById('confirmRow').classList.remove('visible');
  const msg = document.getElementById('validationMsg');
  msg.style.background = '#ebf9ff';
  msg.style.borderColor = 'var(--swiftly-blue)';
  msg.style.color = 'var(--neutral-darkest)';
  msg.textContent = `✓ Done! Your picks have been downloaded as a CSV file. Please send to Ritesh.`;
  msg.style.display = 'block';
}

function runShortcut(mode) {
  if (mode === 'reset') {  // reset doesn't need a name
    MATCHES.forEach(m => {
      const [num] = m;
      document.querySelectorAll(`input[name="m${num}"]`).forEach(r => r.checked = false);
      onPick(num);
    });
    return;
  }
  const options = ['w1', 'draw', 'w2'];
  MATCHES.forEach(m => {
    const [num, , , , t1, t2] = m;
    let pick;
    if (mode === 'random') {
      pick = options[Math.floor(Math.random() * 3)];
    } else if (mode === 'draw') {
      pick = 'draw';
    } else {
      const r1 = RANKINGS[t1] ?? 999;
      const r2 = RANKINGS[t2] ?? 999;
      pick = r1 <= r2 ? 'w1' : 'w2';
    }
    const idSuffix = pick === 'w1' ? 'w1' : pick === 'draw' ? 'd' : 'w2';
    const radio = document.getElementById(`m${num}_${idSuffix}`);
    if (radio) { radio.checked = true; onPick(num); }
  });
}

function downloadCSV(name) {
  const escape = v => (String(v).includes(',') ? `"${v}"` : v);
  const rows = [['match', 'result']];
  MATCHES.forEach(m => {
    const [num, , , , t1, t2] = m;
    const val = document.querySelector(`input[name="m${num}"]:checked`)?.value;
    const match = escape(`${t1} v ${t2}`);
    const label = val === 'w1' ? t1 : val === 'draw' ? 'Draw' : t2;
    rows.push([num, match, escape(label)]);
  });
  const csv  = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `wc26_group_${name.replace(/\s+/g, '-').toLowerCase()}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// Close modal when clicking the overlay
document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('headerSubtitle').textContent =

buildForm();
renderPickGroupTables();
