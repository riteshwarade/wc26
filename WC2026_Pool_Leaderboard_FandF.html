<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Pool · Leaderboard – Friends &amp; Family</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚽</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Inter:wght@400;700&display=block" rel="stylesheet">
<style>
  :root {
    --swiftly-blue:    #009edf;
    --swiftly-orange:  #ff9e16;
    --swiftly-red:     #ee0e51;
    --correct-green:   #5ce65c;
    --wrong-red:       #ff6b6b;
    --neutral-lightest:#f7f7f7;
    --neutral-light:   #ebebeb;
    --neutral-medium:  #c4c4c4;
    --neutral-dark:    #525f66;
    --neutral-darkest: #131e27;
    --blue-lightest:   #ebf9ff;
    --blue-light:      #ccecf9;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--neutral-lightest);
    color: var(--neutral-darkest);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--swiftly-blue);
    padding: 28px 0 24px;
    visibility: hidden;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .header-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 1.5rem;
    color: #ffffff;
  }

  /* ── Sticky bar ── */
  .sticky-bar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: #ffffff;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    padding: 10px 0;
    visibility: hidden;
  }

  .sticky-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .progress-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    white-space: nowrap;
  }

  .progress-bar-wrap {
    flex: 1;
    min-width: 80px;
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--swiftly-blue);
    border-radius: 3px;
    transition: width 0.3s ease;
    width: 0%;
  }

  .progress-count {
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--swiftly-blue);
    white-space: nowrap;
  }

  .updated-at {
    font-size: 0.72rem;
    color: var(--neutral-dark);
    margin-left: auto;
    white-space: nowrap;
  }

  /* ── Container ── */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 16px 64px;
  }

  /* ── Standings participant count pill ── */
  .standings-count {
    font-size: 0.62rem;
    font-weight: 600;
    color: var(--swiftly-blue);
    border: 1px solid #cce8f4;
    border-radius: 20px;
    padding: 1px 7px;
    text-transform: none;
    letter-spacing: 0;
    display: inline-block;
    line-height: 1.6;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ── Section label ── */
  .section-label {
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 10px;
    visibility: hidden;
  }

  .section-body {
    overflow: clip; /* clip (not hidden) so position:sticky works inside */
    margin-bottom: 32px;
    visibility: hidden;
  }

  /* ── Card ── */
  .card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
    margin-bottom: 32px;
  }

  /* ── Standings table ── */
  .standings-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .standings-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .standings-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .standings-table th.th-squares { text-align: center; }
  .standings-table th.th-grp-pts,
  .standings-table th.th-ko-pts,
  .standings-table th.th-max-pts,
  .standings-table th.th-total-pts { text-align: center; }

  .standings-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
    transition: background 0.12s;
  }

  .standings-table tbody tr:last-child { border-bottom: none; }
  .standings-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }
  .standings-table tbody tr:hover { background: var(--blue-lightest); }

  .standings-table td {
    padding: 8px 12px;
    vertical-align: middle;
  }

  .td-rank {
    font-weight: 700;
    color: var(--neutral-medium);
    font-size: 0.78rem;
    width: 36px;
    text-align: center;
  }

  .td-rank.top3 { color: var(--swiftly-blue); }

  .td-name {
    font-weight: 700;
    color: var(--neutral-darkest);
    min-width: 120px;
    white-space: nowrap;
  }

  .td-points {
    font-weight: 700;
    color: var(--swiftly-blue);
    font-size: 0.78rem;
    width: 56px;
    text-align: center;
  }

  .td-squares { width: 100%; }

  /* ── Mini squares ── */
  .squares-wrap {
    display: flex;
    flex-wrap: wrap;
    gap: 2px;
    padding: 2px 0;
  }

  .sq {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }
  .sq.sq-sm {
    width: 10px;
    height: 10px;
    border-radius: 1px;
  }
  .squares-wrap.nowrap {
    flex-wrap: nowrap;
    gap: 1.5px;
  }

  .sq-correct        { background: var(--swiftly-blue); }
  .sq-correct-upset  { background: var(--swiftly-blue); position: relative; }
  .sq-correct-upset::after {
    content: '✦';
    position: absolute;
    font-size: 6px;
    line-height: 1;
    color: #ffffff;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .sq.sq-sm.sq-correct-upset::after { font-size: 5px; }
  .sq-wrong     { background: var(--swiftly-red); }
  .sq-cascaded  { background: var(--swiftly-red); }
  .sq-pending   { background: transparent; border: 1px solid var(--neutral-light); }
  .sq-empty     { background: transparent; }
  .sq           { cursor: pointer; }

  @keyframes sq-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .sq-live-correct { background: var(--swiftly-blue); animation: sq-pulse 1.8s ease-in-out infinite; }
  .sq-live-wrong   { background: var(--swiftly-red);  animation: sq-pulse 1.8s ease-in-out infinite; }
  .live-pulse      { animation: sq-pulse 1.8s ease-in-out infinite; font-weight: 500; }

  /* ── Tooltip ── */
  #sq-tooltip {
    position: fixed;
    z-index: 1000;
    background: var(--neutral-darkest);
    color: #ffffff;
    border-radius: 7px;
    padding: 10px 14px;
    font-size: 0.78rem;
    pointer-events: none;
    display: none;
    max-width: 220px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    line-height: 1.5;
  }

  #sq-tooltip .tt-match  { font-weight: 700; margin-bottom: 4px; color: var(--blue-light); }
  #sq-tooltip .tt-pick   { margin-bottom: 2px; }
  #sq-tooltip .tt-result { margin-bottom: 4px; color: var(--neutral-medium); }
  #sq-tooltip .tt-status { font-weight: 700; }
  #sq-tooltip .tt-status.correct   { color: var(--swiftly-blue); }
  #sq-tooltip .tt-status.wrong     { color: var(--swiftly-red); }
  #sq-tooltip .tt-status.cascaded  { color: var(--swiftly-red); }
  #sq-tooltip .tt-status.pending   { color: var(--neutral-medium); }

  /* ── Results table ── */
  .results-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .results-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 2px solid var(--neutral-light);
  }

  .results-table th {
    padding: 8px 12px;
    text-align: left;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    white-space: nowrap;
  }

  .results-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .results-table tbody tr:last-child { border-bottom: none; }
  .results-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .results-table td {
    padding: 5px 12px;
    vertical-align: middle;
  }

  /* Compact columns: shrink to content */
  .td-match-num, .td-grp, .td-score, .td-date, .td-time, .td-result {
    width: 1%;
    white-space: nowrap;
  }

  .td-match-num { color: var(--neutral-medium); font-weight: 700; text-align: center; }
  .td-grp       { color: var(--swiftly-blue); font-weight: 700; }
  .cell-tz      { display: none; }
  .td-result-cell { min-width: 160px; }

  .res-winner   { font-weight: 700; color: var(--neutral-darkest); white-space: nowrap; }
  .res-loser    { color: var(--neutral-dark); white-space: nowrap; }
  .res-verb     { font-size: 0.75rem; font-style: italic; color: var(--neutral-dark); margin: 0 5px; }
  .res-row-upcoming { opacity: 0.45; }
  .td-score     { font-weight: 700; color: var(--neutral-dark); white-space: nowrap; width: 1%; text-align: center; }
  .td-correct   { width: 1%; white-space: nowrap; text-align: center; }

  /* ── Side-by-side layout ── */
  .side-by-side-layout {
    display: flex;
    gap: 16px;
    align-items: flex-start;
  }

  .side-left {
    width: 380px;
    flex-shrink: 0;
  }

  .side-right {
    flex: 1;
    min-width: 0;
  }

  /* ── Group tables ── */
  .group-tables-grid {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 8px;
  }

  .group-table-card {
    background: #ffffff;
    border: 1px solid var(--neutral-light);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 5px rgba(0,0,0,0.04);
  }

  .group-table-header {
    background: var(--swiftly-blue);
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.78rem;
    padding: 7px 12px;
  }

  .group-table table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
  }

  .group-table thead tr {
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table th {
    padding: 5px 8px;
    font-size: 0.68rem;
    font-weight: 700;
    color: var(--neutral-dark);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    text-align: center;
  }

  .group-table th.th-team { text-align: left; }
  .group-table td.td-team { min-width: 130px; }
  .group-table td:not(.td-team), .group-table th:not(.th-team) { white-space: nowrap; width: 1%; padding-left: 4px; padding-right: 4px; }

  .group-table tbody tr {
    border-bottom: 1px solid var(--neutral-light);
  }

  .group-table tbody tr:last-child { border-bottom: none; }
  .group-table tbody tr:nth-child(even) { background: var(--neutral-lightest); }

  .group-table td {
    padding: 5px 8px;
    text-align: center;
    color: var(--neutral-darkest);
  }

  .group-table td.td-team {
    text-align: left;
    font-weight: 700;
  }

  .group-table td.td-pts {
    font-weight: 700;
    color: var(--swiftly-blue);
  }

  .group-table tr.qualified      td { background: var(--blue-lightest); }
  .group-table tr.third-qual     td { background: #e6f9ef; }
  .group-table tr.third-pending  td { background: #fff8e6; }
  .group-table tr.eliminated     td { background: #fdf0f0; color: var(--neutral-medium); }
  .group-table tr.eliminated td.td-team { color: var(--neutral-dark); }

  /* ── Knockout bracket ── */
  .bk-wrap {
    overflow-x: auto;
    padding: 14px 4px 18px;
  }
  .bk-bracket {
    display: flex;
    gap: 0;
    width: 100%;
    align-items: flex-start;
    position: relative;
  }
  .bk-col {
    flex: 1;
    min-width: 120px;
    padding: 0 10px;
  }
  .bk-col-hdr {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    padding-bottom: 6px;
    border-bottom: 2px solid;
    margin-bottom: 10px;
  }
  .bk-col.r32 .bk-col-hdr { border-color: #B5D4F4; color: #378ADD; }
  .bk-col.r16 .bk-col-hdr { border-color: #85B7EB; color: #185FA5; }
  .bk-col.qf  .bk-col-hdr { border-color: #378ADD; color: #185FA5; }
  .bk-col.sf  .bk-col-hdr { border-color: #185FA5; color: #0C447C; }
  .bk-col.fin .bk-col-hdr { border-color: #0C447C; color: #0C447C; }
  /* R32 anchor column: nested flex with hierarchy gaps */
  /* R32 hierarchy — uniform 16px gap at every level */
  .bk-matches, .bk-half, .bk-quarter, .bk-pair { display: flex; flex-direction: column; gap: 16px; }
  /* R16/QF/SF/Final: cards absolutely positioned by JS to align with R32 anchors */
  .bk-float    { position: relative; }  /* wraps absolutely-positioned cards */
  .bk-float .bk-card { position: absolute; left: 0; right: 0; }
  .bk-card {
    background: #ffffff;
    border: 0.5px solid var(--neutral-light);
    border-radius: 8px;
    overflow: hidden;
  }
  .bk-mnum {
    font-size: 0.70rem;
    color: var(--neutral-dark);
    text-align: left;
    padding: 2px 8px;
    background: var(--neutral-lightest);
    letter-spacing: 0.2px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 4px;
  }
  .bk-mnum-label {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    min-width: 0;
  }
  /* ── Correctness pill ── */
  .cp-pill { display: inline-block; font-size: 0.62rem; font-weight: 600; padding: 1px 6px; border-radius: 20px; white-space: nowrap; line-height: 1.6; flex-shrink: 0; }
  .cp-hi   { background: #d4f0fb; color: #00628a; }
  .cp-mid  { background: #fff0d0; color: #a05800; }
  .cp-lo   { background: #fce0e7; color: #b3003d; }
  .bk-team {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 9px;
    font-size: 0.92rem;
    font-weight: 400;
    margin: 0 4px;
    border-radius: 5px;
    border: 1.5px solid #cce8f4;
  }
  .bk-mnum + .bk-team { margin-top: 4px; }
  .bk-team + .bk-team { margin-top: 4px; }
  .bk-team:last-child { margin-bottom: 4px; }
  .bk-fl { font-size: 0.85rem; line-height: 1; flex-shrink: 0; width: 16px; text-align: center; }
  .bk-tn { flex: 1; font-weight: 400; color: var(--neutral-darkest); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bk-rank, .team-rank { font-weight: 400; color: var(--neutral-dark); font-size: 0.68rem; }
  .bk-sc { font-size: 0.78rem; font-weight: 700; color: var(--neutral-medium); min-width: 12px; text-align: right; flex-shrink: 0; }
  .bk-team.tbd .bk-fl { opacity: 0.25; }
  .bk-team.tbd .bk-tn { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-team.w { background: var(--swiftly-blue); border-color: var(--swiftly-blue); }
  .bk-team.w .bk-fl { color: #ffffff; }
  .bk-team.w .bk-tn { color: #ffffff; font-weight: 500; }
  .bk-team.w .team-rank { color: rgba(255,255,255,0.75); }
  .bk-team.w .bk-sc { color: rgba(255,255,255,0.75); }
  .bk-team.l { border-color: transparent; background: transparent; }
  .bk-team.l .bk-fl { opacity: 0.35; }
  .bk-team.l .bk-tn { color: var(--neutral-medium); }
  .bk-team.l .team-rank { color: var(--neutral-medium); }
  .bk-team.l .bk-sc { color: var(--neutral-medium); }
  .bracket-pending {
    font-size: 0.78rem;
    color: var(--neutral-dark);
    text-align: center;
    padding: 32px 16px;
    font-style: italic;
  }

  /* ── Mobile bracket tabs (Variant 1) ── */
  .bk-mobile-tabs { display: none; background: #ffffff; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--neutral-light); }
  .bk-tab-bar {
    display: flex;
    border-bottom: 1.5px solid var(--neutral-light);
    background: var(--neutral-lightest);
  }
  .bk-tab {
    flex: 1;
    padding: 9px 2px;
    font-size: 0.72rem;
    font-weight: 700;
    border: none;
    background: none;
    cursor: pointer;
    color: var(--neutral-dark);
    border-bottom: 2px solid transparent;
    margin-bottom: -1.5px;
    letter-spacing: 0.2px;
  }
  .bk-tab.active { color: #185FA5; border-bottom-color: #185FA5; }
  .bk-tab-panel { display: none; }
  .bk-tab-panel.active { display: flex; flex-direction: column; gap: 7px; padding: 8px 10px; background: var(--neutral-lightest); }
  .bk-mob-match { padding: 8px 10px; border: 0.5px solid var(--neutral-light); border-radius: 10px; background: #ffffff; }
  .bk-mob-pair-pill { display: flex; justify-content: center; padding: 2px 0; }
  .bk-mob-pair-pill span { font-size: 10px; font-weight: 500; color: #185FA5; background: var(--blue-lightest); border: 1px solid var(--blue-light); border-radius: 20px; padding: 3px 12px; }
  .bk-mob-pair-group { border: 1px solid var(--blue-light); border-radius: 12px; padding: 8px; display: flex; flex-direction: column; gap: 5px; }
  .bk-mob-meta {
    font-size: 0.70rem;
    color: var(--neutral-dark);
    margin-bottom: 5px;
  }
  .bk-mob-teams { display: flex; flex-direction: column; gap: 4px; }
  .bk-mob-team {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 6px;
    font-size: 0.90rem;
    color: var(--neutral-darkest);
    font-weight: 400;
    padding: 7px 9px;
    border-radius: 6px;
    border: 1.5px solid var(--blue-light);
    background: #ffffff;
  }
  .bk-mob-team-name { flex: 1 1 0; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .bk-mob-sc { flex-shrink: 0; font-weight: inherit; color: inherit; font-variant-numeric: tabular-nums; }
  .bk-mob-team.tbd {
    color: var(--neutral-medium);
    font-style: italic;
    font-weight: 400;
    border-color: var(--neutral-light);
  }
  .bk-mob-team.bk-mob-win { font-weight: 500; background: var(--swiftly-blue); border-color: var(--swiftly-blue); color: #ffffff; }
  .bk-mob-team.bk-mob-win .team-rank { color: rgba(255,255,255,0.75); }
  .bk-mob-team.bk-mob-win .bk-mob-sc { color: rgba(255,255,255,0.85); }
  .bk-mob-team.bk-mob-los { font-weight: 400; border-color: transparent; background: transparent; color: var(--neutral-medium); }
  .bk-mob-team.bk-mob-los .team-rank { color: var(--neutral-medium); }
  .bk-mob-team.bk-mob-los .bk-mob-sc { color: var(--neutral-medium); }
  .bk-mob-match.bk-mob-upcoming { opacity: 0.45; }

  /* ── Podium / final results (Variants 2 & 3; shown in Variant 1 for now) ── */
  .bk-float .bk-podium { position: absolute; left: 0; right: 0; }
  .bk-podium {
    border-radius: 8px;
    overflow: hidden;
    border: 0.5px solid var(--neutral-light);
    background: #ffffff;
  }
  .bk-podium-hdr {
    font-size: 0.68rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    text-align: center;
    padding: 5px 8px;
    background: var(--neutral-lightest);
    border-bottom: 1px solid var(--neutral-light);
    color: var(--neutral-dark);
  }
  .bk-podium-row {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 8px;
    font-size: 0.78rem;
    border-bottom: 0.5px solid var(--neutral-light);
  }
  .bk-podium-row:last-child { border-bottom: none; }
  .bk-podium-medal { font-size: 1rem; flex-shrink: 0; line-height: 1; }
.bk-podium-team {
    flex: 1;
    font-weight: 600;
    color: var(--neutral-darkest);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bk-podium-team.tbd { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .bk-podium-row.gold   { background: #fffbeb; }
  .bk-podium-row.silver { background: var(--neutral-lightest); }
  .bk-podium-row.bronze { background: #fff6f0; }

  /* ── Loading / error states ── */
  .state-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--neutral-dark);
    font-size: 0.875rem;
  }

  .state-msg .emoji { font-size: 2rem; display: block; margin-bottom: 12px; }
  .state-msg--loading { visibility: hidden; }


  /* ── KO teaser ── */
  .ko-teaser {
    text-align: center;
    padding: 28px 20px;
    margin-bottom: 32px;
  }
  .ko-teaser-icon { font-size: 2rem; margin-bottom: 8px; }
  .ko-teaser-title {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--neutral-darkest);
    margin-bottom: 6px;
  }
  .ko-teaser-msg { font-size: 0.78rem; color: var(--neutral-dark); }

  /* ── Combined standings columns ── */
  .td-grp-pts, .td-ko-pts, .td-total-pts, .td-max-pts { width: 64px; min-width: 64px; text-align: center; }
  .td-grp-pts   { color: var(--neutral-dark); font-weight: 400; }
  .td-ko-pts    { color: var(--neutral-dark); font-weight: 400; }
  .td-total-pts { font-weight: 700; color: var(--neutral-darkest); }
  .td-max-pts   { color: var(--neutral-medium); font-weight: 400; font-style: italic; }
  .sq-divider {
    display: inline-block;
    width: 1.5px;
    height: 14px;
    background: var(--neutral-medium);
    margin: 0 5px;
    vertical-align: middle;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .sq-divider-sm {
    display: inline-block;
    width: 1.5px;
    height: 10px;
    background: var(--neutral-medium);
    margin: 0 4px;
    vertical-align: middle;
    border-radius: 1px;
    flex-shrink: 0;
  }
  .champ-pick  { font-size: 0.82rem; color: var(--neutral-dark); margin-left: 6px; white-space: nowrap; align-self: center; }
  .champ-correct   { color: var(--swiftly-blue); font-weight: 600; }
  .champ-wrong     { color: var(--swiftly-red); text-decoration: line-through; }
  .champ-cascaded  { color: var(--swiftly-red); text-decoration: line-through; font-style: italic; }

  /* ── Mobile responsive (≤ 640 px — phones) ── */
  @media (max-width: 640px) {
    /* Header */
    header { padding: 16px 0 14px; }
    .header-title { font-size: clamp(0.82rem, 3.6vw, 1.2rem); white-space: nowrap; }

    /* Sticky bar: hide timestamp to keep it single-line */
    .updated-at { display: none; }

    /* Stack group tables and match results vertically */
    .side-by-side-layout { flex-direction: column; }
    .side-left  { width: 100%; order: 2; }
    .side-right { order: 1; }

    /* Standings: hide per-match squares and max-pts — too wide for phones */
    .th-squares, .td-squares   { display: none; }
    .th-max-pts, .td-max-pts   { display: none; }
    /* KO standings: hide split pts columns, keep total */
    .th-grp-pts, .td-grp-pts   { display: none; }
    .th-ko-pts,  .td-ko-pts    { display: none; }
    .td-name                   { white-space: normal; }

    /* Results table: hide # date & time columns; score stays pinned */
    .th-date, .td-date, .th-time, .td-time { display: none; }
    .td-match-num { display: none; }
    .results-table th:first-child { display: none; }
    .results-table { table-layout: auto; }
    #results-body .card { overflow-x: auto; }

    /* Bracket: hide 5-column desktop layout, show tab view on phones */
    .bk-outer { display: none; }
    .bk-mobile-tabs { display: block; }
  }

  @media (max-width: 896px) and (orientation: landscape) {
    /* Stack group tables and match results vertically in landscape on phones */
    .side-by-side-layout { flex-direction: column; }
    .side-left  { width: 100%; order: 2; }
    .side-right { order: 1; }
    /* Standings: allow horizontal scroll instead of clipping */
    #standings-body .card { overflow-x: auto; }
  }
</style>
<script src="bracket.js"></script>
<script src="scoring.js"></script>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-title">World Cup 2026 Pool · Friends &amp; Family Leaderboard</div>
  </div>
</header>

<div class="sticky-bar">
  <div class="sticky-inner">
    <span class="progress-label" id="stageLabel">Group stage</span>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <span class="progress-count" id="matchesPlayed"></span>
    <span class="updated-at" id="updatedAt"></span>
  </div>
</div>

<div id="sq-tooltip"></div>

<div class="container">

  <!-- KO standings: teaser (group mode) or primary (KO mode) -->
  <div id="koStandingsSection"></div>

  <!-- KO bracket: only visible in KO mode -->
  <div id="koBracketSection" style="display:none">
    <p class="section-label">Knockout bracket</p>
    <div class="section-body">
      <div id="koBracketCard"><div class="state-msg state-msg--loading"><span class="emoji">⏳</span>Loading…</div></div>
    </div>
  </div>

  <!-- Group section -->
  <div id="groupSection">
    <div id="groupSectionBody">
      <p class="section-label" id="groupStandingsLabel">Standings</p>
      <div class="section-body" id="standings-body">
        <div class="card" id="standingsCard"><div class="state-msg state-msg--loading"><span class="emoji">⏳</span>Loading picks and results…</div></div>
      </div>
      <div class="side-by-side-layout">
        <div class="side-left">
          <p class="section-label">Group tables</p>
          <div class="section-body" id="groups-body">
            <div class="card" id="groupTablesCard"><div class="state-msg state-msg--loading"><span class="emoji">⏳</span>Loading…</div></div>
          </div>
        </div>
        <div class="side-right">
          <p class="section-label">Match results</p>
          <div class="section-body" id="results-body">
            <div class="card" id="resultsCard"><div class="state-msg state-msg--loading"><span class="emoji">⏳</span>Loading…</div></div>
          </div>
        </div>
      </div>
      <p class="section-label" id="bracketSectionLabel">Provisional bracket</p>
      <div class="section-body" id="bracket-body">
        <div id="bracketCard"><div class="state-msg state-msg--loading"><span class="emoji">⏳</span>Loading…</div></div>
      </div>
      <!-- KO teaser rendered here in group mode -->
      <div id="koTeaserSection"></div>
    </div>
  </div>

</div>

<script>
// ── Pool config ───────────────────────────────────────────
const POOL_ID   = 'fandf';
// ──────────────────────────────────────────────────────────

// ── Live scores toggle (internal — not a URL param) ───────
const LIVE_SCORES_ENABLED = true;
// ──────────────────────────────────────────────────────────

// ── ESPN team name map (5 names differ from internal) ─────
const ESPN_TEAM_MAP_JS = {
  'Czechia':             'Czech Republic',
  'Türkiye':             'Turkey',
  'Bosnia-Herzegovina':  'Bosnia and Herzegovina',
  'Congo DR':            'DR Congo',
  'Curacao':             'Curaçao',
};
// ──────────────────────────────────────────────────────────

// ── Live scores state ─────────────────────────────────────
let _liveData       = {};   // { matchNum: { minute, homeScore, awayScore, state } }
let _lastStandings  = null;
let _lastResults    = null;
let _inInit         = false; // guard: prevents fetchLiveScores from re-entering init()
let _pendingResults = new Set(); // matches where ESPN said game ended but CSV not yet confirmed
let _lastGrpCounts  = null;
let _livePoller     = null;
// ──────────────────────────────────────────────────────────


// All data files → raw.githubusercontent.com with cache: 'no-store' (always fresh, no CDN)
const _RAW = 'https://raw.githubusercontent.com/riteshwarade/wc26/main';
const PICKS_URL      = `${_RAW}/data/group_${POOL_ID}_picks.json`;
const RESULTS_URL    = `${_RAW}/results/group_results.csv`;
const BRACKET_URL    = `${_RAW}/data/knockout_bracket.json`;
const KO_PICKS_URL   = `${_RAW}/data/knockout_${POOL_ID}_picks.json`;
const KO_RESULTS_URL = `${_RAW}/results/knockout_results.csv`;

// ── Mode detection ────────────────────────────────────────
// ?games=N  simulates the leaderboard at match N (0–104):
//   0–72  → group stage, first N results shown
//   73–104 → knockout stage, all 72 group + first (N-72) KO results shown
// Omit for normal date-driven behaviour.
const _gamesParam = new URLSearchParams(window.location.search).get('games');
const _gamesN     = _gamesParam !== null ? Math.max(0, Math.min(104, parseInt(_gamesParam, 10))) : null;
const knockoutMode = (_gamesN !== null ? _gamesN >= 73 : false)
  || new Date() >= new Date('2026-06-28T00:00:00Z');

function _sliceCsv(csv, n) {
  const lines = csv.trim().split('\n');
  return [lines[0], ...lines.slice(1, n + 1)].join('\n');
}


// ── Render KO teaser (group mode) ────────────────────────
function renderKoTeaser() {
  document.getElementById('koTeaserSection').innerHTML = `
    <div class="ko-teaser card">
      <div class="ko-teaser-icon">🏆</div>
      <div class="ko-teaser-title">Knockout Stage</div>
      <div class="ko-teaser-msg">Knockout picks will be collected after Jun 27. Once submitted, the combined standings will appear here.</div>
    </div>`;
}

// ── Rendering helpers ─────────────────────────────────────
function pickLabel(outcome, t1, t2) {
  if (outcome === 'W1')   return `${t1} win`;
  if (outcome === 'W2')   return `${t2} win`;
  if (outcome === 'Draw') return 'Draw';
  return '—';
}

// ── Render KO standings (KO mode) ────────────────────────
function renderKoStandings(combinedStandings, koResults, bracketData) {
  if (!combinedStandings.length) {
    document.getElementById('koStandingsSection').innerHTML =
      '<div class="state-msg"><span class="emoji">📭</span>No standings available yet.</div>';
    return;
  }

  const KO_MATCH_ORDER = [73,74,75,76,77,78,79,80,81,82,83,84,85,86,87,88,
                           89,90,91,92,93,94,95,96,97,98,99,100,101,102,103,104];

  let rank = 1, prevPts = null, rows = '';
  combinedStandings.forEach((p, i) => {
    if (p.totalPts !== prevPts) { rank = i + 1; prevPts = p.totalPts; }
    const topClass = rank <= 3 ? ' top3' : '';

    // KO squares (32 matches) with round dividers after R32/R16/QF/SF
    const KO_ROUND_BREAKS = new Set([88, 96, 100, 102, 103]);
    const koSquareParts = [];
    for (const m of KO_MATCH_ORDER) {
      const pr = p.koPickResults[m] || { status: 'empty', pick: null, winner: null };
      const [t1, t2] = bracketData ? getKoTeams(m, bracketData, koResults) : ['TBD','TBD'];
      const teamsStr = `${t1} v ${t2}`;
      const pickStr = pr.pick || '—';
      const resultStr = pr.winner || 'Not played yet';
      koSquareParts.push(`<span class="sq sq-${pr.status}"
        data-match="M${m}" data-teams="${_esc(teamsStr)}"
        data-pick="${_esc(pickStr)}" data-result="${_esc(resultStr)}" data-status="${pr.status}"></span>`);
      if (KO_ROUND_BREAKS.has(m)) koSquareParts.push('<span class="sq-divider"></span>');
    }
    const koSquares = koSquareParts.join('');

    const champPr = p.koPickResults[104] || { status: 'empty', pick: null };
    const champName = champPr.pick || '—';
    const champClass = champPr.status === 'correct'  ? 'champ-correct'
                     : champPr.status === 'wrong'    ? 'champ-wrong'
                     : champPr.status === 'cascaded' ? 'champ-cascaded'
                     : '';
    const champIcon = champPr.pick ? '🥇 ' : '';
    const champLabel = `<span class="champ-pick ${champClass}">${champIcon}${_esc(champName)}</span>`;

    rows += `<tr>
      <td class="td-rank${topClass}">${rank}</td>
      <td class="td-name">${_esc(_abbrevName(p.name))}</td>
      <td class="td-grp-pts">${p.groupPts}</td>
      <td class="td-ko-pts">${p.koPts}</td>
      <td class="td-total-pts">${p.totalPts}</td>
      <td class="td-max-pts">${p.maxPts}</td>
      <td class="td-squares"><div class="squares-wrap">${koSquares}${champLabel}</div></td>
    </tr>`;
  });

  document.getElementById('koStandingsSection').innerHTML = `
    <p class="section-label">Knockout Standings <span class="standings-count">${combinedStandings.length} players</span></p>
    <div class="section-body">
      <div class="card">
        <table class="standings-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th class="th-grp-pts">Grp</th>
              <th class="th-ko-pts">KO</th>
              <th class="th-total-pts">Total</th>
              <th class="th-max-pts">Max</th>
              <th class="th-squares">Picks <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--neutral-medium);font-size:0.68rem">(blue = correct · red = wrong · red italic = cascaded void · empty = pending)</span></th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>`;
}

// ── Render KO bracket (KO mode) ───────────────────────────
function renderKoBracket(bracketData, koResults, koScores, koCounts) {
  const el = document.getElementById('koBracketCard');
  if (!el) return;

  if (!bracketData) {
    el.innerHTML = '<div class="bracket-pending">Bracket data not available yet.</div>';
    return;
  }

  function mkCard(m) {
    const [h, a] = getKoTeams(m, bracketData, koResults);
    const winner = koResults[m];
    const sc     = koScores ? koScores[m] : null;
    let homeCls = '', awayCls = '';
    if (winner) {
      homeCls = winner === h ? 'w' : 'l';
      awayCls = winner === a ? 'w' : 'l';
    }
    let hSc = sc ? sc.home : undefined;
    let aSc = sc ? sc.away : undefined;
    if (sc && sc.homePen != null) {
      hSc = `${sc.home} (${sc.homePen})`;
      aSc = `${sc.away} (${sc.awayPen})`;
    }
    let cardHtml = matchCard(m, h, a, '', hSc, aSc, homeCls, awayCls);
    // Inject correctness pill into .bk-mnum as a flex row
    if (winner) {
      const c = koCounts && koCounts[m];
      const pill = c ? correctnessPill(c.correct, c.total) : '';
      cardHtml = cardHtml.replace(
        /(<div class="bk-mnum">)([\s\S]*?)(<\/div>)/,
        `$1<span class="bk-mnum-label">$2</span>${pill}$3`
      );
    } else {
      // No pill but still wrap label for consistent flex layout
      cardHtml = cardHtml.replace(
        /(<div class="bk-mnum">)([\s\S]*?)(<\/div>)/,
        `$1<span class="bk-mnum-label">$2</span>$3`
      );
    }
    return cardHtml;
  }

  // Determine podium teams
  const champion  = koResults[104] || null;
  let runnerUp = null;
  if (champion) {
    const [f1, f2] = getKoTeams(104, bracketData, koResults);
    runnerUp = champion === f1 ? f2 : f1;
  }
  const thirdPlace = koResults[103] || null;
  const podiumHtml = buildPodiumHtml(champion, runnerUp, thirdPlace);

  // ── Mobile tab view (Variant 3) ─────────────────────────
  const KO_MOB_ROUNDS = [
    { id: 'r32', label: 'R32',   matches: [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87] },
    { id: 'r16', label: 'R16',   matches: [89,90,93,94,91,92,95,96] },
    { id: 'qf',  label: 'QF',    matches: [97,98,99,100] },
    { id: 'sf',  label: 'SF',    matches: [101,102] },
    { id: '3rd', label: '3rd',   matches: [103] },
    { id: 'fin', label: 'Final', matches: [104] },
  ];
  // Auto-open the first round with any unplayed matches
  let koActiveRound = KO_MOB_ROUNDS[KO_MOB_ROUNDS.length - 1].id;
  for (const r of KO_MOB_ROUNDS) {
    if (r.matches.some(m => !koResults[m])) { koActiveRound = r.id; break; }
  }
  function koMobMatchCard(m) {
    const [h, a] = getKoTeams(m, bracketData, koResults);
    const winner = koResults[m];
    const sc     = koScores ? koScores[m] : null;
    const hTbd   = isTbd(h), aTbd = isTbd(a);
    const hCls   = winner ? (winner === h ? ' bk-mob-win' : ' bk-mob-los') : '';
    const aCls   = winner ? (winner === a ? ' bk-mob-win' : ' bk-mob-los') : '';
    const date   = KO_SCHEDULE[m] ? ` · ${koDisplay(m)}` : '';
    const c      = koCounts && koCounts[m];
    const pill   = (winner && c) ? ' ' + correctnessPill(c.correct, c.total) : '';
    // Per-team score strings (shown on each row, not in meta)
    let hScTxt = '', aScTxt = '';
    if (sc) {
      if (sc.homePen != null) {
        hScTxt = `${sc.home} (${sc.homePen})`;
        aScTxt = `${sc.away} (${sc.awayPen})`;
      } else {
        hScTxt = String(sc.home);
        aScTxt = String(sc.away);
      }
    }
    const hHtml  = hTbd ? h : teamHtml(h);
    const aHtml  = aTbd ? a : teamHtml(a);
    const hScHtml = hScTxt ? `<span class="bk-mob-sc">${hScTxt}</span>` : '';
    const aScHtml = aScTxt ? `<span class="bk-mob-sc">${aScTxt}</span>` : '';
    const upCls  = !winner ? ' bk-mob-upcoming' : '';
    return `<div class="bk-mob-match${upCls}">
      <div class="bk-mob-meta">M${m}${date}${pill}</div>
      <div class="bk-mob-teams">
        <div class="bk-mob-team${hTbd ? ' tbd' : hCls}"><span class="bk-mob-team-name">${hHtml}</span>${hScHtml}</div>
        <div class="bk-mob-team${aTbd ? ' tbd' : aCls}"><span class="bk-mob-team-name">${aHtml}</span>${aScHtml}</div>
      </div>
    </div>`;
  }
  const koMobTabBarHtml = KO_MOB_ROUNDS.map(r =>
    `<button class="bk-tab${r.id === koActiveRound ? ' active' : ''}" onclick="switchBracketTab('${r.id}')" data-round="${r.id}">${r.label}</button>`
  ).join('');
  const KO_PAIR_NEXT = {
    r32: [['R16','M89'],['R16','M90'],['R16','M93'],['R16','M94'],['R16','M91'],['R16','M92'],['R16','M95'],['R16','M96']],
    r16: [['QF','M97'],['QF','M98'],['QF','M99'],['QF','M100']],
    qf:  [['SF','M101'],['SF','M102']],
    sf:  [['Final','M104']],
  };
  const koMobPanelsHtml = KO_MOB_ROUNDS.map(r => {
    const pairs = KO_PAIR_NEXT[r.id] || [];
    let html = '';
    for (let i = 0; i < r.matches.length; i += 2) {
      const m1 = r.matches[i];
      const m2 = r.matches[i + 1];
      const pair = pairs[i / 2];
      if (m2 !== undefined && pair) {
        const [rl, mn] = pair;
        html += `<div class="bk-mob-pair-group">`;
        html += koMobMatchCard(m1);
        html += `<div class="bk-mob-pair-pill"><span>winners meet in ${rl} · ${mn}</span></div>`;
        html += koMobMatchCard(m2);
        html += `</div>`;
      } else {
        html += koMobMatchCard(m1);
        if (m2 !== undefined) html += koMobMatchCard(m2);
      }
    }
    return `<div class="bk-tab-panel${r.id === koActiveRound ? ' active' : ''}" id="bk-panel-${r.id}">${html}</div>`;
  }).join('');
  const koMobTabHtml = `<div class="bk-mobile-tabs"><div class="bk-tab-bar">${koMobTabBarHtml}</div>${koMobPanelsHtml}</div>`;

  el.innerHTML = buildBracketHtml(mkCard, { podiumHtml }) + koMobTabHtml;
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));
}

// ── Setup layout based on mode ────────────────────────────
function setupLayout() {
  if (knockoutMode) {
    // Show KO bracket section only; hide everything group-stage related
    document.getElementById('koBracketSection').style.display = '';
    document.getElementById('groupSection').style.display = 'none';
    // Update sticky bar label
    document.getElementById('stageLabel').textContent = 'Knockout stage';
  } else {
    // Group mode: render teaser below the bracket
    renderKoTeaser();
  }
}


// ── Render standings ──────────────────────────────────────
function renderStandings(standings, liveData = {}) {
  if (!standings.length) {
    document.getElementById('standingsCard').innerHTML =
      '<div class="state-msg"><span class="emoji">📭</span>No picks submitted yet.</div>';
    return;
  }

  // Update standings label with participant count pill
  const lbl = document.getElementById('groupStandingsLabel');
  if (lbl) lbl.innerHTML = `Standings <span class="standings-count">${standings.length} players</span>`;

  const GRP_ROUND_BREAKS = new Set([24, 48]);
  let rank = 1, prevPts = null, rows = '';
  standings.forEach((p, i) => {
    if (p.points !== prevPts) { rank = i + 1; prevPts = p.points; }
    const topClass = rank <= 3 ? ' top3' : '';
    const squareParts = [];
    for (const [num, , , , t1, t2] of MATCHES) {
      const pr = p.pickResults[num] || { status: 'empty', pick: null, result: null };
      const myPick = pr.pick ? pickLabel(pr.pick, t1, t2) : '—';
      const res = pr.result
        ? `${pr.result.home}–${pr.result.away} (${pickLabel(pr.result.outcome, t1, t2)})`
        : 'Not played yet';
      let sqStatus = pr.status === 'correct' && _isUpsetResult(t1, t2, pr.result?.outcome)
        ? 'correct-upset' : pr.status;
      // Override with live status if match is in-progress and pick is still pending
      const lm = liveData && liveData[num];
      if (lm && pr.status === 'pending' && pr.pick) {
        const cur = lm.homeScore > lm.awayScore ? 'W1' : lm.awayScore > lm.homeScore ? 'W2' : 'Draw';
        sqStatus = pr.pick === cur ? 'live-correct' : 'live-wrong';
      }
      squareParts.push(`<span class="sq sq-sm sq-${sqStatus}"
        data-match="${num}" data-teams="${_esc(`${t1} v ${t2}`)}"
        data-pick="${_esc(myPick)}" data-result="${_esc(res)}" data-status="${sqStatus}"></span>`);
      if (GRP_ROUND_BREAKS.has(num)) squareParts.push('<span class="sq-divider-sm"></span>');
    }
    const squares = squareParts.join('');
    rows += `<tr>
      <td class="td-rank${topClass}">${rank}</td>
      <td class="td-name">${_esc(_abbrevName(p.name))}</td>
      <td class="td-points">${p.points}</td>
      <td class="td-squares"><div class="squares-wrap nowrap">${squares}</div></td>
    </tr>`;
  });

  document.getElementById('standingsCard').innerHTML = `
    <table class="standings-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Pts</th>
          <th class="th-squares">Picks <span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--neutral-medium);font-size:0.68rem">(blue = correct · red = wrong · empty = pending)</span></th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ── Local match time (converts UTC ISO → user's local timezone) ──────────────
// TZ abbreviation for column header (e.g. 'EDT', 'PDT', 'BST')
const _tzAbbr = new Date().toLocaleTimeString('en-US', { timeZoneName: 'short' }).split(' ').pop();

function localMatchTime(utcStr) {
  try {
    const dt = new Date(utcStr);
    const t = dt.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
    return `${t}<span class="cell-tz"> ${_tzAbbr}</span>`;
  } catch (e) { return utcStr; }
}

// ── Render match results ──────────────────────────────────
// ── Correctness pill helpers ──────────────────────────────
function correctnessPill(correct, total) {
  if (!total) return '';
  const pct = correct / total;
  const cls = pct >= 0.67 ? 'cp-hi' : pct >= 0.33 ? 'cp-mid' : 'cp-lo';
  return `<span class="cp-pill ${cls}">${correct}/${total}</span>`;
}

// Count correct/wrong per group match across all participants.
// Excludes 'pending' and 'empty' (no result yet or no pick made).
function buildGrpCounts(standings) {
  const counts = {};
  for (const p of standings) {
    for (const [numStr, pr] of Object.entries(p.pickResults || {})) {
      const num = Number(numStr);
      if (pr.status === 'correct' || pr.status === 'wrong') {
        if (!counts[num]) counts[num] = { correct: 0, total: 0 };
        counts[num].total++;
        if (pr.status === 'correct') counts[num].correct++;
      }
    }
  }
  return counts;
}

// Count correct/wrong per KO match across all participants.
// Excludes 'cascaded' (invalid pick) and 'pending'/'empty'.
function buildKoCounts(combined) {
  const counts = {};
  for (const p of combined) {
    for (const [numStr, pr] of Object.entries(p.koPickResults || {})) {
      const num = Number(numStr);
      if (pr.status === 'correct' || pr.status === 'wrong') {
        if (!counts[num]) counts[num] = { correct: 0, total: 0 };
        counts[num].total++;
        if (pr.status === 'correct') counts[num].correct++;
      }
    }
  }
  return counts;
}

function renderResults(results, grpCounts, liveData = {}) {
  const rows = MATCHES.map(([num, grp, date, time, t1, t2]) => {
    const r = results[num];
    const lm = r ? null : liveData[num]; // ignore live data once CSV confirms result
    let resultCell, scoreCell, timeCell, correctCell = '';
    if (lm) {
      // Live or post-bridge: compute correct count from standings + current score
      const cur = lm.homeScore > lm.awayScore ? 'W1' : lm.awayScore > lm.homeScore ? 'W2' : 'Draw';
      let liveCorrect = 0, liveTotal = 0;
      if (_lastStandings) {
        for (const p of _lastStandings) {
          const pr = p.pickResults && p.pickResults[num];
          if (pr && pr.pick) { liveTotal++; if (pr.pick === cur) liveCorrect++; }
        }
      }
      const isLive  = lm.state === 'in';
      const pulse   = s => isLive ? `<span class="live-pulse">${s}</span>` : s;
      resultCell  = `${teamHtml(t1)} v ${teamHtml(t2)}`;
      scoreCell   = pulse(`${lm.homeScore} – ${lm.awayScore}`);
      timeCell    = isLive ? `<span class="live-pulse">${lm.minute}′</span>` : 'FT';
      correctCell = liveTotal ? pulse(correctnessPill(liveCorrect, liveTotal)) : '';
    } else if (!r) {
      resultCell = `${teamHtml(t1)} v ${teamHtml(t2)}`;
      scoreCell  = `–`;
      timeCell   = localMatchTime(time);
    } else if (r.outcome === 'Draw') {
      resultCell = `<span class="res-loser">${teamHtml(t1)}</span>`
                 + `<span class="res-verb">drew</span>`
                 + `<span class="res-loser">${teamHtml(t2)}</span>`;
      const c = grpCounts && grpCounts[num];
      scoreCell   = `${r.home} – ${r.away}`;
      correctCell = c ? correctnessPill(c.correct, c.total) : '';
      timeCell    = 'FT';
    } else {
      const [winner, loser] = r.outcome === 'W1' ? [t1, t2] : [t2, t1];
      resultCell = `<span class="res-winner">${teamHtml(winner)}</span>`
                 + `<span class="res-verb">beat</span>`
                 + `<span class="res-loser">${teamHtml(loser)}</span>`;
      const score = r.outcome === 'W2' ? `${r.away} – ${r.home}` : `${r.home} – ${r.away}`;
      const c = grpCounts && grpCounts[num];
      scoreCell   = score;
      correctCell = c ? correctnessPill(c.correct, c.total) : '';
      timeCell    = 'FT';
    }
    return `<tr class="${r || lm ? '' : 'res-row-upcoming'}">
      <td class="td-match-num">${num}</td>
      <td class="td-grp">${grp}</td>
      <td class="td-date">${date}</td>
      <td class="td-time">${timeCell}</td>
      <td class="td-result-cell">${resultCell}</td>
      <td class="td-score">${scoreCell}</td>
      <td class="td-correct">${correctCell}</td>
    </tr>`;
  }).join('');

  document.getElementById('resultsCard').innerHTML = `
    <table class="results-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Grp</th>
          <th class="th-date">Date</th>
          <th class="th-time">Time (${_tzAbbr})</th>
          <th>Result</th>
          <th style="text-align:center">Score</th>
          <th style="text-align:center">Correct</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

  A: ['Mexico','South Africa','South Korea','Czech Republic'],
  B: ['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
  C: ['Brazil','Morocco','Haiti','Scotland'],
  D: ['United States','Paraguay','Australia','Turkey'],
  E: ['Germany','Curaçao','Ivory Coast','Ecuador'],
  F: ['Netherlands','Japan','Sweden','Tunisia'],
  G: ['Belgium','Egypt','Iran','New Zealand'],
  H: ['Spain','Cape Verde','Saudi Arabia','Uruguay'],
  I: ['France','Senegal','Iraq','Norway'],
  J: ['Argentina','Algeria','Austria','Jordan'],
  K: ['Portugal','DR Congo','Uzbekistan','Colombia'],

};

// ── Group tables ─────────────────────────────────────────
// ── Group table card template (reusable across leaderboard + picks) ──
// teams: ordered array of team names
// stats: { teamName: {P,W,D,L,GF,GA,Pts} }
// opts.rowClassFn(team, index): returns CSS class string for each row
// opts.showGD: include GF/GA/GD columns (default false)
function renderGroupTableCard(grp, teams, stats, opts={}) {
  const { rowClassFn = () => '', showGD = false } = opts;
  const rows = teams.map((t, i) => {
    const s = stats[t] || {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0};
    const rc = rowClassFn(t, i);
    const gdCell = showGD ? `<td>${s.GF}</td><td>${s.GA}</td><td>${(s.GF-s.GA)>=0?'+':''}${s.GF-s.GA}</td>` : '';
    return `<tr${rc ? ` class="${rc}"` : ''}><td class="td-team">${teamHtml(t)}</td><td>${s.P}</td><td>${s.W}</td><td>${s.D}</td><td>${s.L}</td>${gdCell}<td class="td-pts">${s.Pts}</td></tr>`;
  }).join('');
  const gdHeaders = showGD ? `<th title="Goals for">GF</th><th title="Goals against">GA</th><th title="Goal difference">GD</th>` : '';
  return `<div class="group-table-card"><div class="group-table-header">Group ${grp}</div><div class="group-table"><table><thead><tr><th class="th-team">Team</th><th title="Played">P</th><th title="Won">W</th><th title="Drawn">D</th><th title="Lost">L</th>${gdHeaders}<th title="Points">Pts</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

// ── HTML attribute escape helper ──────────────────────────
function _esc(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;'); }

// ── Upset detection: true when the lower-ranked (higher rank#) team won ──────
// outcome = 'W1'|'W2'|'Draw'; t1/t2 = home/away team names
function _isUpsetResult(t1, t2, outcome) {
  if (!outcome || outcome === 'Draw') return false;
  const r1 = RANKINGS[t1] || 999, r2 = RANKINGS[t2] || 999;
  if (r1 === r2) return false;
  const favWon = r1 < r2 ? outcome === 'W1' : outcome === 'W2';
  return !favWon;
}

// ── Display name: "First L" (last name abbreviated to initial, UI-only) ──
// Full name is stored in the JSON; abbreviation is only for display.
const _abbrevMap = new Map();
function _buildAbbrevMap(names) {
  _abbrevMap.clear();
  const _short = (name, len) => {
    const parts = name.trim().split(/\s+/);
    if (parts.length <= 1 || !parts[parts.length - 1][0].match(/[a-zA-ZÀ-ɏ]/)) return name;
    return parts.slice(0, -1).join(' ') + ' ' + parts[parts.length - 1].slice(0, len);
  };
  // Group names by their 1-char abbreviation to find collisions
  const byAbbrev = new Map();
  for (const name of names) {
    const ab = _short(name, 1);
    if (!byAbbrev.has(ab)) byAbbrev.set(ab, []);
    byAbbrev.get(ab).push(name);
  }
  for (const [, group] of byAbbrev) {
    if (group.length === 1) { _abbrevMap.set(group[0], _short(group[0], 1)); continue; }
    // Collision: expand last name until all unique
    for (let len = 2; len <= 20; len++) {
      const expanded = group.map(n => _short(n, len));
      if (new Set(expanded).size === group.length) {
        group.forEach((n, i) => _abbrevMap.set(n, expanded[i]));
        break;
      }
    }
  }
}
function _abbrevName(name) {
  return _abbrevMap.get(name) || name;
}

// ── H2H stats helper (module-scope so both renderGroupTables and computeGroupStandings can use it) ──
function h2hStats(teamA, teamB, grpMatches, results) {
  let Pts = 0, GF = 0, GA = 0;
  grpMatches.forEach(([num, , , , t1, t2]) => {
    const r = results[num];
    if (!r) return;
    if (t1===teamA && t2===teamB) {
      GF += r.home; GA += r.away;
      if (r.outcome==='W1') Pts += 3;
      else if (r.outcome==='Draw') Pts += 1;
    } else if (t1===teamB && t2===teamA) {
      GF += r.away; GA += r.home;
      if (r.outcome==='W2') Pts += 3;
      else if (r.outcome==='Draw') Pts += 1;
    }
  });
  return { Pts, GF, GA };
}

function renderGroupTables(results) {
  // Build team stats from MATCHES + results
  const groups = {};
  const stats  = {};

  MATCHES.forEach(([num, grp, , , t1, t2]) => {
    if (!groups[grp]) groups[grp] = [];
    if (!groups[grp].includes(t1)) groups[grp].push(t1);
    if (!groups[grp].includes(t2)) groups[grp].push(t2);

    [t1, t2].forEach(t => {
      if (!stats[t]) stats[t] = { P:0, W:0, D:0, L:0, GF:0, GA:0, Pts:0 };
    });

    const r = results[num];
    if (!r) return;

    stats[t1].P++; stats[t2].P++;
    stats[t1].GF += r.home; stats[t1].GA += r.away;
    stats[t2].GF += r.away; stats[t2].GA += r.home;

    if (r.outcome === 'W1') {
      stats[t1].W++; stats[t1].Pts += 3;
      stats[t2].L++;
    } else if (r.outcome === 'W2') {
      stats[t2].W++; stats[t2].Pts += 3;
      stats[t1].L++;
    } else {
      stats[t1].D++; stats[t1].Pts++;
      stats[t2].D++; stats[t2].Pts++;
    }
  });

  const completedGroups = Object.keys(groups).sort();

  // h2hStats is defined at module scope above

  // ── Pass 1: compute sorted standings for all completed groups ──
  function sortedStandings(grp) {
    const order = GROUP_ORDER[grp] || groups[grp];
    const grpMatches = MATCHES.filter(([, g]) => g === grp);
    return [...order].sort((a, b) => {
      const sa = stats[a] || {Pts:0,GF:0,GA:0};
      const sb = stats[b] || {Pts:0,GF:0,GA:0};
      if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
      const ha = h2hStats(a, b, grpMatches, results), hb = h2hStats(b, a, grpMatches, results);
      if (hb.Pts !== ha.Pts) return hb.Pts - ha.Pts;
      if ((hb.GF-hb.GA) !== (ha.GF-ha.GA)) return (hb.GF-hb.GA) - (ha.GF-ha.GA);
      if (hb.GF !== ha.GF) return hb.GF - ha.GF;
      if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
      if (sb.GF !== sa.GF) return sb.GF - sa.GF;
      const ra = RANKINGS[a] ?? 999, rb = RANKINGS[b] ?? 999;
      if (ra !== rb) return ra - rb;
      return (GROUP_ORDER[grp]||groups[grp]).indexOf(a) - (GROUP_ORDER[grp]||groups[grp]).indexOf(b);
    });
  }

  // Is a group fully played? (all 6 matches have results)
  const isGroupDone    = grp => MATCHES.filter(([, g]) => g === grp).every(([n]) => results[n]);
  const isGroupStarted = grp => MATCHES.filter(([, g]) => g === grp).some(([n])  => results[n]);

  // Collect 3rd-place teams from all completed groups
  const thirdPlaceTeams = completedGroups.map(grp => {
    const s = sortedStandings(grp);
    return s[2] ? { team: s[2], grp, stats: stats[s[2]] || {Pts:0,GF:0,GA:0} } : null;
  }).filter(Boolean);

  // Sort 3rd-place teams (cross-group: overall stats only)
  const sortedThirds = [...thirdPlaceTeams].sort((a, b) => {
    const sa = a.stats, sb = b.stats;
    if (sb.Pts !== sa.Pts) return sb.Pts - sa.Pts;
    if ((sb.GF-sb.GA) !== (sa.GF-sa.GA)) return (sb.GF-sb.GA) - (sa.GF-sa.GA);
    if (sb.GF !== sa.GF) return sb.GF - sa.GF;
    return (RANKINGS[a.team]??999) - (RANKINGS[b.team]??999);
  });

  const allGroupsStarted = completedGroups.length === 12 && completedGroups.every(isGroupStarted);
  const qualifiedThirds = new Set(sortedThirds.slice(0, 8).map(t => t.team));

  // ── Pass 2: render each group ──────────────────────────────
  const cards = completedGroups.map(grp => {
    const grpStarted = isGroupStarted(grp);
    const teams = grpStarted ? sortedStandings(grp) : (GROUP_ORDER[grp] || groups[grp]);

    const rowClassFn = (t, i) => {
      if (!grpStarted) return '';
      if (i < 2) return 'qualified';
      if (i === 2) {
        if (allGroupsStarted) return qualifiedThirds.has(t) ? 'third-qual' : 'eliminated';
        return 'third-pending';
      }
      return 'eliminated';
    };

    return renderGroupTableCard(grp, teams, stats, { rowClassFn, showGD: true });
  }).join('');

  const legend = `<div style="display:flex;gap:16px;flex-wrap:wrap;padding:8px 0 4px;font-size:0.72rem;color:var(--neutral-dark)">
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:var(--blue-lightest);border:1px solid var(--swiftly-blue);display:inline-block"></span>Qualified (top 2)</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#e6f9ef;border:1px solid #22863a;display:inline-block"></span>3rd — qualified</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fff8e6;border:1px solid #ff9e16;display:inline-block"></span>3rd — pending</span>
    <span style="display:flex;align-items:center;gap:5px"><span style="width:12px;height:12px;border-radius:2px;background:#fdf0f0;border:1px solid #e24b4a;display:inline-block"></span>Eliminated</span>
  </div>`;

  document.getElementById('groupTablesCard').innerHTML =
    `<div class="group-tables-grid">${cards}</div>${legend}`;
}

// R32_SLOTS, THIRD_MATCH_COL, R16/QF/SF bracket topology come from bracket.js

function computeBracket(grpStandings, qualifiedThirds) {
  // Build position lookup
  const pos = {};
  Object.entries(grpStandings).forEach(([grp, teams]) => {
    if (teams[0]) pos[`1${grp}`] = teams[0][0];
    if (teams[1]) pos[`2${grp}`] = teams[1][0];
    if (teams[2]) pos[`3${grp}`] = teams[2][0];
  });

  // 3rd place combination lookup
  const qualGroups = qualifiedThirds.slice(0,8).map(([g]) => g).sort().join('');
  const combo = THIRD_COMBOS[qualGroups];
  const thirdSlot = {}; // match → team
  if (combo) {
    [79,85,81,74,82,77,87,80].forEach((m,i) => {
      const grp = combo[i];
      thirdSlot[m] = pos[`3${grp}`] || `3${grp}`;
    });
  } else {
    [79,85,81,74,82,77,87,80].forEach(m => { thirdSlot[m] = 'TBD'; });
  }

  // Resolve team for a slot string
  function slotTeam(slot) {
    if (slot.startsWith('3M')) {
      const m = parseInt(slot.slice(2));
      return thirdSlot[m] || 'TBD';
    }
    return pos[slot] || slot;
  }

  // Build R32 matchups
  const r32teams = {};
  Object.entries(R32_SLOTS).forEach(([m, [h, a]]) => {
    r32teams[+m] = [slotTeam(h), slotTeam(a)];
  });

  return { pos, thirdSlot, r32teams, combo: !!combo, qualGroups };
}

    [55,'E','Curaçao','Ivory Coast'],[56,'E','Ecuador','Germany'],

    [61,'I','Norway','France'],[62,'I','Senegal','Iraq'],

    [65,'H','Cape Verde','Saudi Arabia'],[66,'H','Uruguay','Spain'],
    [67,'L','Panama','England'],[68,'L','Croatia','Ghana'],
    [69,'J','Algeria','Austria'],[70,'J','Jordan','Argentina'],
    [71,'K','Colombia','Portugal'],[72,'K','DR Congo','Uzbekistan'],
  ];
  const grpOrder = {
    A:['Mexico','South Africa','South Korea','Czech Republic'],
    B:['Canada','Bosnia and Herzegovina','Qatar','Switzerland'],
    C:['Brazil','Morocco','Haiti','Scotland'],
    D:['United States','Paraguay','Australia','Turkey'],
    E:['Germany','Curaçao','Ivory Coast','Ecuador'],
    F:['Netherlands','Japan','Sweden','Tunisia'],
    G:['Belgium','Egypt','Iran','New Zealand'],
    H:['Spain','Cape Verde','Saudi Arabia','Uruguay'],

    K:['Portugal','DR Congo','Uzbekistan','Colombia'],

  };
  const stats = {}, grpMatches = {};
  GRP_MATCHES.forEach(([num,grp,t1,t2]) => {
    [t1,t2].forEach(t => { if (!stats[t]) stats[t] = {P:0,W:0,D:0,L:0,GF:0,GA:0,Pts:0}; });

    grpMatches[grp].push([num,grp,t1,t2]);
    const r = results[num]; if (!r) return;
    stats[t1].P++; stats[t2].P++;
    stats[t1].GF += r.home; stats[t1].GA += r.away;
    stats[t2].GF += r.away; stats[t2].GA += r.home;
    if (r.outcome==='W1') { stats[t1].W++; stats[t1].Pts+=3; stats[t2].L++; }
    else if (r.outcome==='W2') { stats[t2].W++; stats[t2].Pts+=3; stats[t1].L++; }

    .map(([grp,ts]) => [grp, ts[2][0], ts[2][1]])
    .sort((a,b) => (b[2].Pts-a[2].Pts)||((b[2].GF-b[2].GA)-(a[2].GF-a[2].GA))||(b[2].GF-a[2].GF)||((RANKINGS[a[1]]??999)-(RANKINGS[b[1]]??999)));
  return { grpStandings, thirds };
}

// ── Bracket rendering (Variant 1 — read-only, group-results-derived) ──────────
// buildBracketHtml, positionAndConnectBracket, drawBracketConnectors → bracket.js
function renderBracket(results, allGroupsStarted, bracketConfirmed) {
  const el = document.getElementById('bracketCard');

  if (!allGroupsStarted) {
    el.innerHTML = '<div class="bracket-pending">Bracket appears once all groups have kicked off.</div>';
    return;
  }

  // confirmed=true only when parse_results.py has cross-checked R32 against Wikipedia
  const isConfirmed = bracketConfirmed === true;
  const statusBadge = isConfirmed
    ? '<span style="margin-left:8px;font-size:0.6rem;background:#22863a;color:#fff;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Confirmed ✓</span>'
    : '<span style="margin-left:8px;font-size:0.6rem;background:#ff9e16;color:#131e27;padding:2px 7px;border-radius:10px;font-weight:700;letter-spacing:0">Provisional</span>';
  const bracketLabel = document.getElementById('bracketSectionLabel');
  if (bracketLabel && !bracketLabel.querySelector('.bracket-badge')) {
    const span = document.createElement('span');
    span.className = 'bracket-badge';
    span.innerHTML = statusBadge;
    bracketLabel.appendChild(span);
  }

  const { grpStandings, thirds } = computeGroupStandings(results);
  const { r32teams } = computeBracket(grpStandings, thirds);

  // Resolve teams for a match slot — returns [home, away]
  function slotTeams(m) {
    if (r32teams[m]) return r32teams[m];
    if (R16[m])  return [`W${R16[m][0]}`, `W${R16[m][1]}`];
    if (QF[m])   return [`W${QF[m][0]}`,  `W${QF[m][1]}`];
    if (SF[m])   return [`W${SF[m][0]}`,  `W${SF[m][1]}`];
    if (m===103) return ['L101','L102'];
    if (m===104) return ['W101','W102'];
    return ['TBD','TBD'];
  }

  // mkCard: builds a read-only match card using shared matchCard() from bracket.js
  function mkCard(m) {
    const [h, a] = slotTeams(m);
    return matchCard(m, h, a, '');
  }

  // ── Mobile tab view ──────────────────────────────────────
  // Match order mirrors desktop bracket (buildBracketHtml top-to-bottom layout)
  const MOB_ROUNDS = [
    { id: 'r32', label: 'R32',   matches: [74,77,73,75,83,84,81,82,76,78,79,80,86,88,85,87] },
    { id: 'r16', label: 'R16',   matches: [89,90,93,94,91,92,95,96] },
    { id: 'qf',  label: 'QF',    matches: [97,98,99,100] },
    { id: 'sf',  label: 'SF',    matches: [101,102] },
    { id: '3rd', label: '3rd',   matches: [103] },
    { id: 'fin', label: 'Final', matches: [104] },
  ];
  function mobMatchCard(m) {
    const [h, a] = slotTeams(m);
    const date  = KO_SCHEDULE[m] ? ` · ${koDisplay(m)}` : '';
    const hTbd  = isTbd(h), aTbd = isTbd(a);
    const hHtml = hTbd ? h : teamHtml(h);
    const aHtml = aTbd ? a : teamHtml(a);
    return `<div class="bk-mob-match">
      <div class="bk-mob-meta">M${m}${date}</div>
      <div class="bk-mob-teams">
        <div class="bk-mob-team${hTbd ? ' tbd' : ''}"><span class="bk-mob-team-name">${hHtml}</span></div>
        <div class="bk-mob-team${aTbd ? ' tbd' : ''}"><span class="bk-mob-team-name">${aHtml}</span></div>
      </div>
    </div>`;
  }
  const mobTabBarHtml = MOB_ROUNDS.map((r, i) =>
    `<button class="bk-tab${i===0 ? ' active' : ''}" onclick="switchBracketTab('${r.id}')" data-round="${r.id}">${r.label}</button>`
  ).join('');
  const mobPanelsHtml = MOB_ROUNDS.map((r, i) =>
    `<div class="bk-tab-panel${i===0 ? ' active' : ''}" id="bk-panel-${r.id}">${r.matches.map(mobMatchCard).join('')}</div>`
  ).join('');
  const mobTabHtml = `<div class="bk-mobile-tabs"><div class="bk-tab-bar">${mobTabBarHtml}</div>${mobPanelsHtml}</div>`;

  // Podium: shown here temporarily for preview — will be Variant 2/3 only once built.
  // champion/runnerUp/thirdPlace come from knockout results (not yet available in Variant 1).
  // All three pass null until knockout results are wired up.
  const podiumHtml = buildPodiumHtml(null, null, null); // TODO: pass actual KO results (Variant 3)

  el.innerHTML = buildBracketHtml(mkCard, { podiumHtml }) + mobTabHtml;
  requestAnimationFrame(() => requestAnimationFrame(positionAndConnectBracket));
}

// ── Mobile bracket tab switcher ───────────────────────────
function switchBracketTab(roundId) {
  document.querySelectorAll('.bk-tab').forEach(b =>
    b.classList.toggle('active', b.dataset.round === roundId));
  document.querySelectorAll('.bk-tab-panel').forEach(p =>
    p.classList.toggle('active', p.id === 'bk-panel-' + roundId));
}

// ── Tooltip ───────────────────────────────────────────────
const tooltip = document.getElementById('sq-tooltip');

document.addEventListener('mouseover', e => {
  const sq = e.target.closest('.sq');
  if (!sq) { tooltip.style.display = 'none'; return; }

  const match  = sq.dataset.match;
  const teams  = sq.dataset.teams;
  const pick   = sq.dataset.pick;
  const result = sq.dataset.result;
  const status = sq.dataset.status;

  const statusText = status === 'correct'        ? '✓ Correct'
                   : status === 'correct-upset'  ? '✓ Correct ✦ Upset'
                   : status === 'wrong'          ? '✗ Wrong'
                   : status === 'cascaded'       ? '⚡ Void — team eliminated earlier'
                   : status === 'pending'        ? '⏳ Pending'
                   : status === 'live-correct'   ? '🔴 Live · correct so far'
                   : status === 'live-wrong'     ? '🔴 Live · wrong so far'
                   : '—';

  const ttStatusCls = status === 'correct-upset' ? 'correct'
                    : status === 'live-correct'   ? 'correct'
                    : status === 'live-wrong'     ? 'wrong'
                    : status;
  tooltip.innerHTML = `
    <div class="tt-match"></div>
    <div class="tt-pick">Your pick: <strong></strong></div>
    <div class="tt-result"></div>
    <div class="tt-status ${ttStatusCls}"></div>
  `;
  tooltip.querySelector('.tt-match').textContent   = `Match ${match} · ${teams}`;
  tooltip.querySelector('.tt-pick strong').textContent = pick;
  tooltip.querySelector('.tt-result').textContent  = `Result: ${result}`;
  tooltip.querySelector('.tt-status').textContent  = statusText;
  tooltip.style.display = 'block';
});

document.addEventListener('mousemove', e => {
  if (tooltip.style.display === 'none') return;
  const x = e.clientX + 14, y = e.clientY + 14;
  const tw = tooltip.offsetWidth, th = tooltip.offsetHeight;
  tooltip.style.left = (x + tw > window.innerWidth  ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? y - th - 28 : y) + 'px';
});

document.addEventListener('mouseout', e => {
  if (!e.target.closest('.sq')) tooltip.style.display = 'none';
});

// ── Live scores fetch + polling ───────────────────────────
const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard';

async function fetchLiveScores() {
  if (!LIVE_SCORES_ENABLED || knockoutMode) return;
  try {
    // ESPN indexes matches by local ET date, not UTC.
    // A 10 PM ET match = 2 AM UTC next day, so at live time the UTC date is already "tomorrow".
    // Fetch yesterday + today UTC to catch any match that is currently live.
    const now  = new Date();
    const yest = new Date(now.getTime() - 24 * 60 * 60 * 1000);
    const d1   = yest.toISOString().slice(0, 10).replace(/-/g, '');
    const d2   = now.toISOString().slice(0, 10).replace(/-/g, '');
    const [r1, r2] = await Promise.all([
      fetch(`${ESPN_SCOREBOARD}?dates=${d1}`),
      fetch(`${ESPN_SCOREBOARD}?dates=${d2}`),
    ]);
    const allEvents = [
      ...((r1.ok ? await r1.json() : {}).events || []),
      ...((r2.ok ? await r2.json() : {}).events || []),
    ];

    const newLive = {};
    let anyIn = false;

    // Seed _pendingResults from schedule for any match past its expected end time
    // that has no CSV result yet. Catches cases where ESPN dropped the post-game event
    // before the user loaded the page (ESPN removes post events within minutes of FT).
    // 110 min = 90 min game + ~20 min stoppage buffer. Group games only (fetchLiveScores
    // returns early in knockoutMode). KO matches need a larger buffer (~150 min) to
    // account for extra time + penalties — handle when KO live scores are added.
    const nowMs = Date.now();
    for (const [mNum,,, utcKick] of MATCHES) {
      if (_lastResults?.[mNum]) continue;       // already confirmed in CSV
      if (_pendingResults.has(mNum)) continue;  // already tracked
      if (nowMs > new Date(utcKick).getTime() + 110 * 60 * 1000) { // kickoff + 110 min
        _pendingResults.add(mNum);
      }
    }

    for (const event of allEvents) {
      const state = event.status?.type?.state;
      if (state !== 'in' && state !== 'post') continue;
      const comp = event.competitions?.[0];
      const home = comp?.competitors?.find(c => c.homeAway === 'home');
      const away = comp?.competitors?.find(c => c.homeAway === 'away');
      if (!home || !away) continue;

      const hn = ESPN_TEAM_MAP_JS[home.team.displayName] || home.team.displayName;
      const an = ESPN_TEAM_MAP_JS[away.team.displayName] || away.team.displayName;
      const match = MATCHES.find(([,,,, t1, t2]) =>
        (t1 === hn && t2 === an) || (t2 === hn && t1 === an));
      if (!match) continue;

      const [num,,,, t1] = match;
      const hs = parseInt(home.score) || 0;
      const as_ = parseInt(away.score) || 0;
      // If ESPN reversed home/away vs our MATCHES ordering, swap scores
      const [h, a] = t1 === hn ? [hs, as_] : [as_, hs];

      const clock = event.status?.displayClock || '';
      const minute = clock === 'HT' ? 'HT' : (clock.split(':')[0] || '');

      newLive[num] = { minute, homeScore: h, awayScore: a, state };
      if (state === 'in') anyIn = true;
      // Track games ESPN says are finished but CSV hasn't confirmed yet
      if (state === 'post' && (!_lastResults || !_lastResults[num])) _pendingResults.add(num);
    }

    // Drop post-game entries already confirmed by CSV — no need to bridge anymore
    if (_lastResults) {
      for (const num of Object.keys(newLive)) {
        if (_lastResults[Number(num)]) delete newLive[Number(num)];
      }
      // Also clear any pending matches that CSV has now confirmed
      for (const num of _pendingResults) {
        if (_lastResults[num]) _pendingResults.delete(num);
      }
    }

    _liveData = newLive;

    // Re-render affected sections with live overlay
    if (_lastStandings && _lastResults !== null) {
      renderStandings(_lastStandings, _liveData);
      renderResults(_lastResults, _lastGrpCounts, _liveData);
    }

    // Stop polling once nothing is live.
    // If games have ended but CSV not confirmed yet (_pendingResults), keep bridge polling
    // via init() — which re-fetches CSV each cycle. This persists even if ESPN stops
    // returning the post-game event (which it does within minutes of FT).
    if (!anyIn) {
      stopLivePolling();
      if (_pendingResults.size > 0 && !_inInit) init();
    }

  } catch (e) { /* silent — live scores are best-effort */ }
}

function startLivePolling() {
  if (_livePoller) return;
  _livePoller = setInterval(fetchLiveScores, 60 * 1000);
}

function stopLivePolling() {
  if (_livePoller) { clearInterval(_livePoller); _livePoller = null; }
}
// ──────────────────────────────────────────────────────────

// ── Main ──────────────────────────────────────────────────
async function init() {
  _inInit = true;
  try {
    let picksData, resultsCSV, koPicksData = {}, koResultsCSV = '';
    let bracketData = null;

    const _nc = { cache: 'no-store' };
    const _bust = `?t=${Date.now()}`;
      const [picksResp, resultsResp, bracketResp, koPicksResp, koResultsResp] = await Promise.all([
        fetch(PICKS_URL    + _bust, _nc),
        fetch(RESULTS_URL  + _bust, _nc),
        fetch(BRACKET_URL  + _bust, _nc).catch(() => null),
        fetch(KO_PICKS_URL + _bust, _nc).catch(() => null),
        fetch(KO_RESULTS_URL + _bust, _nc).catch(() => null),
      ]);
      if (!picksResp.ok) throw new Error('Could not load picks');
      if (!resultsResp.ok) throw new Error('Could not load results');
      picksData  = await picksResp.json();
      resultsCSV = await resultsResp.text();
      if (bracketResp?.ok) bracketData = await bracketResp.json();
      if (koPicksResp?.ok) koPicksData = await koPicksResp.json();
      if (koResultsResp?.ok) koResultsCSV = await koResultsResp.text();

    // Apply ?games=N slicing
    if (_gamesN !== null) {
      resultsCSV   = _sliceCsv(resultsCSV, Math.min(_gamesN, 72));
      koResultsCSV = _gamesN >= 73 ? _sliceCsv(koResultsCSV, _gamesN - 72) : '';
    }

    const results   = parseResults(resultsCSV);
    const koResults = parseKoResults(koResultsCSV);
    const koScores  = parseKoScores(koResultsCSV);
    const standings = computeStandings(picksData, results);
    _buildAbbrevMap(standings.map(p => p.name));
    const grpCounts = buildGrpCounts(standings);
    const played    = Object.keys(results).length;
    const koPlayed  = Object.keys(koResults).length;

    // Sticky bar
    if (knockoutMode) {
      document.getElementById('matchesPlayed').textContent = `${koPlayed} / 32 knockout matches played`;
      document.getElementById('progressFill').style.width = `${(koPlayed / 32) * 100}%`;
    } else {
      document.getElementById('matchesPlayed').textContent = `${played} / 72 matches played`;
      document.getElementById('progressFill').style.width = `${(played / 72) * 100}%`;
    }
    _lastUpdated = new Date();
    _updateTimestamp();

    const GRP_SAMPLE = {A:1,B:3,C:7,D:4,E:10,F:11,G:16,H:14,I:17,J:19,K:23,L:22};
    const allGrpsStarted = Object.values(GRP_SAMPLE).every(m => results[m]);
    const bracketConfirmed = bracketData ? bracketData.confirmed === true : false;

    if (knockoutMode) {
      const combined = computeCombinedStandings(standings, koPicksData, koResults, bracketData);
      const koCounts = buildKoCounts(combined);
      renderKoStandings(combined, koResults, bracketData);
      renderKoBracket(bracketData, koResults, koScores, koCounts);
    } else {
      // Store for live polling re-renders
      _lastStandings = standings;
      _lastResults   = results;
      _lastGrpCounts = grpCounts;
      renderStandings(standings, _liveData);
    }

    if (!knockoutMode) {
      renderResults(results, grpCounts, _liveData);
      renderGroupTables(results);
      renderBracket(results, allGrpsStarted, bracketConfirmed);
      // Kick off live polling (fetches ESPN, starts interval if games are live)
      if (LIVE_SCORES_ENABLED) {
        fetchLiveScores().then(() => {
          if (Object.keys(_liveData).length > 0 || _pendingResults.size > 0) startLivePolling();
        });
      }
    }
    _revealSections();

  } catch (err) {
    const msg = `<div class="state-msg"><span class="emoji">⚠️</span>${err.message}</div>`;
    ['standingsCard','resultsCard','groupTablesCard','bracketCard','koBracketCard'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = msg;
    });
    document.getElementById('koStandingsSection').innerHTML = msg;
    document.getElementById('matchesPlayed').textContent = 'Could not load data';
    _revealSections();
  } finally {
    _inInit = false;
  }
}

function _revealSections() {
  document.querySelectorAll('.section-label, .section-body').forEach(el => el.style.visibility = 'visible');
}

setupLayout();

// ── Auto-refresh every 5 minutes ────────────────────────
const REFRESH_MS = 5 * 60 * 1000;
let _lastUpdated = null;

function _updateTimestamp() {
  const el = document.getElementById('updatedAt');
  if (!el || !_lastUpdated) return;
  el.textContent = `Updated ${_lastUpdated.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}`;
}

setInterval(() => { init(); }, REFRESH_MS);

function _revealChrome() {
  document.querySelector('header').style.visibility = 'visible';
  document.querySelector('.sticky-bar').style.visibility = 'visible';
}
document.fonts.ready.then(_revealChrome);
setTimeout(_revealChrome, 3000); // fallback if fonts never load

init();
</script>
