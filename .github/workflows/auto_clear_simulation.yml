name: Auto-clear simulation data before tournament

on:
  schedule:
    - cron: '0 17 11 6 *'   # June 11 at 17:00 UTC (1:00 PM ET) — 2hrs before first match
  workflow_dispatch:          # also allow manual trigger for testing

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Only run in 2026
        id: check
        run: |
          YEAR=$(date -u +%Y)
          if [ "$YEAR" != "2026" ]; then
            echo "Not 2026 — skipping"
            echo "run=false" >> $GITHUB_OUTPUT
          else
            echo "run=true" >> $GITHUB_OUTPUT
          fi

      - name: Check out repo
        if: steps.check.outputs.run == 'true'
        uses: actions/checkout@v6.0.2

      - name: Delete simulation pick files
        if: steps.check.outputs.run == 'true'
        run: |
          find picks/group/swiftly picks/group/fandf -name "*simulation*" -delete 2>/dev/null || true
          echo "Simulation pick files removed"

      - name: Set up Python
        if: steps.check.outputs.run == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Clear results and data files
        if: steps.check.outputs.run == 'true'
        run: |
          printf "match,home_score,away_score,outcome\n" > results/group_results.csv
          printf "match,winner\n" > results/knockout_results.csv
          echo "{}" > data/knockout_bracket.json
          echo "Results and bracket cleared"

      - name: Rebuild picks JSONs from real CSVs
        if: steps.check.outputs.run == 'true'
        run: python .github/scripts/aggregate_picks.py

      - name: Commit and push
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ results/ data/
          git diff --staged --quiet || git commit -m "auto: clear simulation data before tournament (Jun 11 2026)"
          git push

