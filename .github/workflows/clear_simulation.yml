name: Clear simulation data

on:
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Delete simulation pick files
        run: |
          find picks/group/swiftly picks/group/fandf -name "*simulation*" -delete 2>/dev/null || true
          find picks/knockout/swiftly picks/knockout/fandf -name "*simulation*" -delete 2>/dev/null || true
          echo "Simulation pick files removed"

      - name: Clear results and data files
        run: |
          echo "" > results/group_results.csv
          echo "{}" > data/group_swiftly_picks.json
          echo "{}" > data/group_fandf_picks.json
          echo "{}" > data/knockout_swiftly_picks.json
          echo "{}" > data/knockout_fandf_picks.json
          echo "Simulation bracket cleared" > data/knockout_bracket.json
          echo "Results and data cleared"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ results/ data/
          git diff --staged --quiet || git commit -m "simulation: cleared all test data"
          git push
