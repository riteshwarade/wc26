name: Clear simulation data

on:
  workflow_dispatch:

jobs:
  clear:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Check out repo
        uses: actions/checkout@v6.0.2

      - name: Delete simulation pick files
        run: |
          find picks/group/swiftly picks/group/fandf -name "*simulation*" -delete 2>/dev/null || true
          find picks/knockout/swiftly picks/knockout/fandf -name "*simulation*" -delete 2>/dev/null || true
          echo "Simulation pick files removed"

      - name: Set up Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.11'

      - name: Clear results and data files
        run: |
          printf "match,home_score,away_score,outcome\n" > results/group_results.csv
          printf "match,winner\n" > results/knockout_results.csv
          echo "{}" > data/knockout_bracket.json
          echo "Results and bracket cleared"

      - name: Rebuild picks JSONs from real CSVs
        run: python .github/scripts/aggregate_picks.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add picks/ results/ data/
          git diff --staged --quiet || git commit -m "simulation: cleared all test data"
          git push

